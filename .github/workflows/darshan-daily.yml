name: darshan-daily

# Ежедневный даршан: читает публичные каналы дхам, собирает пост в стиле канала.
# По умолчанию — DRY_RUN (ничего не постит, только превью в ветку ci/darshan-dryrun).
# Публикация в @iskcone: запустить вручную с dry_run=0 (или сменить default, когда подтвердим вид).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '1 = только собрать превью (ничего не постить); 0 = публиковать в @iskcone'
        required: false
        default: '1'
      only:
        description: 'Только эти источники через запятую (vrindavan,mayapur). Пусто = все'
        required: false
        default: ''
      force:
        description: '1 = игнорировать дедуп и перепостить заново. По расписанию всегда 0'
        required: false
        default: '0'
      diag:
        description: '1 = только диагностика: список свежих постов канала (ничего не постит)'
        required: false
        default: '0'
      diag_channels:
        description: 'DIAG: каналы через запятую для разовой проверки (напр. iskconvrindavandarshan)'
        required: false
        default: ''
      delete_ids:
        description: 'Удалить сообщения из @iskcone по id через запятую (подчистка)'
        required: false
        default: ''
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC ≈ 14:30 IST — после публикации галереи Шрингары на сайте

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ingest darshan
        env:
          # ВРЕМЕННО НА ПАУЗЕ: расписание идёт в dry (не постит), пока дорабатываем
          # источник (время Шрингары, все три алтаря, качество). Включим обратно через '0'.
          DRY_RUN: ${{ github.event.inputs.dry_run || '1' }}
          ONLY: ${{ github.event.inputs.only || 'vrindavan' }}
          FORCE: ${{ github.event.inputs.force || '0' }}
          DIAG: ${{ github.event.inputs.diag || '0' }}
          DIAG_CHANNELS: ${{ github.event.inputs.diag_channels || '' }}
          DELETE_IDS: ${{ github.event.inputs.delete_ids || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: '@iskcone'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 'd5cbe19470dc38599873eabfe148e6d1'
        run: node scripts/darshan-ingest.mjs

      - name: Publish run result to side branch
        if: always()
        run: |
          git config user.name "ci-darshan"
          git config user.email "ci@local"
          git checkout -B ci/darshan-dryrun
          git add -f data/darshan/_dryrun.json
          git commit -m "ci: darshan run result" || echo "nothing to commit"
          git push -f origin ci/darshan-dryrun

name: PDF manifest keys
on:
  workflow_dispatch:
permissions: {}
jobs:
  keys:
    runs-on: ubuntu-latest
    steps:
      - name: fetch manifest keys
        run: |
          curl -s "https://brajs.com/books/manifest.json" -o m.json
          echo "size: $(wc -c < m.json) bytes"
          python3 - <<'PY'
          import json
          d=json.load(open("m.json"))
          keys=sorted(d.keys())
          print("::notice title=PDFMAN::"+str(len(d))+" works: "+", ".join(keys))
          for k in keys:
              v=d[k]
              vols=v.get("volumes") or v.get("files") or []
              print(f"  {k:5} vols={len(vols):2} sig={str(v.get('sig',''))[:10]}")
          PY

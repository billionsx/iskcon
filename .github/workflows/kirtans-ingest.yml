# КИРТАНЫ · ЗАЛИВКА (@iskconecom → archive.org → плеер)
#
# 42 ГБ в один прогон не влезают (лимит GitHub Actions). Работаем ПОРЦИЯМИ и
# сами себя перезапускаем, пока очередь не опустеет. Состояние — в D1, не в
# файле: прогон умер — следующий подхватил с того же места.
#
# ЗКН-Ф021: исполнитель считается готовым, только когда его файлы ВИДНЫ в
# archive.org (metadata-API), а не когда «команда отправлена».
name: "Киртаны · заливка"
run-name: "kirtans-ingest · осталось: ${{ inputs.note || '?' }}"

concurrency:
  group: tg-archive-session      # ЗКН-Пл003: одна сессия Telegram — одна очередь
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Пересобрать очередь из карты исполнителей"
        type: boolean
        default: false
      min_files:
        description: "Порог: льём исполнителей с таким числом записей и больше"
        default: "3"
      note:
        description: "(служебное) счётчик самоцепочки"
        default: ""

permissions:
  contents: read
  actions: write                 # самоцепочка: воркфлоу перезапускает сам себя

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Зависимости
        run: pip install -r tools/tg-archive/requirements.txt internetarchive

      - name: Очередь заливки
        if: ${{ inputs.plan }}
        working-directory: tools/tg-archive
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MIN_FILES: ${{ inputs.min_files || '3' }}
        run: python kirtans_ingest.py plan

      - name: Залить порцию
        id: run
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_CHANNEL: "@iskconecom"
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BUDGET_MIN: "280"
          DL_PARALLEL: "12"     # столько же, сколько увезло 33 ГБ Шримад-Бхагаватам
          IA_PARALLEL: "6"
        run: python kirtans_ingest.py run

      # САМОЦЕПОЧКА. Очередь не пуста — запускаем себя снова. Иначе 42 ГБ
      # пришлось бы дожимать руками, а «дожму потом» = не дожму никогда.
      - name: Продолжить, если осталось
        if: ${{ steps.run.outputs.left != '0' && steps.run.outputs.left != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          LEFT="${{ steps.run.outputs.left }}"
          echo "::notice::осталось $LEFT исполнителей — перезапускаю себя"
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/kirtans-ingest.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"plan\":\"false\",\"note\":\"$LEFT\"}}"

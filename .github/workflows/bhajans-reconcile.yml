name: bhajans reconcile (импорты ↔ книжные заглушки)

# Сверяет импортированные bhajanamrita-песни с книжными заглушками и при уверенном
# совпадении переносит контент в канонический книжный слаг, удаляя плоский дубль.
# mode=plan — только отчёт RECONCILE.json (ревью). mode=apply — применить.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "plan (отчёт) или apply (применить)"
        required: true
        default: "plan"
        type: choice
        options: ["plan", "apply"]

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Run
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ "${{ inputs.mode }}" = "apply" ]; then
            python3 tools/bhajans/reconcile_stubs.py --apply
          else
            python3 tools/bhajans/reconcile_stubs.py --plan
          fi
      - name: Commit plan
        if: ${{ inputs.mode == 'plan' }}
        run: |
          git config user.name "Billions X"; git config user.email "ceo@billionsx.com"
          git add tools/bhajans/recon/RECONCILE.json
          git commit -m "reconcile(bhajanamrita): план сверки с заглушками [skip ci]" || exit 0
          git push

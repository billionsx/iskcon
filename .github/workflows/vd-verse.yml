name: vedabase verse ingest (параметризованный)

# Универсальный загрузчик СТИХОТВОРНЫХ книг Шрилы Прабхупады с vedabase.io (ru):
# одноуровневые (мантры/тексты без глав). Модель D1: works(verse_scheme),
# одна division(level=chapter) = тело книги, verses(deva/translit) + verse_texts
# (translation/purport, <work>-ru) + verse_tokens (пословный). Идемпотентно.
# Книги: iso (18 мантр + обращение), noi (11 стихов), lob (48 текстов).

on:
  workflow_dispatch:
    inputs:
      work:    { description: "work_id (iso, noi, lob)", required: true }
      slug:    { description: "vedabase ru slug", required: true }
      abbrev:  { description: "аббревиатура (ИШО, НН, СБ)", default: "" }
      title:   { description: "русское название", required: true }
      chapter_title: { description: "название единственного раздела", default: "" }
      mode:    { description: "probe | all", default: "all" }
      force:   { description: "перезаливать (true/false)", default: "true" }

permissions:
  contents: write

jobs:
  verse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install --quiet beautifulsoup4 lxml
      - name: Run
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORK: ${{ github.event.inputs.work }}
          SLUG: ${{ github.event.inputs.slug }}
          ABBREV: ${{ github.event.inputs.abbrev }}
          TITLE: ${{ github.event.inputs.title }}
          CHTITLE: ${{ github.event.inputs.chapter_title }}
          MODE: ${{ github.event.inputs.mode }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request, sys, traceback
          from bs4 import BeautifulSoup
          WORK=os.environ["WORK"].strip(); SLUG=os.environ["SLUG"].strip()
          ABBREV=(os.environ.get("ABBREV") or WORK.upper()).strip()
          TITLE=os.environ["TITLE"].strip()
          CHTITLE=(os.environ.get("CHTITLE") or TITLE).strip()
          MODE=(os.environ.get("MODE") or "all").strip()
          FORCE=(os.environ.get("FORCE") or "true").strip()=="true"
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          BASE=f"https://vedabase.io/ru/library/{SLUG}/"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def _hook(t,v,tb):
              os.makedirs(".vd", exist_ok=True)
              json.dump({"fatal":"".join(traceback.format_exception(t,v,tb))[-1800:]},
                        open(".vd/status.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
              sys.__excepthook__(t,v,tb)
          sys.excepthook=_hook

          def d1(sql):
              rq=urllib.request.Request(D1, data=json.dumps({"sql":sql}).encode(),
                  headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq, timeout=90) as r:
                  j=json.loads(r.read().decode())
                  if not j.get("success"): raise RuntimeError(str(j)[:400])
                  return j["result"][0]["results"]
          def q(v): return "NULL" if v is None else "'"+str(v).replace("'","''")+"'"
          def get(url, tries=4):
              for t in range(tries):
                  try:
                      rq=urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"ru,en;q=0.8","accept":"text/html"})
                      with urllib.request.urlopen(rq, timeout=40) as r:
                          if r.status==200: return r.read().decode("utf-8","replace")
                  except Exception: pass
                  time.sleep(1.5*(t+1))
              return ""

          # ── av-* парсер (порт из cc-ingest) ──
          def block_text(el, para=False):
              for br in el.find_all("br"): br.replace_with("\n")
              if para:
                  for p in el.find_all("p"): p.insert_before("\n\n")
              return el.get_text()
          def lines(s):
              out=[re.sub(r"[ \t]+"," ",x).strip() for x in s.split("\n")]
              s="\n".join(out); s=re.sub(r"\n{3,}","\n\n",s); return s.strip()
          def flat(s): return re.sub(r"\s+"," ",s).strip()
          def grab(soup, sel, para=False):
              els=soup.select(sel)
              return "\n".join(block_text(e, para) for e in els) if els else ""
          def parse_tokens(syn):
              if not syn: return []
              out=[]
              for piece in syn.split(";"):
                  parts=re.split(r"\s+[—–-]\s+", piece)
                  term=(parts[0] or "").strip()
                  gloss=" — ".join(parts[1:]).strip() if len(parts)>1 else ""
                  if term: out.append((term, gloss or None))
              return out
          def parse_verse(html):
              soup=BeautifulSoup(html,"lxml")
              deva=lines(grab(soup,".av-devanagari, .av-bengali"))
              translit=lines(grab(soup,".av-verse_text"))
              return {"deva":deva or None,"translit":translit or None,
                      "tr":flat(grab(soup,".av-translation")) or None,
                      "pur":lines(grab(soup,".av-purport", para=True)) or None,
                      "tokens":parse_tokens(flat(grab(soup,".av-synonyms")))}

          # сегменты: ссылки /ru/library/<slug>/<seg>/, seg = число или буквенный (обращение)
          def seg_index():
              html=get(BASE); seen=[]; s=set()
              for m in re.finditer(rf"/ru/library/{re.escape(SLUG)}/([A-Za-z0-9-]+)/", html):
                  g=m.group(1)
                  if g not in s: s.add(g); seen.append(g)
              def keyf(x):
                  if x.isdigit(): return (1,int(x),"")
                  mm=re.match(r"^(\d+)-(\d+)$", x)
                  if mm: return (1,int(mm.group(1)),"")
                  return (0,0,x)  # буквенные (обращение/мангалачарана) — в начало
              return sorted(seen, key=keyf)

          segs=seg_index()
          print("SEGS:", len(segs), segs[:25])
          if MODE=="probe":
              os.makedirs(".vd", exist_ok=True)
              smp={}
              for sg in segs[:3]:
                  v=parse_verse(get(BASE+sg+"/")); smp[sg]={"deva":(v["deva"] or "")[:40],"tr":(v["tr"] or "")[:80],"tokens":len(v["tokens"])}
              json.dump({"work":WORK,"segs":segs,"count":len(segs),"sample":smp},
                        open(".vd/status.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
              raise SystemExit

          d1(f"INSERT INTO works (id,kind,abbrev,verse_scheme) VALUES ({q(WORK)},'scripture',{q(ABBREV)},'mantra') "
             "ON CONFLICT(id) DO UPDATE SET abbrev=excluded.abbrev")
          d1(f"INSERT INTO editions (id,work_id,lang,title,translator,source,license,source_url) VALUES "
             f"({q(WORK+'-ru')},{q(WORK)},'ru',{q(TITLE)},'А.Ч. Бхактиведанта Свами Прабхупада','vedabase.io','pending',{q(BASE)}) "
             "ON CONFLICT(id) DO NOTHING")
          div_id=f"{WORK}.1"
          d1("INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) "
             f"VALUES ({q(div_id)},{q(WORK)},NULL,'chapter','1',json_object('ru',{q(CHTITLE)}),0) "
             "ON CONFLICT(id) DO UPDATE SET title=excluded.title")
          if FORCE:
              d1(f"DELETE FROM verse_tokens WHERE verse_id IN (SELECT id FROM verses WHERE work_id={q(WORK)})")
              d1(f"DELETE FROM verse_texts WHERE verse_id IN (SELECT id FROM verses WHERE work_id={q(WORK)})")
              d1(f"DELETE FROM verses WHERE work_id={q(WORK)}")

          written=0
          for i,sg in enumerate(segs, start=1):
              v=parse_verse(get(BASE+sg+"/")); time.sleep(0.3)
              if not (v["tr"] or v["deva"] or v["pur"]): continue
              vid=f"{WORK}.{sg}"; ref=f"{ABBREV} {sg}"
              d1("INSERT INTO verses (id,work_id,division_id,ordinal,ref,devanagari,translit,uvaca,source_url) "
                 f"VALUES ({q(vid)},{q(WORK)},{q(div_id)},{i},{q(ref)},{q(v['deva'])},{q(v['translit'])},NULL,{q(BASE+sg+'/')}) "
                 "ON CONFLICT(id) DO UPDATE SET devanagari=excluded.devanagari, translit=excluded.translit, ordinal=excluded.ordinal")
              d1("INSERT INTO verse_texts (verse_id,edition_id,translation,purport) "
                 f"VALUES ({q(vid)},{q(WORK+'-ru')},{q(v['tr'])},{q(v['pur'])}) "
                 "ON CONFLICT(verse_id,edition_id) DO UPDATE SET translation=excluded.translation, purport=excluded.purport")
              d1(f"DELETE FROM verse_tokens WHERE verse_id={q(vid)}")
              for k,(term,gloss) in enumerate(v["tokens"], start=1):
                  d1(f"INSERT INTO verse_tokens (verse_id,ordinal,term,gloss) VALUES ({q(vid)},{k},{q(term)},{q(gloss)})")
              written+=1
              print(f"  {sg}: deva={bool(v['deva'])} tr={bool(v['tr'])} pur={bool(v['pur'])} tok={len(v['tokens'])}")

          ver=d1(f"SELECT COUNT(*) AS verses FROM verses WHERE work_id={q(WORK)}")[0]
          os.makedirs("apps/web/public/data/book-stats", exist_ok=True)
          json.dump({"work":WORK,"chapters":1,"verses":ver["verses"],"prose":False},
                    open(f"apps/web/public/data/book-stats/{WORK}.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
          os.makedirs(".vd", exist_ok=True)
          json.dump({"work":WORK,"written":written,"db":ver}, open(".vd/status.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
          print("DONE:", json.dumps(ver, ensure_ascii=False))
          if ver["verses"]==0: raise SystemExit("EMPTY")
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),"
             f"{q('vd verse '+WORK)},{ver['verses']},{q('verses='+str(ver['verses']))})")
          PY
      - name: Commit stats
        if: always()
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add apps/web/public/data/book-stats/*.json .vd/*.json 2>/dev/null || true
          git commit -m "chore(${{ github.event.inputs.work }}): verse ingest stats [skip ci]" 2>/dev/null || { echo none; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main 2>/dev/null || true
            if git push origin main 2>/dev/null; then echo pushed; break; fi
            sleep $((RANDOM % 5 + 2))
          done

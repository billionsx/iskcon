name: ig-probe
on:
  workflow_dispatch:
    inputs:
      user:
        description: instagram username to probe
        default: iskcon_noida
        required: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: pip install "instagrapi==2.1.2" pillow
      - name: probe
        env:
          IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
          IG_USER: ${{ inputs.user }}
        run: |
          python3 - <<'PY'
          import os, urllib.parse, urllib.request, traceback
          from instagrapi import Client
          def note(m): print("::notice::" + str(m).replace("\n", " ")[:400], flush=True)
          def err(m):  print("::error::" + str(m).replace("\n", " ")[:400], flush=True)
          raw = os.environ["IG_SESSIONID"]; user = os.environ.get("IG_USER") or "iskcon_noida"
          cands = [raw]
          dec = urllib.parse.unquote(raw)
          if dec != raw: cands.append(dec)
          cl = None
          for j, sid in enumerate(cands):
              c = Client(); c.delay_range = [1, 3]
              try:
                  c.login_by_sessionid(sid); note(f"LOGIN_OK variant={j}"); cl = c; break
              except Exception as e:
                  err(f"LOGIN_FAIL v{j} {type(e).__name__}: {e}")
          if cl is None: raise SystemExit(1)
          try:
              uid = cl.user_id_from_username(user); note(f"UID {uid}")
              ms = cl.user_medias(uid, amount=5); note(f"GOT {len(ms)} medias")
              for i, m in enumerate(ms):
                  res = getattr(m, "resources", None)
                  note(f"[{i}] {m.taken_at} type={m.media_type} carousel={len(res) if res else 0} {str(m.thumbnail_url)[:90]}")
              if ms:
                  b = urllib.request.urlopen(urllib.request.Request(str(ms[0].thumbnail_url), headers={"User-Agent": "Mozilla/5.0"}), timeout=30).read()
                  note(f"IMG_BYTES {len(b)}")
          except Exception as e:
              err(f"FETCH_FAIL {type(e).__name__}: {e}"); raise SystemExit(2)
          PY

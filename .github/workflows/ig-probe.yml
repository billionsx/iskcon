name: ig-probe
on:
  workflow_dispatch:
    inputs:
      user:
        description: instagram username to probe
        default: iskcon_noida
        required: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: pip install "instagrapi==2.1.2" pillow
      - name: probe
        env:
          IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
          IG_USER: ${{ inputs.user }}
        run: |
          python3 - <<'PY'
          import os, urllib.request, traceback
          from instagrapi import Client
          sid = os.environ["IG_SESSIONID"]; user = os.environ.get("IG_USER") or "iskcon_noida"
          cl = Client(); cl.delay_range = [1, 3]
          try:
              cl.login_by_sessionid(sid)
              print("LOGIN_OK")
          except Exception as e:
              print("LOGIN_FAIL", type(e).__name__, str(e)[:300]); traceback.print_exc(); raise SystemExit(1)
          uid = cl.user_id_from_username(user)
          print("UID", uid)
          ms = cl.user_medias(uid, amount=5)
          print("GOT", len(ms), "medias")
          for i, m in enumerate(ms):
              res = getattr(m, "resources", None)
              print(i, "taken", m.taken_at, "type", m.media_type, "carousel", (len(res) if res else 0), "url", str(m.thumbnail_url)[:95])
          if ms:
              u = str(ms[0].thumbnail_url)
              b = urllib.request.urlopen(urllib.request.Request(u, headers={"User-Agent": "Mozilla/5.0"}), timeout=30).read()
              print("IMG_BYTES", len(b))
          PY

name: ig-probe
on:
  workflow_dispatch:
    inputs:
      user:
        default: iskcon_noida
        required: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: mirrors
        env:
          IG_USER: ${{ inputs.user }}
        run: |
          python3 - <<'PY'
          import urllib.request, re, os
          U = os.environ.get("IG_USER") or "iskcon_noida"
          def note(m): print("::notice::" + str(m).replace("\n"," ")[:380], flush=True)
          def err(m):  print("::error::" + str(m).replace("\n"," ")[:380], flush=True)
          hdr = {"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0 Safari/537.36","Accept-Language":"en-US,en;q=0.9","Accept":"text/html,application/xhtml+xml"}
          mirrors = [
            ("imginn",  f"https://imginn.com/{U}/"),
            ("imginn2", f"https://imginn.org/{U}/"),
            ("pixwox",  f"https://www.pixwox.com/profile/{U}/"),
            ("picnob",  f"https://www.picnob.com/profile/{U}/"),
            ("gramhir", f"https://gramhir.com/profile/{U}/"),
            ("dumpor",  f"https://dumpor.com/v/{U}"),
            ("storiesig", f"https://storiesig.info/en/{U}"),
          ]
          for name, url in mirrors:
              try:
                  r = urllib.request.urlopen(urllib.request.Request(url, headers=hdr), timeout=25)
                  body = r.read().decode("utf-8","ignore")
                  imgs = set(re.findall(r'https://[^\s"\'<>\\]+?\.(?:jpg|jpeg|webp)', body))
                  cdn = [u for u in imgs if any(k in u for k in ("cdninstagram","fbcdn","scontent"))]
                  samp = (sorted(cdn) or sorted(imgs))[:1]
                  note(f"{name} HTTP{r.status} len={len(body)} imgs={len(imgs)} igcdn={len(cdn)} {samp}")
              except Exception as e:
                  code = getattr(e, "code", "")
                  err(f"{name} {type(e).__name__} {code}: {str(e)[:110]}")
          PY

name: vedabase probe (диагностика структуры книги)
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Catalog probe
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import re, json, urllib.request
          import html as H
          CF=__import__("os").environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          def get(url):
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"ru"}), timeout=30) as r:
                      return r.status, r.read().decode("utf-8","replace")
              except Exception as e: return 0, f"ERR:{type(e).__name__}"
          def d1(sql,params=None):
              b={"sql":sql}
              if params is not None: b["params"]=params
              urllib.request.urlopen(urllib.request.Request(D1, data=json.dumps(b).encode(),
                headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}), timeout=60).read()
          # 1) индекс книг gitabase (rus)
          st,html=get("https://gitabase.com/rus")
          codes=sorted(set(re.findall(r'/rus/([A-Za-z]{2,10})\b', html))) if st==200 else []
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'gcat index',"+str(st)+",?)", params=["codes="+",".join(codes)[:1500]])
          # 2) пробуем коды для недостающих
          for code in ["VP","ViP","VishnuPurana","GL","GLA","KrishnaSandarbha","KS","Sandarbha","BhaktiSandarbha"]:
              s2,h2=get(f"https://gitabase.com/rus/{code}")
              ttl=""
              if s2==200:
                  m=re.search(r'<title>(.*?)</title>', h2, re.S)
                  ttl=H.unescape(re.sub(r'\s+',' ',m.group(1))).strip()[:80] if m else "?"
              d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'gcat "+code+"',"+str(s2)+",?)", params=[ttl])
          print("done", st, codes[:40])
          PY

# РАЗВЕДКА канала катхи — БЕЗ скачивания. Пишет ВСЕ сообщения (аудио + текстовые
# заголовки альбомов) в docs/diagnostics/katha-probe.json: по нему строится карта
# альбомов перед заливкой (ЗКН-Пл010).
name: "Катха · разведка канала"
run-name: "katha-probe · ${{ inputs.channel }}"

concurrency:
  group: tg-archive-session      # ЗКН-Пл003: одна сессия Telegram — одна очередь
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Канал (@name или t.me/name)"
        default: "@radhagovindasw"
      limit:
        description: "Лимит сообщений (пусто = весь канал)"
        default: ""

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Зависимости
        run: pip install -r tools/tg-archive/requirements.txt

      - name: Инвентаризация
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_CHANNELS: ${{ inputs.channel || '@radhagovindasw' }}
          TG_LIMIT: ${{ inputs.limit }}
          PROBE_OUT: "../../docs/diagnostics/katha-probe.json"
        run: |
          set +e
          python katha_probe.py 2>&1 | tee /tmp/probe.log
          rc=${PIPESTATUS[0]}
          [ $rc -ne 0 ] && echo "::error title=katha-probe::$(tail -c 1500 /tmp/probe.log | tr '\n\r\t' '   ')"
          exit $rc

      - name: Инвентарь → в репо (песочница читает из main)
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add docs/diagnostics/katha-probe.json
          git diff --cached --quiet && { echo "нечего коммитить"; exit 0; }
          git commit -m "Катха: инвентарь канала [skip ci]"
          for i in 1 2 3 4 5 6; do
            git pull --rebase -q origin main && git push -q origin HEAD:main && break
            sleep 5
          done

      - uses: actions/upload-artifact@v4
        with:
          name: katha-probe
          path: docs/diagnostics/katha-probe.json
          retention-days: 7

name: reading-probe

# Разовый замер модели данных для «Стих дня» (системное чтение БГ→ШБ→ЧЧ):
# порядок works, издания, плотность/монотонность verses.ordinal, покрытие пурпортами.
# Результат — в ветку ci/reading-probe (НЕ в main), чтобы не триггерить деплой.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Probe D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 'd5cbe19470dc38599873eabfe148e6d1'
        run: |
          set -e
          mkdir -p docs/diag /tmp/q
          run() { npx --yes wrangler@latest d1 execute iskcon --remote --json --config apps/web/wrangler.toml --command "$2" > "/tmp/q/$1.json" 2>/dev/null || echo "[]" > "/tmp/q/$1.json"; }
          run unit_bg1 "SELECT v.ref, v.ordinal vord, d.ordinal dord, CASE WHEN TRIM(COALESCE(vt.purport,''))<>'' THEN 1 ELSE 0 END hp FROM verses v JOIN divisions d ON d.id=v.division_id LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id='bg-ru' WHERE v.work_id='bg' AND (d.ordinal>1 OR (d.ordinal=1 AND v.ordinal>=1)) ORDER BY d.ordinal, v.ordinal LIMIT 8"
          run unit_cc1 "SELECT v.ref, v.id, v.ordinal vord, CASE WHEN TRIM(COALESCE(vt.purport,''))<>'' THEN 1 ELSE 0 END hp FROM verses v JOIN divisions d ON d.id=v.division_id LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id='cc-ru' WHERE v.work_id='cc' AND (d.ordinal>=2) ORDER BY d.ordinal, v.ordinal LIMIT 16"
          run bg_total "SELECT COUNT(*) bg_total FROM verses WHERE work_id='bg'"
          run combined "SELECT id, ref, ordinal FROM verses WHERE id LIKE 'bg.13.%' ORDER BY ordinal LIMIT 5"
          run maxgap "SELECT work_id, MAX(gap) max_gap FROM (SELECT v.work_id, d.ordinal, COUNT(*) gap FROM verses v JOIN divisions d ON d.id=v.division_id LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id=v.work_id||'-ru' WHERE v.work_id IN ('bg','sb','cc') GROUP BY v.division_id) GROUP BY work_id"
          python3 - << 'PY'
          import json, glob, os
          out={}
          for f in glob.glob('/tmp/q/*.json'):
              name=os.path.basename(f)[:-5]
              raw=open(f, encoding='utf-8', errors='replace').read()
              i=raw.find('[')
              try: d=json.loads(raw[i:]) if i>=0 else []
              except Exception: d=[]
              res=d[0].get('results') if (isinstance(d,list) and d and isinstance(d[0],dict)) else d
              out[name]=res
          json.dump(out, open('docs/diag/reading_probe.json','w'), ensure_ascii=False, indent=2)
          print(json.dumps(out, ensure_ascii=False)[:3500])
          PY

      - name: Publish to side branch
        run: |
          git config user.name "ci-reading"
          git config user.email "ci@local"
          git checkout -B ci/reading-probe
          git add -f docs/diag/reading_probe.json
          git commit -m "ci: reading-plan D1 probe [skip ci]" || echo "nothing to commit"
          git push -f origin ci/reading-probe

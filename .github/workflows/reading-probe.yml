name: reading-probe

# Разовый замер модели данных для «Стих дня» (системное чтение БГ→ШБ→ЧЧ):
# порядок works, издания, плотность/монотонность verses.ordinal, покрытие пурпортами.
# Результат — в ветку ci/reading-probe (НЕ в main), чтобы не триггерить деплой.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Probe D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 'd5cbe19470dc38599873eabfe148e6d1'
        run: |
          set -e
          mkdir -p docs/diag /tmp/q
          run() { npx --yes wrangler@latest d1 execute iskcon --remote --json --config apps/web/wrangler.toml --command "$2" > "/tmp/q/$1.json" 2>/dev/null || echo "[]" > "/tmp/q/$1.json"; }
          run cc_gaps "WITH pos AS (SELECT ROW_NUMBER() OVER (ORDER BY d.ordinal, v.ordinal) rn, CASE WHEN TRIM(COALESCE(vt.purport,''))<>'' THEN 1 ELSE 0 END hp FROM verses v JOIN divisions d ON d.id=v.division_id LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id='cc-ru' WHERE v.work_id='cc'), pp AS (SELECT rn FROM pos WHERE hp=1) SELECT (SELECT MIN(rn) FROM pp) first_purp, (SELECT MAX(rn) FROM pos) last_pos, (SELECT MAX(rn) FROM pp) last_purp, MAX(rn-prev) max_gap FROM (SELECT rn, LAG(rn) OVER (ORDER BY rn) prev FROM pp)"
          run sb_gaps "WITH pos AS (SELECT ROW_NUMBER() OVER (ORDER BY d.ordinal, v.ordinal) rn, CASE WHEN TRIM(COALESCE(vt.purport,''))<>'' THEN 1 ELSE 0 END hp FROM verses v JOIN divisions d ON d.id=v.division_id LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id='sb-ru' WHERE v.work_id='sb'), pp AS (SELECT rn FROM pos WHERE hp=1) SELECT (SELECT MIN(rn) FROM pp) first_purp, (SELECT MAX(rn) FROM pos) last_pos, MAX(rn-prev) max_gap FROM (SELECT rn, LAG(rn) OVER (ORDER BY rn) prev FROM pp)"
          run bg_gaps "WITH pos AS (SELECT ROW_NUMBER() OVER (ORDER BY d.ordinal, v.ordinal) rn, CASE WHEN TRIM(COALESCE(vt.purport,''))<>'' THEN 1 ELSE 0 END hp FROM verses v JOIN divisions d ON d.id=v.division_id LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id='bg-ru' WHERE v.work_id='bg'), pp AS (SELECT rn FROM pos WHERE hp=1) SELECT (SELECT MIN(rn) FROM pp) first_purp, (SELECT MAX(rn) FROM pos) last_pos, MAX(rn-prev) max_gap FROM (SELECT rn, LAG(rn) OVER (ORDER BY rn) prev FROM pp)"
          run cc_adi1 "SELECT MIN(CASE WHEN hp=1 THEN vord END) first_purp_vord, COUNT(*) verses, SUM(hp) purps FROM (SELECT v.ordinal vord, CASE WHEN TRIM(COALESCE(vt.purport,''))<>'' THEN 1 ELSE 0 END hp FROM verses v LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id='cc-ru' WHERE v.division_id='cc.adi.1')"
          run cc_zero "SELECT d.id, COUNT(v.id) verses, SUM(CASE WHEN TRIM(COALESCE(vt.purport,''))<>'' THEN 1 ELSE 0 END) purps FROM divisions d JOIN verses v ON v.division_id=d.id LEFT JOIN verse_texts vt ON vt.verse_id=v.id AND vt.edition_id='cc-ru' WHERE d.work_id='cc' AND d.level='chapter' GROUP BY d.id HAVING purps=0 LIMIT 20"
          python3 - << 'PY'
          import json, glob, os
          out={}
          for f in glob.glob('/tmp/q/*.json'):
              name=os.path.basename(f)[:-5]
              raw=open(f, encoding='utf-8', errors='replace').read()
              i=raw.find('[')
              try: d=json.loads(raw[i:]) if i>=0 else []
              except Exception: d=[]
              res=d[0].get('results') if (isinstance(d,list) and d and isinstance(d[0],dict)) else d
              out[name]=res
          json.dump(out, open('docs/diag/reading_probe.json','w'), ensure_ascii=False, indent=2)
          print(json.dumps(out, ensure_ascii=False)[:3500])
          PY

      - name: Publish to side branch
        run: |
          git config user.name "ci-reading"
          git config user.email "ci@local"
          git checkout -B ci/reading-probe
          git add -f docs/diag/reading_probe.json
          git commit -m "ci: reading-plan D1 probe [skip ci]" || echo "nothing to commit"
          git push -f origin ci/reading-probe

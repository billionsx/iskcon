name: reading-probe

# Разовый замер модели данных для «Стих дня» (системное чтение БГ→ШБ→ЧЧ):
# порядок works, издания, плотность/монотонность verses.ordinal, покрытие пурпортами.
# Результат — в ветку ci/reading-probe (НЕ в main), чтобы не триггерить деплой.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Probe D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 'd5cbe19470dc38599873eabfe148e6d1'
        run: |
          set -e
          mkdir -p docs/diag /tmp/q
          run() { npx --yes wrangler@latest d1 execute iskcon --remote --json --config apps/web/wrangler.toml --command "$2" > "/tmp/q/$1.json" 2>/dev/null || echo "[]" > "/tmp/q/$1.json"; }
          run divsb "SELECT id, parent_id, level, number, ordinal FROM divisions WHERE work_id='sb' ORDER BY ordinal LIMIT 22"
          run divcc "SELECT id, parent_id, level, number, ordinal FROM divisions WHERE work_id='cc' ORDER BY ordinal LIMIT 22"
          run divbg "SELECT id, parent_id, level, number, ordinal FROM divisions WHERE work_id='bg' ORDER BY ordinal LIMIT 20"
          run divlevels "SELECT work_id, level, COUNT(*) n, MIN(ordinal) mn, MAX(ordinal) mx, SUM(CASE WHEN ordinal IS NULL THEN 1 ELSE 0 END) nulls FROM divisions WHERE work_id IN ('bg','sb','cc') GROUP BY work_id, level"
          run orderchk "SELECT v.id, d.ordinal dord, v.ordinal vord FROM verses v JOIN divisions d ON d.id=v.division_id WHERE v.work_id='sb' AND d.level='chapter' ORDER BY d.ordinal, v.ordinal LIMIT 18"
          run orderchk_cc "SELECT v.id, d.ordinal dord, v.ordinal vord FROM verses v JOIN divisions d ON d.id=v.division_id WHERE v.work_id='cc' AND d.level='chapter' ORDER BY d.ordinal, v.ordinal LIMIT 14"
          run chapdiv_counts "SELECT work_id, COUNT(*) chapters FROM divisions WHERE work_id IN ('bg','sb','cc') AND level='chapter' GROUP BY work_id"
          python3 - << 'PY'
          import json, glob, os
          out={}
          for f in glob.glob('/tmp/q/*.json'):
              name=os.path.basename(f)[:-5]
              raw=open(f, encoding='utf-8', errors='replace').read()
              i=raw.find('[')
              try: d=json.loads(raw[i:]) if i>=0 else []
              except Exception: d=[]
              res=d[0].get('results') if (isinstance(d,list) and d and isinstance(d[0],dict)) else d
              out[name]=res
          json.dump(out, open('docs/diag/reading_probe.json','w'), ensure_ascii=False, indent=2)
          print(json.dumps(out, ensure_ascii=False)[:3500])
          PY

      - name: Publish to side branch
        run: |
          git config user.name "ci-reading"
          git config user.email "ci@local"
          git checkout -B ci/reading-probe
          git add -f docs/diag/reading_probe.json
          git commit -m "ci: reading-plan D1 probe [skip ci]" || echo "nothing to commit"
          git push -f origin ci/reading-probe

# Разведка каналов ШБ. Читает метаданные аудио 12 каналов «Шримад-Бхагаватам, песнь N»
# и кладёт инвентарь в docs/diagnostics/sb-audio-probe.json. Ничего не качает и не льёт.
name: "Разведка каналов ШБ (инвентарь аудио)"
run-name: "sb-audio-probe"

concurrency:
  group: tg-archive-session
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Лимит сообщений на канал (пусто = все)"
        default: ""

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Зависимости"
        run: pip install -r tools/tg-archive/requirements.txt

      - name: "Инвентарь 12 каналов"
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_LIMIT: ${{ inputs.limit }}
          PROBE_OUT: "../../docs/diagnostics/sb-audio-probe.json"
          TG_CHANNELS: >-
            https://t.me/srimad_bhagavatam_pesn_1,https://t.me/srimad_bhagavatam_pesn_2,https://t.me/srimad_bhagavatam_pesn_3,https://t.me/srimad_bhagavatam_pesn_4,https://t.me/srimad_bhagavatam_pesn_5,https://t.me/srimad_bhagavatam_pesn_6,https://t.me/srimad_bhagavatam_pesn_7,https://t.me/srimad_bhagavatam_pesn_8,https://t.me/srimad_bhagavatam_pesn_9,https://t.me/srimad_bhagavatam_pesn_10,https://t.me/srimad_bhagavatam_pesn_11,https://t.me/srimad_bhagavatam_pesn_12
        run: |
          set +e
          python tg_probe.py 2>&1 | tee /tmp/probe.log
          rc=${PIPESTATUS[0]}
          [ $rc -ne 0 ] && echo "::error title=sb-probe::$(tail -c 1500 /tmp/probe.log | tr '\n\r\t' '   ')"
          exit $rc

      - name: "Инвентарь → в репо"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add docs/diagnostics/sb-audio-probe.json
          git commit -m "sb: инвентарь аудио-каналов [skip ci]" || { echo "нечего коммитить"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase "https://x-access-token:${GH_TOKEN}@github.com/billionsx/iskcon.git" main || true
            git push "https://x-access-token:${GH_TOKEN}@github.com/billionsx/iskcon.git" HEAD:main && break
            sleep 3
          done

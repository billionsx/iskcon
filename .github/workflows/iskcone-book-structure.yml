name: iskcone book structure (CC + SB skeleton)

on:
  workflow_dispatch:

jobs:
  struct:
    runs-on: ubuntu-latest
    steps:
      - name: Load CC + SB division/chapter skeleton into divisions
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def q(sql, params=None):
              body=json.dumps({"sql":sql,"params":params or []}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq) as r: return json.loads(r.read().decode())["result"][0]["results"]
          def js(ru, en=None): return json.dumps({"en": en or ru, "ru": ru}, ensure_ascii=False)

          # ── Шри Чайтанья-чаритамрита (cc): 3 лилы → главы ──
          CC=[("adi","Ади-лила",17),("madhya","Мадхья-лила",25),("antya","Антья-лила",20)]
          # ── Шримад-Бхагаватам (sb): 12 песней → главы ──
          SB_CH=[19,10,33,31,26,19,15,24,24,90,31,13]

          # чистим прежние divisions/verses этих книг (идемпотентно)
          for wid in ("cc","sb"):
              q("DELETE FROM verses WHERE work_id=?", [wid])
              q("DELETE FROM divisions WHERE work_id=?", [wid])

          dord=0; n_div=0; n_ch=0
          # CC
          for li,(slug,label,nch) in enumerate(CC, start=1):
              dord+=1; n_div+=1
              did=f"cc.{slug}"
              q("INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) VALUES (?,?,?,?,?,?,?)",
                [did,"cc",None,"division",str(li),js(label),dord])
              for ch in range(1,nch+1):
                  dord+=1; n_ch+=1
                  q("INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) VALUES (?,?,?,?,?,?,?)",
                    [f"cc.{slug}.{ch}","cc",did,"chapter",str(ch),js(f"{label}, глава {ch}"),dord])
          # SB
          for canto, nch in enumerate(SB_CH, start=1):
              dord+=1; n_div+=1
              did=f"sb.{canto}"
              q("INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) VALUES (?,?,?,?,?,?,?)",
                [did,"sb",None,"division",str(canto),js(f"Песнь {canto}"),dord])
              for ch in range(1,nch+1):
                  dord+=1; n_ch+=1
                  q("INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) VALUES (?,?,?,?,?,?,?)",
                    [f"sb.{canto}.{ch}","sb",did,"chapter",str(ch),js(f"Песнь {canto}, глава {ch}"),dord])

          q("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone book structure',?,?)",
            [str(n_div+n_ch), f"cc+sb divisions={n_div} chapters={n_ch}"])
          print(f"DONE divisions(lila/canto)={n_div} chapters={n_ch}")
          PY

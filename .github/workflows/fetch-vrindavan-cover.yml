name: Fetch Krishna-Balaram-Mandir cover from Wikimedia

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve & download from Wikimedia, convert to webp
        run: |
          set -e
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          import json, urllib.request, os
          API = "https://commons.wikimedia.org/w/api.php?action=query&prop=imageinfo&iiprop=url|size&format=json&titles="
          # Several candidates – pick the first that resolves to a reasonably large landscape JPG
          candidates = [
              "File:At Krishna Balaram Mandir, Vrindavan, India, 2015-03-15.jpg",
              "File:Sri Krishna Balaram Temple, Vrindavan.JPG",
              "File:Krishna-Balaram-Mandir.JPG",
              "File:In and around of Sri Krishna-Balaram Mandir, Vrindavan 01.jpg",
              "File:In and around of Sri Krishna-Balaram Mandir, Vrindavan 06.jpg",
          ]
          chosen = None
          for title in candidates:
              url = API + urllib.request.quote(title)
              req = urllib.request.Request(url, headers={"User-Agent": "iskcon-one-love/1.0 (ceo@billionsx.com)"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.load(r)
              pages = data.get("query", {}).get("pages", {})
              for _pid, p in pages.items():
                  if "imageinfo" in p and p["imageinfo"]:
                      ii = p["imageinfo"][0]
                      furl = ii.get("url")
                      w, h = ii.get("width", 0), ii.get("height", 0)
                      print(title, "->", furl, w, "x", h)
                      if furl and w >= 1200 and w >= h:
                          chosen = (title, furl)
                          break
              if chosen: break
          assert chosen, "No suitable image found"
          title, furl = chosen
          print("CHOSEN:", title, furl)
          req = urllib.request.Request(furl, headers={"User-Agent": "iskcon-one-love/1.0 (ceo@billionsx.com)"})
          with urllib.request.urlopen(req, timeout=120) as r:
              raw = r.read()
          open("/tmp/kbm.bin", "wb").write(raw)
          from PIL import Image
          im = Image.open("/tmp/kbm.bin").convert("RGB")
          # Limit to ~1600 wide for app use
          if im.size[0] > 1600:
              ratio = 1600 / im.size[0]
              im = im.resize((1600, int(im.size[1]*ratio)), Image.LANCZOS)
          out = "apps/web/public/media/vrindavan.webp"
          im.save(out, "WEBP", quality=84, method=6)
          print("WROTE:", out, im.size, os.path.getsize(out), "bytes")
          # Credit file (commons attribution)
          open("apps/web/public/media/vrindavan.credit.txt", "w").write(
              f"Source: Wikimedia Commons — {title}\nURL: {furl}\nFetched: workflow run\n"
          )
          PY

      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A apps/web/public/media/vrindavan.webp apps/web/public/media/vrindavan.credit.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "media: Krishna-Balaram-Mandir cover for Vrindavan (Wikimedia Commons)"
            git push origin HEAD:main
          fi
          git rev-parse HEAD

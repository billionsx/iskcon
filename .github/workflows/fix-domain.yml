name: Fix domain binding (worker custom domain)

# ЗКН-Н087·Г — привязчик custom domain воркера через CF API.
# Родился 18.07.2026: wrangler deploy «успешен», а домен api.brajs.com не завёлся —
# витрины пустые. Этот workflow диагностирует зону/DNS/worker-domains, привязывает
# host → service, чистит конфликтные записи и пишет ВСЁ в deploy_checks (base64),
# чтобы результат был читаем снаружи без доступа к логам Actions.

on:
  workflow_dispatch:
    inputs:
      hostname:
        description: "Хост для привязки"
        required: false
        default: "api.brajs.com"
      service:
        description: "Имя воркера"
        required: false
        default: "iskcon-api"
      zone:
        description: "Зона Cloudflare"
        required: false
        default: "brajs.com"
      probe_path:
        description: "Путь финальной пробы на хосте"
        required: false
        default: "/v1/health"

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose + bind hostname to worker, record into D1
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HOSTN: ${{ github.event.inputs.hostname }}
          SVC: ${{ github.event.inputs.service }}
          ZN: ${{ github.event.inputs.zone }}
          PP: ${{ github.event.inputs.probe_path }}
        run: |
          set +e
          ACCT=d5cbe19470dc38599873eabfe148e6d1
          DB=6226aded-dd03-4e74-977f-9cd0b509e73d
          API=https://api.cloudflare.com/client/v4
          auth=(-H "Authorization: Bearer $T" -H "Content-Type: application/json")

          d1ins() {
            body=$(jq -nc --arg t "$1" --arg h "$2" --arg b "$3" \
              '{sql:"INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime(\u0027now\u0027),?,?,?)",params:[$t,$h,$b]}')
            curl -s -X POST "$API/accounts/$ACCT/d1/database/$DB/query" "${auth[@]}" --data "$body" >/dev/null
          }

          ZONE=$(curl -s "$API/zones?name=$ZN" "${auth[@]}" | jq -r '.result[0].id')
          echo "zone($ZN)=$ZONE"
          d1ins "fixdom zone $ZN" 0 "$(printf '%s' "$ZONE" | base64 -w0)"

          DNS=$(curl -s "$API/zones/$ZONE/dns_records?per_page=100" "${auth[@]}")
          WD=$(curl -s "$API/accounts/$ACCT/workers/domains?per_page=100" "${auth[@]}")
          echo "DNS names:"; printf '%s' "$DNS" | jq -r '.result[]? | "  \(.type) \(.name) -> \(.content) proxied=\(.proxied)"'
          echo "Worker domains:"; printf '%s' "$WD" | jq -r '.result[]? | "  \(.hostname) -> \(.service)/\(.environment)"'
          d1ins "fixdom diag-dns $ZN"  0 "$(printf '%s' "$DNS" | jq -c '[.result[]? | {type,name,content,proxied}]' | base64 -w0)"
          d1ins "fixdom diag-wdom" 0 "$(printf '%s' "$WD" | jq -c '[.result[]? | {hostname,service}]' | base64 -w0)"

          attach() {
            abody=$(jq -nc --arg z "$ZONE" --arg host "$HOSTN" --arg s "$SVC" \
              '{environment:"production",hostname:$host,service:$s,zone_id:$z}')
            curl -s -X PUT "$API/accounts/$ACCT/workers/domains" "${auth[@]}" --data "$abody"
          }
          r=$(attach)
          ok=$(printf '%s' "$r" | jq -r '.success')
          echo "attach $HOSTN -> $SVC success=$ok errors=$(printf '%s' "$r" | jq -c '.errors')"
          if [ "$ok" != "true" ]; then
            ids=$(printf '%s' "$DNS" | jq -r --arg h "$HOSTN" \
              '.result[]? | select(.name==$h and (.type=="A" or .type=="AAAA" or .type=="CNAME")) | .id')
            for id in $ids; do
              echo "deleting conflicting record $id ($HOSTN)"
              curl -s -X DELETE "$API/zones/$ZONE/dns_records/$id" "${auth[@]}" >/dev/null
            done
            sleep 2
            r=$(attach); ok=$(printf '%s' "$r" | jq -r '.success')
            echo "re-attach -> success=$ok errors=$(printf '%s' "$r" | jq -c '.errors')"
          fi
          d1ins "fixdom bind $HOSTN" 0 "$(printf '%s' "$r" | base64 -w0)"

          echo "waiting for edge..."
          code=000
          for i in $(seq 1 12); do
            sleep 10
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://$HOSTN$PP")
            echo "  probe $i: https://$HOSTN$PP -> $code"
            [ "$code" = "200" ] && break
          done
          d1ins "fixdom final https://$HOSTN$PP" "${code:-0}" ""
          echo "done ($code)"

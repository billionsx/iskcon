name: iskcone NOD ingest (Нектар преданности · проза)

# «Нектар преданности» (The Nectar of Devotion, vedabase slug nod) — ПРОЗА:
# 4 части нет, просто Предисловие + Введение + Главы 1..51, абзацы прозы.
# Модель в D1 (work brs): divisions (level=chapter) = разделы, verses = абзацы
# (translation = текст абзаца, edition brs-ru). Никаких deva/translit/tokens/purport.
#
# mode=probe — выяснить структуру (индекс глав + образец абзацев), БЕЗ записи в D1.
# mode=all   — полный ингест в D1 (идемпотентно, резюмируемо).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "probe | all"
        default: "probe"
      force:
        description: "перезаливать уже залитые разделы (true/false)"
        default: "false"
      max_minutes:
        description: "бюджет минут"
        default: "40"

permissions:
  contents: write

jobs:
  nod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: pip install --quiet beautifulsoup4 lxml
      - name: Run
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MODE: ${{ github.event.inputs.mode }}
          FORCE: ${{ github.event.inputs.force }}
          MAXMIN: ${{ github.event.inputs.max_minutes }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request
          from bs4 import BeautifulSoup
          MODE=(os.environ.get("MODE") or "probe").strip()
          FORCE=(os.environ.get("FORCE") or "false").strip()=="true"
          BUDGET=float(os.environ.get("MAXMIN") or "40")*60
          T0=time.time()
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          BASE="https://vedabase.io/ru/library/nod/"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"

          def d1(sql, many=None):
              payload={"sql":sql} if many is None else {"sql":sql,"params":many}
              rq=urllib.request.Request(D1, data=json.dumps(payload).encode(),
                  headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq, timeout=90) as r:
                  j=json.loads(r.read().decode())
                  if not j.get("success"): raise RuntimeError(str(j)[:400])
                  return j["result"][0]["results"]
          def q(v): return "NULL" if v is None else "'"+str(v).replace("'","''")+"'"
          def get(url, tries=4):
              for t in range(tries):
                  try:
                      rq=urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"ru,en;q=0.8","accept":"text/html"})
                      with urllib.request.urlopen(rq, timeout=40) as r:
                          if r.status==200: return r.read().decode("utf-8","replace")
                  except Exception: pass
                  time.sleep(1.5*(t+1))
              return ""

          # ── индекс глав: ссылки вида /ru/library/nod/<seg>/ ──
          def chapter_index():
              html=get(BASE)
              soup=BeautifulSoup(html,"lxml")
              seen={}; order=[]
              for a in soup.select("a[href]"):
                  href=a.get("href","")
                  m=re.search(r"/ru/library/nod/([^/]+)/?$", href)
                  if not m: continue
                  seg=m.group(1)
                  if seg in ("",): continue
                  title=re.sub(r"\s+"," ",a.get_text()).strip()
                  if seg not in seen:
                      seen[seg]=title; order.append(seg)
              # порядок: preface, introduction, затем числовые по возрастанию, прочее в конце
              def keyf(s):
                  if s=="preface": return (0,0)
                  if s=="introduction": return (1,0)
                  if s.isdigit(): return (2,int(s))
                  return (3,0)
              order=sorted(order, key=keyf)
              return [(s, seen[s]) for s in order]

          # ── извлечение прозы главы: заголовок + абзацы ──
          BOILER=re.compile(r"(Поддержать|Support Us|Privacy|Bhaktivedanta VedaBase|Спасибо|vedabase\.io|t\.me/|facebook\.com|Settings|Настройки)", re.I)
          def parse_chapter(html):
              soup=BeautifulSoup(html,"lxml")
              h1=soup.select_one("h1")
              title=re.sub(r"\s+"," ", h1.get_text()).strip() if h1 else ""
              # кандидатные контейнеры прозы (vedabase): .r-paragraph, затем эвристика
              paras=[]
              cand=soup.select(".r-paragraph, .r-prose p, .r-verse-text, .av-purport, .text-justify p")
              classes_seen=set()
              if cand:
                  for e in cand:
                      classes_seen.update(e.get("class") or [])
                      for br in e.find_all("br"): br.replace_with("\n")
                      t=re.sub(r"[ \t]+"," ", e.get_text()).strip()
                      if t and not BOILER.search(t): paras.append(t)
              if not paras:
                  # фолбэк: берём контейнер с максимумом <p>, вне nav/header/footer/aside
                  best=None; bestn=0
                  for div in soup.find_all(["div","article","section","main"]):
                      if div.find_parent(["nav","header","footer","aside"]): continue
                      ps=[p for p in div.find_all("p", recursive=False)]
                      if len(ps)>bestn: best,bestn=div,len(ps)
                  if best is not None:
                      for p in best.find_all("p"):
                          for br in p.find_all("br"): br.replace_with("\n")
                          t=re.sub(r"[ \t]+"," ", p.get_text()).strip()
                          if t and not BOILER.search(t): paras.append(t)
              if not paras:
                  # последний фолбэк: все <p> страницы минус boiler/nav
                  for p in soup.find_all("p"):
                      if p.find_parent(["nav","header","footer","aside"]): continue
                      t=re.sub(r"[ \t]+"," ", p.get_text()).strip()
                      if t and not BOILER.search(t): paras.append(t)
              # склейка пустых и дедуп подряд
              out=[]
              for t in paras:
                  if out and t==out[-1]: continue
                  out.append(t)
              return title, out, sorted(classes_seen)

          idx=chapter_index()
          print("INDEX:", len(idx), "разделов:", json.dumps(idx[:6], ensure_ascii=False), "…")

          if MODE=="probe":
              sample={}
              for seg in ["preface", "introduction", "1", "16"]:
                  if not any(s==seg for s,_ in idx): continue
                  title,paras,classes=parse_chapter(get(BASE+seg+"/"))
                  sample[seg]={"title":title,"n_paragraphs":len(paras),"classes_seen":classes,
                               "first_paragraphs":paras[:3], "last_paragraph":(paras[-1] if paras else "")}
                  time.sleep(0.5)
              # структурный дамп nod/1: какие элементы несут прозу
              html1=get(BASE+"1/")
              soup=BeautifulSoup(html1,"lxml")
              for t in soup(["script","style","nav","header","footer","aside"]): t.decompose()
              struct=[]
              for el in soup.find_all(True):
                  # прямой текст элемента (без вложенных блоков)
                  direct="".join(c if isinstance(c,str) else "" for c in el.contents)
                  direct=re.sub(r"\s+"," ",direct).strip()
                  if len(direct)>=120:
                      struct.append({"tag":el.name,"class":" ".join(el.get("class") or []),
                                     "id":el.get("id") or "","len":len(direct),"snip":direct[:90]})
              struct=struct[:25]
              # также: классы у потомков main/article/#content
              container=soup.select_one("main, article, #content, .content, [role=main]")
              cont_info=None
              if container:
                  kids={}
                  for ch in container.find_all(True, recursive=True):
                      cl=" ".join(ch.get("class") or [])
                      if cl: kids[cl]=kids.get(cl,0)+1
                  cont_info={"tag":container.name,"class":" ".join(container.get("class") or []),
                             "child_classes":sorted(kids.items(), key=lambda x:-x[1])[:20]}
              os.makedirs(".nod-ingest", exist_ok=True)
              json.dump({"index":idx,"index_count":len(idx),"sample":sample,
                         "struct_nod1":struct,"container_nod1":cont_info,"html1_len":len(html1)},
                        open(".nod-ingest/probe.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
              print("PROBE written. sample segs:", list(sample.keys()), "struct rows:", len(struct))
              raise SystemExit

          # ── MODE=all: полный ингест ──
          d1("INSERT INTO works (id,title,verse_scheme) VALUES ('brs',json_object('ru','Нектар преданности','en','The Nectar of Devotion'),'prose') "
             "ON CONFLICT(id) DO UPDATE SET title=excluded.title")
          d1("INSERT INTO editions (id,work_id,language,title) VALUES ('brs-ru','brs','ru','Нектар преданности') "
             "ON CONFLICT(id) DO NOTHING")

          def num_for(seg, i):
              if seg=="preface": return "-2"
              if seg=="introduction": return "-1"
              if seg.isdigit(): return seg
              return str(1000+i)

          stats={"sections":[], "written_paras":0, "stopped_early":False}
          for i,(seg,ititle) in enumerate(idx):
              if time.time()-T0>BUDGET: stats["stopped_early"]=True; stats["stopped_at"]=seg; break
              div_id=f"brs.{seg}"
              num=num_for(seg,i)
              # резюмируемость: пропускаем уже залитые (если не force)
              existing=d1(f"SELECT COUNT(*) AS n FROM verses WHERE work_id='brs' AND division_id={q(div_id)}")[0]["n"]
              url=BASE+seg+"/"
              title,paras,_=parse_chapter(get(url))
              ttl=title or ititle or seg
              if existing and not FORCE:
                  stats["sections"].append({"seg":seg,"skipped":True,"existing":existing,"title":ttl})
                  continue
              # división upsert
              d1("INSERT INTO divisions (id,work_id,parent_id,level,ordinal,number,title,source_url) "
                 f"VALUES ({q(div_id)},'brs',NULL,'chapter',{i},{q(num)},json_object('ru',{q(ttl)}),{q(url)}) "
                 "ON CONFLICT(id) DO UPDATE SET ordinal=excluded.ordinal, number=excluded.number, title=excluded.title, source_url=excluded.source_url")
              # чистим прежние абзацы раздела (для повторной заливки)
              d1(f"DELETE FROM verse_texts WHERE verse_id IN (SELECT id FROM verses WHERE division_id={q(div_id)})")
              d1(f"DELETE FROM verses WHERE division_id={q(div_id)}")
              # пишем абзацы как verses + verse_texts
              for pi,para in enumerate(paras, start=1):
                  vid=f"{div_id}.{pi}"
                  ref=f"НП {seg}.{pi}"
                  d1("INSERT INTO verses (id,work_id,division_id,ordinal,ref,devanagari,translit,uvaca,source_url) "
                     f"VALUES ({q(vid)},'brs',{q(div_id)},{pi},{q(ref)},NULL,NULL,NULL,{q(url)}) "
                     "ON CONFLICT(id) DO UPDATE SET ordinal=excluded.ordinal")
                  d1("INSERT INTO verse_texts (verse_id,edition_id,translation,purport) "
                     f"VALUES ({q(vid)},'brs-ru',{q(para)},NULL) "
                     "ON CONFLICT(verse_id,edition_id) DO UPDATE SET translation=excluded.translation")
              stats["written_paras"]+=len(paras)
              stats["sections"].append({"seg":seg,"paras":len(paras),"title":ttl})
              print(f"  {seg}: {len(paras)} абз · {ttl[:50]}")

          ver=d1("SELECT COUNT(DISTINCT division_id) AS sections, COUNT(*) AS paras FROM verses WHERE work_id='brs'")[0]
          stats["db_verify"]=ver
          os.makedirs(".nod-ingest", exist_ok=True)
          json.dump(stats, open(".nod-ingest/status.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
          print("DONE:", json.dumps({"written_paras":stats["written_paras"],"stopped_early":stats["stopped_early"],"db":ver}, ensure_ascii=False))
          if ver["paras"]==0: raise SystemExit("EMPTY — ingest produced nothing")
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone nod ingest',"
             +str(ver["paras"])+",'sections="+str(ver["sections"])+" paras="+str(ver["paras"])+" stopped_early="+str(stats["stopped_early"])+"')")
          PY
      - name: Commit status
        if: always()
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add .nod-ingest/*.json 2>/dev/null || true
          git commit -m "chore(nod): ingest/probe status [skip ci]" 2>/dev/null || { echo nothing; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main 2>/dev/null || true
            if git push origin main 2>/dev/null; then echo pushed; break; fi
            sleep $((RANDOM % 5 + 2))
          done

name: kirtans-verify
on: { workflow_dispatch: {} }
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Проверить, что каждая запись реально есть в архиве
        working-directory: tools/tg-archive
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python kirtans_verify.py
      - name: Сохранить список мёртвых
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kirtans-dead
          path: tools/tg-archive/kirtans_dead.json

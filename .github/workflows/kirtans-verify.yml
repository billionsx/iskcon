name: kirtans-verify
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "1 — чинить базу; пусто — только проверить"
        default: ""
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Сверить базу с архивом
        working-directory: tools/tg-archive
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          APPLY: ${{ inputs.apply }}
        run: python kirtans_verify.py

name: Ингест «Чайтанья-мангалы» — прозой (docs/sources → D1)

# ЗКН-Пр007 · ЗКН-БТ001
#
# ПОЧЕМУ ПРОЗОЙ. Первый заход разбирал книгу как стихи и получил НОЛЬ. Гейт отказался
# писать — и был прав: это не сбой разбора, а природа книги. Перевод Субхаг Свами —
# прозаический пересказ, а не стихотворный текст с построчной транслитерацией.
# Разбирать её как стихи значило бы ломать книгу под свой инструмент.
#
# Приложение умеет прозаические книги (как «Нектар преданности»): главы + абзацы.
#
# Гейт сверяет число глав в теле с оглавлением по КАЖДОЙ кханде
# (Сутра · Ади · Мадхья · Шеша). Не сошлось — в базу не пишем.

on:
  workflow_dispatch:

concurrency:
  group: ingest-cm
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Разбор и запись в D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/ingest-chaitanya-mangala.py

name: iskcone bhajan layers (translit + translation)

on:
  workflow_dispatch:

jobs:
  layers:
    runs-on: ubuntu-latest
    steps:
      - name: Split bhajan HTML into translit + translation
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, re, html as H, urllib.request, collections
          CF=os.environ["CF"]
          ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def q(sql, params=None):
              body=json.dumps({"sql":sql,"params":params or []}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq) as r: return json.loads(r.read().decode())["result"][0]["results"]

          BLOCK=re.compile(r'field="text"[^>]*>(.*?)</div>', re.S|re.I)
          BR=re.compile(r'(?i)<br\s*/?>')
          BOLD=re.compile(r'(?i)<(?:strong|b)\b')
          TAGS=re.compile(r'(?s)<[^>]+>')
          # site chrome that pollutes pages (header quote + footer/about)
          CHROME=re.compile(r'(Лучшее, что можно сделать для Господа|ISKCON ONE LOVE|ОНЛАЙН-РЕСУРС|БРАХМА-МАДХВА-ГАУДИЯ|РАЗНЫХ СТРАН)', re.I)
          def clean(s):
              s=H.unescape(TAGS.sub(' ', s))
              return re.sub(r'\s+',' ',s).strip()
          def blocks_of(htmltext):
              out=[]
              for m in BLOCK.finditer(htmltext or ""):
                  inner=m.group(1)
                  out.append((inner, clean(BR.sub(' ', inner))))
              return out

          # 1) load ALL pages; frequency of block signatures -> extra boilerplate net
          pages={}; off=0
          while True:
              rows=q("SELECT alias, html FROM tilda_pages ORDER BY alias LIMIT 25 OFFSET ?", [off])
              if not rows: break
              for r in rows: pages[r["alias"]]=blocks_of(r.get("html") or "")
              off+=25
          n=len(pages); print("pages:", n)
          freq=collections.Counter()
          for blks in pages.values():
              for sig in {b[1] for b in blks if b[1]}: freq[sig]+=1
          thr=max(4,int(0.18*n))
          boiler={sig for sig,c in freq.items() if c>=thr}
          print("boilerplate blocks:", len(boiler), "thr:", thr)

          def parse(blks):
              tr_b=[]; tx_b=[]
              for inner, sig in blks:
                  if not sig or sig in boiler or CHROME.search(sig): continue
                  tr=[]; tx=[]
                  for raw in BR.split(inner):
                      txt=clean(raw)
                      if not txt: continue
                      (tr if BOLD.search(raw) else tx).append(txt)
                  if tr: tr_b.append("\n".join(tr))
                  if tx: tx_b.append("\n".join(tx))
              return ("\n\n".join(tr_b).strip(), "\n\n".join(tx_b).strip())

          # 2) reset + fill
          q("UPDATE prayers SET translit=NULL, translation=NULL WHERE is_section=0")
          slugs=[r["slug"] for r in q(
              "SELECT p.slug AS slug FROM prayers p JOIN tilda_pages t ON '/'||t.alias=p.slug WHERE p.is_section=0")]
          done=skipped=bothc=txonly=tronly=0
          for slug in slugs:
              tr,tx=parse(pages.get(slug[1:]) or [])
              trv = tr if len(tr)>=10 else None
              txv = tx if len(tx)>=10 else None
              if trv or txv:
                  q("UPDATE prayers SET translit=?, translation=? WHERE slug=?", [trv, txv, slug]); done+=1
                  if trv and txv: bothc+=1
                  elif txv: txonly+=1
                  else: tronly+=1
              else:
                  skipped+=1
          q("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone bhajan layers',?,?)",
            [str(len(slugs)), f"updated={done} both={bothc} tx_only={txonly} tr_only={tronly} skipped={skipped} boiler={len(boiler)}"])
          print(f"DONE updated={done} skipped={skipped}")
          PY

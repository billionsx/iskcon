name: iskcone blocks (structured page layout)

on:
  workflow_dispatch:

jobs:
  blocks:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Tilda records into content_blocks
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, re, html as H, urllib.request, collections
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def q(sql, params=None):
              body=json.dumps({"sql":sql,"params":params or []}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq) as r: return json.loads(r.read().decode())["result"][0]["results"]

          TAGS=re.compile(r'(?s)<[^>]+>'); BR=re.compile(r'(?i)<br\s*/?>')
          CHROME=re.compile(r'(Лучшее, что можно сделать для Господа|ISKCON ONE LOVE|ОНЛАЙН-РЕСУРС|БРАХМА-МАДХВА-ГАУДИЯ|РАЗНЫХ СТРАН|Founder-Āc|His Divine Grace|Что бы ты делал|ВСЕ МАТЕРИАЛЫ ПУБЛИКУ|THE INTERNATIONAL SOCIETY|FOR KRISHNA CONSCIOUSNESS|A\.C\. BHAKTIVEDANTA)', re.I)
          def one(s): return re.sub(r'\s+',' ',H.unescape(TAGS.sub(' ', s))).strip()
          def multi(s):
              s=BR.sub('\n', s); s=H.unescape(TAGS.sub('', s))
              return "\n".join(x.strip() for x in s.split('\n') if x.strip())

          # icon = svg, or known logo/raster chrome; content photo = jpg/jpeg/png that is NOT a logo
          LOGO=re.compile(r'(iskcon|one[-_]?love|gauranga|billionsx|the_international)', re.I)
          QUOTE_RECS={'220','230','250','251','252'}  # Tilda quote/cite boxes
          def is_content_img(u):
              if not re.search(r'\.(jpg|jpeg|png|webp)(\?|$)', u, re.I): return False  # drops .svg
              if LOGO.search(u): return False
              return True
          def imgs_in(block):
              out=[]
              for u in re.findall(r'https://static\.tildacdn\.(?:com|net)/[^"\'\\) ]+', block):
                  if is_content_img(u) and u not in out: out.append(u)
              return out

          # frequency net for repeated chrome lines
          allpages=q("SELECT alias, html FROM tilda_pages")
          freq=collections.Counter()
          for r in allpages:
              h=r.get("html") or ""
              seen={one(m.group(1)) for m in re.finditer(r'field="(?:text|title)"[^>]*>(.*?)</div>', h, re.S|re.I)}
              for s in seen:
                  if s: freq[s]+=1
          nP=len(allpages); thr=max(5,int(0.35*nP)); boiler={s for s,c in freq.items() if c>=thr}

          targets=q("""SELECT ci.slug AS slug, ci.type AS type, t.html AS html
                       FROM content_items ci JOIN tilda_pages t ON '/'||t.alias=ci.slug
                       WHERE ci.lang='ru' AND ci.type IN ('article','personality','center')""")

          q("DELETE FROM content_blocks", [])
          pages=blocks=imgc=0
          for t in targets:
              html=t.get("html") or ""
              recs=re.split(r'(?=<div id="rec\d+")', html)
              # 1) build a flat list of field/image tokens in document order with record type
              tokens=[]  # (rtype, fkind, body, line)  OR ('IMG', url)
              for rb in recs:
                  mt=re.search(r'data-record-type="(\d+)"', rb)
                  if not mt: continue
                  rtype=mt.group(1)
                  placed=False
                  for fkind,fv in re.findall(r'field="(text|title|authorname|descr)"[^>]*>(.*?)</div>', rb, re.S|re.I):
                      body=multi(fv); line=one(fv)
                      tokens.append((rtype, fkind, body, line)); placed=True
                  for u in imgs_in(rb):
                      tokens.append(('IMG', u, None, None))
                      placed=True
              # 2) fold tokens into blocks; a text followed by authorname => quote+sign
              seq=[]; i=0
              while i < len(tokens):
                  tok=tokens[i]
                  if tok[0]=='IMG':
                      seq.append(('image', None, tok[1], None)); i+=1; continue
                  rtype, fkind, body, line = tok
                  if not line or line in boiler or CHROME.search(line): i+=1; continue
                  # signature delivered explicitly as authorname
                  if fkind=='authorname':
                      sig=" · ".join(x.strip(' ,') for x in body.split('\n') if x.strip())
                      if sig and not CHROME.search(sig): seq.append(('sign', sig, None, None))
                      i+=1; continue
                  # Tilda quote/cite box (t220 etc): title = quote text, following text = source
                  if rtype in QUOTE_RECS and fkind=='title':
                      seq.append(('quote', body, None, None))
                      if i+1 < len(tokens):
                          t2=tokens[i+1]
                          if t2[0]!='IMG' and t2[1] in ('text','descr','authorname'):
                              s2=" · ".join(x.strip(' ,') for x in (t2[2] or '').split('\n') if x.strip())
                              if s2 and not CHROME.search(s2): seq.append(('sign', s2, None, None))
                              i+=2; continue
                      i+=1; continue
                  if rtype in ('60','61','62'):
                      k='heading'
                  elif rtype in ('65','66'):
                      k='accent'
                  else:
                      k='para'
                  if k=='para':
                      parts=[x.strip() for x in body.split('\n') if x.strip()]
                      if not parts: parts=[body]
                      for part in parts:
                          if len(part)<=4 and not re.search(r'[.!?]', part):
                              continue
                          seq.append(('para', part, None, None))
                  else:
                      seq.append((k, body, None, None))
                  i+=1
              if not seq: continue
              pages+=1; ordn=0
              for (k,txt,img,bgv) in seq:
                  ordn+=1
                  q("INSERT OR REPLACE INTO content_blocks (slug,ord,kind,text,image,bg) VALUES (?,?,?,?,?,?)",
                    [t["slug"], ordn, k, txt, img, bgv]); blocks+=1
                  if img: imgc+=1
          q("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone blocks',?,?)",
            [str(pages), f"pages={pages} blocks={blocks} images={imgc} boiler={len(boiler)}"])
          print(f"DONE pages={pages} blocks={blocks} images={imgc}")
          PY

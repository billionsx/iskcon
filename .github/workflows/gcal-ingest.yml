name: GCal calendar ingest (D1)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/data/vaisnava-calendar-vrindavan.json'
      - 'apps/api/migrations/0005_gcal_calendar.sql'
      - 'scripts/gcal/**'
      - '.github/workflows/gcal-ingest.yml'

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: bun install

      - name: Apply calendar schema (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0005_gcal_calendar.sql

      - name: Build load SQL from dataset
        working-directory: scripts/gcal
        run: python3 to_sql.py --in ../../apps/api/data/vaisnava-calendar-vrindavan.json --out /tmp/load.sql

      - name: Load dataset into D1
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file /tmp/load.sql

      - name: Verify row count (fail if empty)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          OUT=$(bunx wrangler d1 execute iskcon-db --remote --json \
            --command "SELECT COUNT(*) AS n FROM gcal_days WHERE location_std='vrindavan';")
          echo "$OUT"
          N=$(printf '%s' "$OUT" | python3 -c "
import sys,json,re
t=sys.stdin.read()
def find(o):
    if isinstance(o,dict):
        if isinstance(o.get('n'),int): return o['n']
        for v in o.values():
            r=find(v)
            if r is not None: return r
    elif isinstance(o,list):
        for v in o:
            r=find(v)
            if r is not None: return r
    return None
try:
    n=find(json.loads(t))
except Exception:
    n=None
if n is None:
    m=re.findall(r'\"n\"\s*:\s*(\d+)', t)
    n=int(m[0]) if m else -1
print(n)
")
          echo "::notice title=GCal calendar rows in D1::$N"
          if [ "$N" -lt 400 ]; then echo "::error::expected >=400 rows, got $N"; exit 1; fi
          echo "ingest ok: $N rows"

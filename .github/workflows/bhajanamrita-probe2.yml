name: bhajanamrita probe2 (locate data source)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find where bhajan data lives
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, re, json, pathlib, time
          BASE="https://bhajanamrita.com"
          UA="gaurangers-bhajan-sync/1.0 (by permission of Sri Rupa Seva Kunj; ceo@billionsx.com)"
          OUT=pathlib.Path("tools/bhajans/recon"); OUT.mkdir(parents=True, exist_ok=True)
          URL=BASE+"/bhajans/amara-jivana"
          NEEDLES=["дживан","папе","Āмара","амара","translit","перевод","verse","translation","krsna","kṛṣṇa"]
          rep={"rsc":[], "chunks":[], "endpoints":[]}

          def fetch(url, headers=None, timeout=40):
              rq=urllib.request.Request(url, headers={"User-Agent":UA, **(headers or {})})
              with urllib.request.urlopen(rq, timeout=timeout) as r:
                  return r.status, r.headers.get("Content-Type",""), r.read()

          def hits(txt):
              return [n for n in NEEDLES if n.lower() in txt.lower()]

          # 1) RSC flight variants
          for tag,hdr in [("rsc",{"RSC":"1"}),
                          ("rsc_prefetch",{"RSC":"1","Next-Router-Prefetch":"1","Next-Url":"/bhajans/amara-jivana"})]:
              try:
                  st,ct,data=fetch(URL,hdr); t=data.decode("utf-8","replace")
                  (OUT/f"flight_{tag}.txt").write_bytes(data)
                  rep["rsc"].append({"variant":tag,"status":st,"ctype":ct,"bytes":len(data),"hits":hits(t)})
              except Exception as e:
                  rep["rsc"].append({"variant":tag,"err":str(e)[:160]})
              time.sleep(0.6)

          # 2) candidate data endpoints
          for p in ["/api/bhajans","/api/bhajan/amara-jivana","/data/bhajans.json",
                    "/bhajans.json","/ru/bhajans/amara-jivana","/index.json"]:
              try:
                  st,ct,data=fetch(BASE+p); t=data.decode("utf-8","replace")
                  rep["endpoints"].append({"path":p,"status":st,"ctype":ct,"bytes":len(data),"hits":hits(t)})
              except urllib.error.HTTPError as e:
                  rep["endpoints"].append({"path":p,"http":e.code})
              except Exception as e:
                  rep["endpoints"].append({"path":p,"err":str(e)[:120]})
              time.sleep(0.5)

          # 3) JS chunks from shell — download & grep
          shell=fetch(BASE+"/ru")[2].decode("utf-8","replace")
          chunks=re.findall(r'src="(/_next/static/chunks/[^"]+\.js)"', shell)
          for c in chunks:
              try:
                  st,ct,data=fetch(BASE+c); t=data.decode("utf-8","replace")
                  h=hits(t)
                  # look for fetch/api/data-file references inside chunk
                  refs=sorted(set(re.findall(r'["\'`](/(?:api|data|content|assets)[^"\'`]{0,60})["\'`]', t)))[:8]
                  rsc_paths=sorted(set(re.findall(r'["\'`]([^"\'`]+\.json)["\'`]', t)))[:8]
                  rec={"chunk":c,"bytes":len(data),"hits":h,"refs":refs,"json_refs":rsc_paths}
                  rep["chunks"].append(rec)
                  if h:
                      (OUT/("chunk_HIT_"+c.split("/")[-1])).write_bytes(data)
              except Exception as e:
                  rep["chunks"].append({"chunk":c,"err":str(e)[:120]})
              time.sleep(0.3)

          (OUT/"PROBE2.json").write_text(json.dumps(rep,ensure_ascii=False,indent=2))
          print("RSC hits:", [r for r in rep["rsc"]])
          print("endpoints:", [e for e in rep["endpoints"]])
          print("chunks with hits:", [c for c in rep["chunks"] if c.get("hits")])
          PY
      - name: Commit
        run: |
          git config user.name "Billions X"; git config user.email "ceo@billionsx.com"
          git add tools/bhajans/recon
          git commit -m "probe2(bhajanamrita): locate data source [skip ci]" || exit 0
          git push

name: iskcone catalog load (bhajan metadata into prayers)

on:
  workflow_dispatch:

jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upsert catalog rows from data/catalog_*.json
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, glob, urllib.request
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def q(sql, params=None):
              body=json.dumps({"sql":sql,"params":params or []}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq) as r: return json.loads(r.read().decode())
          HERO="https://static.tildacdn.net/tild3063-6561-4534-a539-336262316565/iskcon.png"
          files=sorted(glob.glob("data/catalog_*.json"))
          total=ins=skip=0
          for f in files:
              rows=json.load(open(f, encoding="utf-8"))
              for r in rows:
                  total+=1
                  # do not overwrite a row that already has real text
                  ex=q("SELECT slug,length(COALESCE(text,'')) AS tlen FROM prayers WHERE slug=?", [r["slug"]])["result"][0]["results"]
                  if ex and ex[0]["tlen"]>0:
                      skip+=1; continue
                  q("""INSERT INTO prayers
                        (slug,lang,name,translit_name,author_slug,author_name,source_text,category,section,ord,hero_image,is_section,is_catalog,updated_at)
                       VALUES (?,?,?,?,?,?,?,?,?,?,?,0,1,datetime('now'))
                       ON CONFLICT(slug) DO UPDATE SET
                        name=excluded.name, translit_name=excluded.translit_name, author_name=excluded.author_name,
                        source_text=excluded.source_text, category=excluded.category, section=excluded.section,
                        ord=excluded.ord, is_catalog=1, updated_at=datetime('now')""",
                     [r["slug"],"ru",r["name"],r.get("translit_name"),None,r.get("author_name"),
                      r.get("source_text"),r.get("category"),r.get("section"),r.get("ord"),HERO])
                  ins+=1
          q("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone catalog load',?,?)",
            [str(total), f"files={len(files)} upserted={ins} skipped_existing={skip}"])
          print(f"DONE files={len(files)} total={total} upserted={ins} skipped={skip}")
          PY

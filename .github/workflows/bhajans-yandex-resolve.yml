name: Bhajans — resolve Yandex video

on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install yt-dlp
        run: pip install -U yt-dlp --break-system-packages
      - name: Resolve
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python tools/bhajans/yandex_resolve.py

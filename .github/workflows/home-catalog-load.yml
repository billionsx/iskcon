name: home-catalog-load
on:
  workflow_dispatch:
  push:
    paths:
      - apps/web/public/data/iskcon-places.json
      - apps/web/public/data/iskcon-documents.json
      - scripts/home_catalog_load.py
      - .github/workflows/home-catalog-load.yml
  workflow_run:
    workflows: ["ISKCON places scrape (centres.iskcon.org -> apps/web/public/data/iskcon-places.json)"]
    types: [completed]

permissions:
  contents: write

jobs:
  load:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Load home catalogs into D1
        id: load
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          CF_DATABASE_ID: 6226aded-dd03-4e74-977f-9cd0b509e73d
        run: |
          set +e
          python3 scripts/home_catalog_load.py > scripts/_home_catalog_log.txt 2>&1
          echo "EXIT=$?" >> scripts/_home_catalog_log.txt
          cat scripts/_home_catalog_log.txt
          tail -3 scripts/_home_catalog_log.txt | while read -r l; do echo "::notice title=home-catalog::$l"; done
      - name: Commit load log
        if: always()
        run: |
          git config user.name "ci"
          git config user.email "ci@local"
          git add scripts/_home_catalog_log.txt
          git commit -m "ci: home catalog load log [skip ci]" || true
          git pull --rebase origin main || true
          git push || true
      - name: Fail if loader failed
        if: steps.load.outcome == 'failure'
        run: exit 1

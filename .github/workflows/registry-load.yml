name: registry-load
on:
  workflow_dispatch:
  push:
    paths:
      - docs/entity-registry/entities_all.csv
      - docs/entity-registry/relations_all.csv
      - docs/entity-registry/schema.sql
      - docs/entity-registry/registry_load.py
      - .github/workflows/registry-load.yml

permissions:
  contents: write

jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Load registry into D1
        id: load
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          CF_DATABASE_ID: 6226aded-dd03-4e74-977f-9cd0b509e73d
        run: |
          set +e
          python3 docs/entity-registry/registry_load.py > docs/entity-registry/_load_log.txt 2>&1
          echo "EXIT=$?" >> docs/entity-registry/_load_log.txt
          cat docs/entity-registry/_load_log.txt
      - name: Commit load log
        if: always()
        run: |
          git config user.name "ci"
          git config user.email "ci@local"
          git add docs/entity-registry/_load_log.txt
          git commit -m "ci: registry load log [skip ci]" || true
          git push || true
      - name: Fail if loader failed
        if: steps.load.outcome == 'failure'
        run: exit 1

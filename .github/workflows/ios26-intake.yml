name: "Приём референса iOS 26.5 (ЗКН-Д026)"

# Основатель кладёт PDF со скриншотами — руками, через веб-интерфейс GitHub.
# КУДА УГОДНО и КАК УГОДНО названные: 19.07.2026 десять продуктов легли в
# `tools/assets/` под именами вида «apple app store-1-15_compressed.pdf», и это
# нормально — папка называется «assets», а имя пришло из телефона. Приведение
# имени к машинному и перенос в refs/ — работа МАШИНЫ. Дальше:
#   1) собирает контактный лист (все кадры одной картинкой ≤512 КБ),
#   2) вписывает продукт в INDEX.md заглушкой «роспись — долг 🕳»,
#   3) выносит мастер на два зеркала СВОИМ классом и убирает из git (ЗКН-Ф025).
#
# Почему свой класс на каждую партию: offload.py идемпотентен по классу —
# «класс уже в манифесте → пропуск». Второй заезд под тем же именем молча
# оставил бы мастер в git, и Ф025 покраснел бы на следующем коммите в tools/.
#
# Коммит делает встроенный токен — он НЕ триггерит другие воркфлоу (ЗКН-Ф022),
# и это правильно: приложение эти файлы не раздаёт, деплой не нужен.

on:
  push:
    branches: [main]
    paths:
      - "docs/design/ios26/refs/**.pdf"
      - "docs/design/ios26/*.pdf"
      - "tools/assets/*.pdf"
      - "docs/assets/*.pdf"
      - "*.pdf"
  workflow_dispatch:

concurrency:
  group: ios26-intake
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  intake:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Зависимости"
        run: pip install "pymupdf>=1.24" "pillow>=10" "internetarchive>=3.5"

      - name: "git identity"
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"

      - name: "Приём: контактные листы + строка в реестре"
        id: intake
        run: |
          python3 tools/ios26-intake.py | tee /tmp/intake.log
          echo "cls=$(grep -oP '^CLASS=\K.*' /tmp/intake.log | tail -1)" >> "$GITHUB_OUTPUT"

      - name: "Коммит листов и реестра"
        run: |
          git add -A docs/design/ios26/
          git diff --cached --quiet && echo "нечего коммитить" && exit 0
          git commit -m "ЗКН-Д026: принят референс — контактный лист и строка реестра"
          git push

      - name: "Вынос мастеров на два зеркала (ЗКН-Ф025 · Пл023)"
        if: ${{ steps.intake.outputs.cls != '' }}
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --rm сносит папку ЦЕЛИКОМ — листы уводим в сторону и возвращаем.
          # Так уже случилось однажды: вынос смёл листы, refs/ исчезла,
          # гейт Д026 покраснел в том же прогоне.
          mkdir -p /tmp/sheets
          cp docs/design/ios26/refs/*.contact.jpg /tmp/sheets/ 2>/dev/null || true
          python3 tools/assets/offload.py offload \
            --class "${{ steps.intake.outputs.cls }}" \
            --path docs/design/ios26/refs \
            --source "Скриншоты Apple iOS 26.5, тёмная тема — эталон замера (ЗКН-Д026)" \
            --rm
          mkdir -p docs/design/ios26/refs
          cp /tmp/sheets/*.contact.jpg docs/design/ios26/refs/ 2>/dev/null || true
          git add -A docs/design/ios26/refs docs/assets
          git diff --cached --quiet || git commit -m "ЗКН-Ф025: мастера референса уехали на два зеркала"
          git push

      - name: "Гейт эталона — не разошлось ли (ЗКН-Д026)"
        run: python3 tools/ios26-lint.py

      # Скидка на лаг нужна только archive.org: свежий item там ещё деривируется
      # и честно отдаёт 404. У GitHub Releases заливка синхронная — лага нет,
      # поэтому пустой релиз здесь ошибка, а не предупреждение. Раньше стояло
      # `verify.py || echo ::warning::`, и класс ios26-refs-2 родился с пустым
      # зеркалом: гейт отработал, приписка его обнулила.
      - name: "Зеркало GitHub непустое (лага там не бывает)"
        if: ${{ steps.intake.outputs.cls != '' }}
        run: python3 tools/assets/verify.py --class "${{ steps.intake.outputs.cls }}" --strict-gh

      - name: "Живость обоих зеркал (archive.org может ещё деривировать)"
        if: ${{ steps.intake.outputs.cls != '' }}
        run: python3 tools/assets/verify.py --class "${{ steps.intake.outputs.cls }}" || echo "::warning::archive.org отдаёт не сразу — item в очереди деривации"

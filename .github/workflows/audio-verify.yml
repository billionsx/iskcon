name: Audio Verify

# Hits the live audio endpoints and commits the results back to .audio-verify/
# (the sandbox can't reach gaurangers.com directly). Triggered manually or when
# this workflow file changes. Results land outside apps/web/, so it never
# re-triggers the web deploy.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/audio-verify.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hit live audio endpoints
        run: |
          mkdir -p .audio-verify
          echo "manifest http: $(curl -s -o /dev/null -w '%{http_code}' --max-time 90 https://gaurangers.com/api/books/bg/audio)" | tee .audio-verify/status.txt
          curl -s --max-time 90 "https://gaurangers.com/api/books/bg/audio" -o .audio-verify/manifest.json || true
          # Sample audio file: a Range request should return 206 + Accept-Ranges + audio/mpeg.
          {
            echo "== HEAD-via-Range: /audio/iskcone-bg/01.obzor-armij-na-pole-Kurukshetra.mp3 =="
            curl -s -D - -o /dev/null --max-time 90 -H 'Range: bytes=0-99' \
              "https://gaurangers.com/audio/iskcone-bg/01.obzor-armij-na-pole-Kurukshetra.mp3"
          } > .audio-verify/audio-range.txt 2>&1 || true
          echo "---- manifest (first 1200 chars) ----"
          head -c 1200 .audio-verify/manifest.json || true
          echo ""
          echo "---- audio-range headers ----"
          cat .audio-verify/audio-range.txt || true

      - name: Commit results
        run: |
          git config user.name "ci-audio-verify"
          git config user.email "ci@local"
          git add -A .audio-verify
          git commit -m "ci(audio-verify): live results [skip ci]" || echo "nothing to commit"
          git push

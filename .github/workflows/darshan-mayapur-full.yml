name: darshan-mayapur-full

on:
  workflow_dispatch:
    inputs:
      album_id:
        description: 'Album id (default 594)'
        required: false
        default: '594'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Confirm full-size originals
        env:
          ALBUM_ID: ${{ github.event.inputs.album_id || '594' }}
        run: node scripts/darshan-probe-mayapur-full.mjs
      - name: Publish result to side branch
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git checkout -B ci/darshan-mayapur-full
          git add -f data/darshan/_mayapur_full.json
          git commit -m "chore(darshan): mayapur full-size confirm [skip ci]" || echo "no changes"
          git push -f origin ci/darshan-mayapur-full

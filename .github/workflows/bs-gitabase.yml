name: bs gitabase ingest (полный русский текст Брахма-самхиты)
on:
  workflow_dispatch:
    inputs:
      maxv:
        description: "max verse number in chapter 5"
        default: "62"
permissions:
  contents: read
jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Ingest
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MAXV: ${{ github.event.inputs.maxv }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request
          import html as H
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          MAXV=int((os.environ.get("MAXV") or "62").strip())
          def get(url):
              try:
                  rq=urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"ru"})
                  with urllib.request.urlopen(rq, timeout=30) as r: return r.status, r.read().decode("utf-8","replace")
              except Exception as e: return 0, ""
          def d1(sql):
              for _ in range(3):
                  try:
                      urllib.request.urlopen(urllib.request.Request(D1, data=json.dumps({"sql":sql}).encode(),
                        headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}), timeout=60).read(); return True
                  except Exception: time.sleep(2)
              return False
          def Q(v): return "'"+str(v).replace("'","''")+"'"
          def clean(s):
              s=re.sub(r"<sup.*?</sup>"," ",s,flags=re.S|re.I)
              s=re.sub(r"<[^>]+>"," ",s); s=H.unescape(s); s=re.sub(r"\s+"," ",s); return s.strip()
          def translation(html):
              m=re.search(r'Текст</center></div>.*?<h4>(.*?)</h4>', html, re.S)
              return clean(m.group(1)) if m else ""
          def commentary(html):
              m=re.search(r'Комментарий</center></div>(.*?)(?:<div class="tlabel"|<footer|</body)', html, re.S)
              return clean(m.group(1)) if m else ""
          def deva(html):
              m=re.search(r'([\u0900-\u097F][\u0900-\u097F \u0964\u0965।॥0-9\u200c\u200d]*॥)', html)
              return m.group(1).strip() if m else ""
          ok=0; miss=[]
          for n in range(1, MAXV+1):
              st,html=get(f"https://gitabase.com/rus/BS/5/{n}")
              if st!=200: miss.append(n); continue
              tr=translation(html); dv=deva(html); cm=commentary(html)
              if not tr: miss.append(n); continue
              vid=f"bs.5.{n}"; ref=f"Брахма-самхита 5.{n}"
              d1(f"INSERT INTO verses (id,work_id,division_id,ref,ordinal,devanagari) VALUES ('{vid}','bs','bs.5',{Q(ref)},{n},{Q(dv)}) "
                 f"ON CONFLICT(id) DO UPDATE SET devanagari=excluded.devanagari, ref=excluded.ref, ordinal=excluded.ordinal")
              if cm:
                  d1(f"INSERT INTO verse_texts (verse_id,edition_id,translation,purport) VALUES ('{vid}','bs-ru',{Q(tr)},{Q(cm)}) "
                     f"ON CONFLICT(verse_id,edition_id) DO UPDATE SET translation=excluded.translation, purport=excluded.purport")
              else:
                  d1(f"INSERT INTO verse_texts (verse_id,edition_id,translation) VALUES ('{vid}','bs-ru',{Q(tr)}) "
                     f"ON CONFLICT(verse_id,edition_id) DO UPDATE SET translation=excluded.translation")
              ok+=1; time.sleep(0.15)
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'bs-gitabase ingest',"+str(ok)+","+Q('ok='+str(ok)+' miss='+str(miss)[:200])+")")
          print("ingested", ok, "missing", miss)
          PY

name: books probe (поиск Вишну-пураны/Кришна-сандарбхи/Говинда-лиламриты по сети)
on: { workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Probe
        env: { CF: "${{ secrets.CLOUDFLARE_API_TOKEN }}" }
        run: |
          python3 - <<'PY'
          import json, urllib.request, urllib.parse, os, time
          def get(url, hdr=None):
              try:
                  req=urllib.request.Request(url, headers=hdr or {"User-Agent":"Mozilla/5.0"})
                  return urllib.request.urlopen(req, timeout=40).read().decode("utf-8","replace")
              except Exception as e: return f"ERR {e}"
          out=[]
          queries={"vishnu":"Вишну-пурана","krishna_s":"Кришна-сандарбха","govinda_l":"Говинда-лиламрита","vishnu2":"Вишну Пурана Парашара"}
          # archive.org
          for k,q in queries.items():
              u="https://archive.org/advancedsearch.php?q="+urllib.parse.quote(f'"{q}"')+"&fl[]=identifier&fl[]=title&fl[]=mediatype&fl[]=format&rows=8&output=json"
              r=get(u)
              try:
                  docs=json.loads(r)["response"]["docs"]
                  out.append(f"[archive.org {q}] {len(docs)} hits")
                  for d in docs[:6]: out.append(f"   id={d.get('identifier')} | {str(d.get('title'))[:60]} | {d.get('format')}")
              except Exception as e: out.append(f"[archive.org {q}] parse-err {str(r)[:80]}")
          # ru.wikisource
          for k,q in queries.items():
              u="https://ru.wikisource.org/w/api.php?action=query&list=search&srsearch="+urllib.parse.quote(q)+"&srlimit=5&format=json"
              r=get(u)
              try:
                  hits=json.loads(r)["query"]["search"]
                  out.append(f"[wikisource {q}] {len(hits)} hits")
                  for h in hits[:5]: out.append(f"   ws: {h['title']}")
              except Exception as e: out.append(f"[wikisource {q}] err {str(r)[:80]}")
          # candidate direct sites (главная — проверить доступность/наличие)
          cands={
            "scriptures.ru/vishnu":"http://scriptures.ru/vishnu.htm",
            "advayta vishnu":"https://www.advayta.org/item/000100/?id=4290",
            "oum vishnu":"https://www.oum.ru/literature/raznoe/vishnu-purana/",
            "vasudeva":"https://vasudeva.ru/",
          }
          for k,u in cands.items():
              r=get(u)
              ok = not r.startswith("ERR")
              has = ("Вишну" in r or "Кришна" in r or "Парашара" in r) if ok else False
              out.append(f"[site {k}] {'OK' if ok else r[:50]} len={len(r) if ok else 0} hasKW={has}")
          os.makedirs("docs/data",exist_ok=True)
          open("docs/data/books_probe.txt","w",encoding="utf-8").write("\n".join(out))
          # report short
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          body="\n".join(out)[:1800]
          import urllib.request as U
          U.urlopen(U.Request(f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query",
            data=json.dumps({"sql":"INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'books-probe DONE',0,?)","params":[body]}).encode(),
            headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}),timeout=40).read()
          print("\n".join(out))
          PY
      - name: Commit
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add docs/data/books_probe.txt && git commit -m "probe: поиск книг по сети [skip ci]" || echo no
          git push origin HEAD:main || true

name: Probe grep URL

on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      pattern:
        required: true

permissions: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: GREP
        run: |
          OUT=$(curl -sL "${{ github.event.inputs.url }}" | grep -oE "${{ github.event.inputs.pattern }}" | sort | uniq -c | sort -rn | head -30 | tr '\n' ' | ')
          echo "$OUT"
          echo "::notice title=GREP::${OUT:0:900}"

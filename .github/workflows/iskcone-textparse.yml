name: iskcone textparse (page_text, quotes, prayers)

on:
  workflow_dispatch:

jobs:
  textparse:
    runs-on: ubuntu-latest
    steps:
      - name: Clean text + quotes + prayers from stored HTML
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, re, html as H, urllib.request
          CF=os.environ["CF"]
          ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def q(sql, params=None):
              body=json.dumps({"sql":sql,"params":params or []}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq) as r: return json.loads(r.read().decode())

          def to_blocks(s):
              s=re.sub(r'(?is)<(script|style|noscript)\b[^>]*>.*?</\1>',' ',s)
              s=re.sub(r'(?i)<br\s*/?>','\n',s)
              s=re.sub(r'(?i)</(p|div|h[1-6]|li|td|tr|section|article|blockquote|figcaption)>','\n',s)
              s=re.sub(r'(?s)<[^>]+>',' ',s)
              s=H.unescape(s)
              out=[]
              for ln in s.split('\n'):
                  ln=re.sub(r'\s+',' ',ln).strip()
                  if len(ln)>=2 and (not out or out[-1]!=ln): out.append(ln)
              return out

          # 1) load content_items meta
          meta={}
          rows=q("SELECT slug,lang,type,subtype,name,hero_image FROM content_items")["result"][0]["results"]
          for r in rows: meta[r["slug"]]=r
          # 2) load all pages html in batches; build blocks
          pages={}; off=0
          while True:
              b=q("SELECT alias, html FROM tilda_pages ORDER BY alias LIMIT 25 OFFSET ?", [off])["result"][0]["results"]
              if not b: break
              for r in b: pages[r["alias"]]=to_blocks(r.get("html") or "")
              off+=25
          n=len(pages); print("pages:",n)
          # 3) boilerplate = blocks present on >=30% of pages
          from collections import Counter
          freq=Counter()
          for blks in pages.values():
              for blk in set(blks): freq[blk]+=1
          thr=max(3,int(0.30*n))
          boiler={b for b,c in freq.items() if c>=thr}
          print("boilerplate blocks:",len(boiler))

          SCRIPT=re.compile(r'(Бхагавад[\- ]?г[ӣи]та|Шр[иӣ]мад[\- ]?Бхагаватам|Чайтань[яе][\- ]?[Чч]аритамрита|Брахма[\- ]?самхита|Шикш[аā]штак|Упадешамрит|Бхакти[\- ]?рас[аā]мрита|Нектар (преданности|наставлений))', re.I)
          REFHINT=re.compile(r'(стих|текст\s*\d|глава|песн[ьи]|\bлила\b|\d)', re.I)
          def is_ref(b): return len(b)<160 and bool(SCRIPT.search(b)) and bool(REFHINT.search(b))

          pt=qn=pr=0
          q("DELETE FROM page_text",[]); q("DELETE FROM quotes",[]); q("DELETE FROM prayers",[])
          for slug, blks in pages.items():
              m=meta.get(slug,{}); lang=(m.get("lang") or "ru"); typ=m.get("type"); sub=m.get("subtype")
              body=[b for b in blks if b not in boiler]
              text="\n".join(body)
              q("INSERT OR REPLACE INTO page_text (slug,lang,n_blocks,text,updated_at) VALUES (?,?,?,?,datetime('now'))",
                [slug,lang,len(body),text]); pt+=1
              if typ=="personality":
                  ord=0
                  for i,b in enumerate(body):
                      if is_ref(b) and i>0:
                          quote=body[i-1]
                          if 12<=len(quote)<=900 and not is_ref(quote):
                              ord+=1
                              q("INSERT INTO quotes (slug,personality_slug,lang,ord,text,source) VALUES (?,?,?,?,?,?)",
                                [slug,slug,lang,ord,quote,b]); qn+=1
              if typ=="prayer":
                  author = sub if (sub and sub!="bhajan") else None
                  q("INSERT OR REPLACE INTO prayers (slug,lang,name,author_slug,text,hero_image,updated_at) VALUES (?,?,?,?,?,?,datetime('now'))",
                    [slug,lang,m.get("name"),author,text,m.get("hero_image")]); pr+=1
          q("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone textparse',?,?)",
            [str(n), f"page_text={pt} quotes={qn} prayers={pr} boiler={len(boiler)}"])
          print(f"DONE page_text={pt} quotes={qn} prayers={pr}")
          PY

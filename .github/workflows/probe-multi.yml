name: Probe multi URL

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "URLs separated by |"
        required: true
      pattern:
        description: "grep -c pattern"
        required: true
        default: "BEGIN:VEVENT"

permissions: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: MULTI
        env:
          US: ${{ github.event.inputs.urls }}
          P: ${{ github.event.inputs.pattern }}
        run: |
          OUT=""
          IFS='|' read -ra ARR <<< "$US"
          for U in "${ARR[@]}"; do
            N=$(curl -sL --max-time 30 "$U" | grep -c "$P" || true)
            C=$(curl -sL --max-time 30 -o /dev/null -w "%{http_code}" "$U" || true)
            SHORT=$(echo "$U" | sed 's#.*/##' | cut -c1-44)
            OUT="$OUT $SHORT=>$C:$N |"
          done
          echo "$OUT"
          echo "::notice title=MULTI::${OUT:0:900}"

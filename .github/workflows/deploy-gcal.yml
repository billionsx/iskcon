name: Deploy GCal compute (Cloudflare Python Worker)

on:
  workflow_dispatch:   # parked: live per-request compute hits CF CPU limits on this plan; see PRECOMPUTE plan

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Deploy Python Worker (pywrangler)
        working-directory: apps/gcal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          uvx --from workers-py pywrangler deploy 2>&1 | tee /tmp/gcal-deploy.log
          RC=${PIPESTATUS[0]}
          echo "pywrangler deploy exit = $RC"
          if [ "$RC" != "0" ]; then
            echo "::error::pywrangler deploy (gcal) FAILED exit $RC"
            grep -iE 'error|exceed|larger|module|ENOENT|limit|failed|python|pyodide|workers|traceback' /tmp/gcal-deploy.log | tail -n 25 | while IFS= read -r l; do echo "::error::GC ${l}"; done
            exit "$RC"
          fi
          ACCT=d5cbe19470dc38599873eabfe148e6d1
          API=https://api.cloudflare.com/client/v4
          LATEST=$(curl -s "$API/accounts/$ACCT/workers/scripts/iskcon-gcal/versions?per_page=1" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" | jq -r '.result.items[0].id')
          echo "latest version = $LATEST"
          if [ -n "$LATEST" ] && [ "$LATEST" != "null" ]; then
            curl -s -X POST "$API/accounts/$ACCT/workers/scripts/iskcon-gcal/deployments?force=true" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" --data "{\"strategy\":\"percentage\",\"versions\":[{\"version_id\":\"$LATEST\",\"percentage\":100}]}" | jq -c '{success,errors}' || true
          fi

      - name: Smoke test /compute (Yevpatoria, Crimea)
        run: |
          set +e
          WD=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' /tmp/gcal-deploy.log | head -1)
          echo "workers.dev = $WD"
          if [ -z "$WD" ]; then echo "::error::no workers.dev URL in deploy log"; tail -n 30 /tmp/gcal-deploy.log; exit 1; fi
          code=000
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -s -o /tmp/sm.json -w '%{http_code}' --max-time 60 "$WD/compute?lat=45.1903&lng=33.3667&tz=Europe/Simferopol&days=400")
            echo "[$i] HTTP $code bytes=$(wc -c < /tmp/sm.json)"
            [ "$code" = "200" ] && break
            sleep 8
          done
          echo "::warning::GCAL resp HTTP=$code body=$(head -c 500 /tmp/sm.json | tr '\n\r\t' '   ')"
          python3 apps/gcal/smoke_check.py /tmp/sm.json

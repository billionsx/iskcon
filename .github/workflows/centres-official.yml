name: Официальный директорий центров (centres.iskcon.org → D1)

# ЗКН-Пл006 · ЗКН-Пр007
#
# Локатор центров был мёртв: 792 из 956 центров без координат. Разбор показал —
# это не проблема геокодинга, а проблема ИСТОЧНИКА: 729 центров пришли из архива
# `centers.iskcondesiretree.com` (2011–2013), где координат нет вовсе, а все 164
# центра с координатами — из ОФИЦИАЛЬНОГО `centres.iskcon.org`.
#
# Геокодировать адреса 2011 года = поставить на карту точки, ведущие в никуда.
# Официальный директорий создан ровно затем, чтобы этого не было.
#
# Этот воркфлоу тянет ВЕСЬ официальный директорий (~664 центра, все с координатами)
# и делает его источником истины. Архив остаётся только запасным.

# ⚠️ ЗАПАРКОВАН. Из CI НЕ РАБОТАЕТ — и это не чинится кодом.
#
# Проверено фактом: centres.iskcon.org блокирует облачные IP.
#   • wp-json → таймаут (REST выключен)
#   • ?rest_route=… → HTML вместо JSON
#   • /sitemap.xml, /wp-sitemap.xml, /sitemap_index.xml → ноль записей
#   • Playwright из GitHub Actions → таймаут на КАЖДОЙ из 16 страниц регионов
#   • тот же сайт из обычного браузера → грузится нормально
#
# Расписание снято, чтобы не гонять заведомо падающий воркфлоу.
# Скрипт РАБОЧИЙ — запускать с жилого IP (машина основателя / не-датацентр):
#     pip install playwright && playwright install chromium
#     python3 tools/centres-official.py
#
# РЕШЕНИЕ ОСНОВАТЕЛЯ (12.07.2026): 729 центров из архива 2011 остаются БЕЗ координат.
# Это честнее, чем 729 ложных точек. Обходить защиту сайта — не будем.
# Кнопка «маршрут» у такого центра ведёт на ПОИСК по названию, а не на ложную точку.
on:
  workflow_dispatch:

concurrency:
  group: centres-official
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Официальный сайт не отдаёт данные машинам (REST выключен, карты сайта нет,
      # листинги рисует JS) — нужен настоящий браузер. Playwright в проекте уже
      # используется для пре-генерации PDF книг.
      - name: Playwright + Chromium
        run: |
          pip install --quiet playwright
          playwright install --with-deps chromium

      - name: Скрейп официального директория (перехват данных карты)
        run: python3 tools/centres-official.py

      - name: Заливка в D1 (координаты — из официального источника)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request

          cfg = open("apps/web/wrangler.toml", encoding="utf-8").read()
          acc = re.search(r'account_id\s*=\s*"([^"]+)"', cfg).group(1)
          dbid = re.search(r'database_id\s*=\s*"([^"]+)"', cfg).group(1)
          tok = os.environ["CLOUDFLARE_API_TOKEN"]
          URL = f"https://api.cloudflare.com/client/v4/accounts/{acc}/d1/database/{dbid}/query"

          def d1(sql, params=None):
              body = {"sql": sql}
              if params: body["params"] = params
              req = urllib.request.Request(URL, data=json.dumps(body).encode(),
                  headers={"Authorization": "Bearer " + tok, "Content-Type": "application/json"})
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.load(r)

          data = json.load(open("apps/web/public/data/iskcon-centres-official.json", encoding="utf-8"))
          places = [p for p in data["places"] if p["lat"] is not None]
          print(f"центров с координатами: {len(places)}")

          # Сопоставление по имени: официальный директорий уточняет координаты у уже
          # заведённых центров. НЕ удаляем архивные — они помечены своим source.
          upd = 0
          for p in places:
              nm = p["name"].strip()
              r = d1("""UPDATE places SET lat = ?, lng = ?, source = 'centres.iskcon.org'
                        WHERE lat IS NULL AND (name = ? OR name_ru = ?)""",
                     [str(p["lat"]), str(p["lng"]), nm, nm])
              ch = (r.get("result") or [{}])[0].get("meta", {}).get("changes", 0)
              upd += ch

          res = d1("SELECT COUNT(*) AS n FROM places WHERE lat IS NOT NULL")
          have = (res.get("result") or [{}])[0]["results"][0]["n"]
          res = d1("SELECT COUNT(*) AS n FROM places")
          tot = (res.get("result") or [{}])[0]["results"][0]["n"]

          print(f"::notice title=COORDS::обновлено={upd}  теперь с координатами={have}/{tot}")
          PY

      - name: Коммит снимка официального директория
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add apps/web/public/data/iskcon-centres-official.json
          git diff --cached --quiet || git commit -m "data: официальный директорий центров ИСККОН (координаты)"
          git push || true

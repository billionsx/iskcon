name: BG structure import (chapters + verse refs + deep-links)

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build structure SQL from vedabase (structure only)
        run: python3 scripts/import_bg_structure.py
      - name: Apply to D1 in batches
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          CF=os.environ["CF"]
          ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def run(sql):
              body=json.dumps({"sql":sql}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq) as r: return json.loads(r.read().decode())
          stmts=[s for s in open("d1_structure.sql",encoding="utf-8").read().split("\n") if s.strip() and not s.strip().startswith("--")]
          print("statements:", len(stmts))
          B=50
          for i in range(0,len(stmts),B):
              chunk="\n".join(stmts[i:i+B])
              res=run(chunk)
              ok=res.get("success")
              print(f"batch {i//B}: success={ok}")
              if not ok:
                  print(json.dumps(res)[:500]); raise SystemExit(1)
          # verify
          v=run("SELECT (SELECT COUNT(*) FROM divisions WHERE work_id='bg') AS chapters, (SELECT COUNT(*) FROM verses WHERE work_id='bg') AS verses")
          print("RESULT:", json.dumps(v["result"][0]["results"][0]))
          PY

# Ручная веб-оптимизация уже залитых на archive.org видео (faststart).
# Скачивает файл(ы) из объекта IA, кладёт moov в начало и заливает обратно под
# именем <stem>.web.mp4. Затем feed_video.src переключается на новое имя (см. лог
# "OK <старое> -> <новое>"). Нужно для роликов, залитых без faststart (крупные
# YouTube-mp4 уходили в Telegram-iframe вместо инлайн-плеера).
#
# Секреты: IA_ACCESS_KEY, IA_SECRET_KEY.
name: "IA faststart (веб-оптимизация видео)"
run-name: "ia-faststart · ${{ inputs.files }}"

concurrency:
  group: ia-faststart
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      identifier:
        description: "IA identifier"
        default: "iskcone-feed-videos"
      files:
        description: "Имена файлов в объекте IA через запятую"
        required: true

permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: "Зависимости"
        run: pip install -r tools/tg-archive/requirements.txt
      - name: "ffmpeg"
        run: ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg)
      - name: "faststart -> перезалив под .web.mp4"
        working-directory: tools/tg-archive
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: python ia_faststart.py "${{ inputs.identifier }}" "${{ inputs.files }}"

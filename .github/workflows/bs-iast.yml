name: bs iast scrape (IAST транслитерация Брахма-самхиты с gitabase/eng)
on:
  workflow_dispatch:
    inputs:
      maxv:
        default: "62"
permissions:
  contents: read
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Scrape IAST
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MAXV: ${{ github.event.inputs.maxv }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request
          import html as H
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          MAXV=int((os.environ.get("MAXV") or "62").strip())
          def get(url):
              try:
                  rq=urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"en"})
                  with urllib.request.urlopen(rq, timeout=30) as r: return r.status, r.read().decode("utf-8","replace")
              except Exception: return 0, ""
          def d1(sql):
              for _ in range(3):
                  try:
                      urllib.request.urlopen(urllib.request.Request(D1, data=json.dumps({"sql":sql}).encode(),
                        headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}), timeout=60).read(); return True
                  except Exception: time.sleep(2)
              return False
          def Q(v): return "'"+str(v).replace("'","''")+"'"
          def clean(s):
              s=re.sub(r"<[^>]+>"," ",s); s=H.unescape(s)
              s=s.replace("\u00ad","").replace("\u200b","").replace("\u200c","").replace("\u200d","")
              s=re.sub(r"[ \t]+"," ",s); return s.strip()
          ok=0; miss=[]
          for n in range(1, MAXV+1):
              st,html=get(f"https://gitabase.com/eng/BS/5/{n}")
              if st!=200: miss.append(n); continue
              # IAST между концом деванагари (॥ N ॥) и "NNN times this text"
              m=re.search(r'॥\s*[\u0966-\u096F0-9]+\s*॥(.*?)\d+\s+times this text', html, re.S)
              if not m:
                  m=re.search(r'॥\s*[\u0966-\u096F0-9]+\s*॥(.*?)<div class="tlabel"', html, re.S)
              iast=clean(m.group(1)) if m else ""
              # привести многострочный IAST к строкам по падам: вставить \n по двойным пробелам не нужно — оставим как есть
              iast=re.sub(r"\s*\n\s*","\n",iast).strip()
              if not iast: miss.append(n); continue
              d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'bsiast 5."+str(n)+"',"+str(n)+","+Q(iast[:1000])+")")
              ok+=1; time.sleep(0.12)
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'bsiast DONE',"+str(ok)+","+Q('ok='+str(ok)+' miss='+str(miss)[:150])+")")
          print("iast ok", ok, "miss", miss)
          PY

name: bs iast missing v2 (добор IAST пропущенных + конвертация в транслит)
on:
  workflow_dispatch:
    inputs:
      verses:
        default: "2,3,4,6,7,8,56"
permissions:
  contents: read
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Scrape+convert+update
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VERSES: ${{ github.event.inputs.verses }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request
          import html as H
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          verses=[int(x) for x in os.environ["VERSES"].split(",") if x.strip()]
          def get(url):
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"en"}), timeout=30) as r:
                      return r.status, r.read().decode("utf-8","replace")
              except Exception: return 0,""
          def d1(sql):
              for _ in range(4):
                  try:
                      r=urllib.request.urlopen(urllib.request.Request(D1, data=json.dumps({"sql":sql}).encode(),
                        headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}), timeout=60)
                      return json.loads(r.read().decode())
                  except Exception: time.sleep(2)
          def Q(v): return "'"+str(v).replace("'","''")+"'"
          def vis(html):
              t=re.sub(r"<(script|style)[^>]*>.*?</\1>"," ", html, flags=re.S|re.I)
              t=re.sub(r"<[^>]+>"," ", t); t=H.unescape(t); return re.sub(r"\s+"," ",t).strip()
          def extract_iast(html):
              v=vis(html)
              i=v.find("Next >>")
              if i<0: i=v.find("<< Prev")
              tail=v[i+7:] if i>=0 else v
              m=re.search(r'\d+\s+times this text|[a-zāīūṛṅñṇṭḍśṣ]+\s-\s', tail)
              if m: tail=tail[:m.start()]
              tail=re.sub(r'[\u0900-\u097F]+',' ',tail).replace('|',' ').replace('॥',' ')
              tail=re.sub(r'\bText\b.*?>>',' ',tail)
              return re.sub(r'\s+',' ',tail).strip()
          PAIRS=[("kṣ","кш"),("jñā","гья"),("jñ","гь"),("jj","ддж"),
           ("kh","кх"),("gh","гх"),("ch","чх"),("jh","джх"),("ṭh","тх"),("ḍh","дх"),
           ("th","тх"),("dh","дх"),("ph","пх"),("bh","бх"),("ai","ай"),("au","ау"),
           ("ā","а"),("ī","и"),("ū","у"),("ṛ","ри"),("ṝ","ри"),("ḷ","л"),("ḹ","л"),
           ("ṅ","н"),("ñ","н"),("ṇ","н"),("ṭ","т"),("ḍ","д"),("ś","ш"),("ṣ","ш"),
           ("ṁ","м"),("ṃ","м"),("ḥ","х"),
           ("a","а"),("b","б"),("c","ч"),("d","д"),("e","е"),("g","г"),("h","х"),
           ("i","и"),("j","дж"),("k","к"),("l","л"),("m","м"),("n","н"),("o","о"),
           ("p","п"),("r","р"),("s","с"),("t","т"),("u","у"),("v","в"),("y","й")]
          def convert(iast):
              s=iast.lower().replace("'","").replace("’","").replace("-"," ") if False else iast.lower().replace("'","").replace("’","")
              s=s.replace("- "," "); s=re.sub(r"-\s*$","",s)
              for a,b in PAIRS: s=s.replace(a,b)
              return re.sub(r"\s+"," ",s).strip()
          rep=[]
          for n in verses:
              st,html=get(f"https://gitabase.com/eng/BS/5/{n}")
              if st!=200: rep.append(f"{n}:HTTP{st}"); continue
              iast=extract_iast(html)
              # оставить только латиницу с диакритикой (выкинуть случайные англ. хвосты)
              if not iast or not re.search(r'[āīūṛṅñṇṭḍśṣ]', iast):
                  rep.append(f"{n}:NOIAST"); continue
              cyr=convert(iast)
              d1(f"UPDATE verses SET translit={Q(cyr)} WHERE id='bs.5.{n}'")
              d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'bsiast2v2 5."+str(n)+"',"+str(n)+","+Q(cyr[:600])+")")
              rep.append(f"{n}:OK({len(cyr)})")
              time.sleep(0.15)
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'bsiast2v2 DONE',0,"+Q(str(rep))+")")
          print(rep)
          PY

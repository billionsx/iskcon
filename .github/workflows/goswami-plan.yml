# ГОСВАМИ · КАРТА (каталог goswami.ru → раскладка по циклам)
#
# Один проход: выкачать каталог → построить карту → положить карту в репозиторий.
#
# Сам каталог (тысячи записей) в репозиторий НЕ кладётся: он промежуточный и
# тяжёлый. В репозиторий едет то, что решает судьбу гигабайтов — карта
# (ЗКН-Пл010: цикл, имя файла и название дорожки видны глазами ДО заливки) и
# короткая сводка цифр. Полный каталог остаётся артефактом прогона.
name: "Госвами · карта"
run-name: "goswami-plan · MAX_ALBUM=${{ inputs.max_album || '220' }}"

on:
  workflow_dispatch:
    inputs:
      types:
        description: "Типы записей (audio, можно audio,video)"
        default: "audio"
      max_album:
        description: "Потолок дорожек в цикле (длиннее — режется на части)"
        default: "220"
      max_pages:
        description: "Потолок страниц выдачи (страховка от бесконечного цикла)"
        default: "400"

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Каталог
        env:
          OUT: /tmp/goswami-catalog.json
          TYPES: ${{ inputs.types || 'audio' }}
          MAX_PAGES: ${{ inputs.max_pages || '400' }}
        run: python tools/goswami/catalog.py

      - name: Карта
        env:
          CATALOG: /tmp/goswami-catalog.json
          MAX_ALBUM: ${{ inputs.max_album || '220' }}
        run: python tools/goswami/plan.py

      - name: Сводка в отчёт прогона
        if: always()
        run: |
          {
            echo "## Госвами · карта"
            python3 - <<'PY'
          import json, pathlib
          s = pathlib.Path("/tmp/goswami-catalog-stats.json")
          p = pathlib.Path("tools/goswami/goswami_plan.json")
          if s.exists():
              d = json.loads(s.read_text(encoding="utf-8"))["stats"]
              print(f"- записей: **{d['lectures']}**, со звуком: **{d['with_audio']}**")
              print(f"- звучание: **{d['hours']} ч**, объём: **{d['size_gb']} ГБ**")
              print(f"- вне циклов: {d['without_collection']}")
          if p.exists():
              pl = json.loads(p.read_text(encoding="utf-8"))
              print(f"- циклов в карте: **{pl['n_albums']}**")
              print("")
              print("| цикл | записей | часов |")
              print("|---|---:|---:|")
              for a in sorted(pl["albums"], key=lambda x: -len(x["tracks"]))[:25]:
                  h = sum(t["duration"] for t in a["tracks"]) / 3600
                  print(f"| {a['title'][:52]} | {len(a['tracks'])} | {h:.1f} |")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Карта → в репо
        run: |
          cp /tmp/goswami-catalog-stats.json docs/diagnostics/ 2>/dev/null || true
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -f tools/goswami/goswami_plan.json docs/diagnostics/goswami-catalog-stats.json || true
          git diff --cached --quiet && { echo "нечего коммитить"; exit 0; }
          git commit -m "Госвами: карта заливки [skip ci]"
          for i in 1 2 3 4 5 6; do
            git pull --rebase -q origin main && git push -q origin HEAD:main && break
            sleep 5
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: goswami-catalog
          path: |
            /tmp/goswami-catalog.json
            tools/goswami/goswami_plan.json
          retention-days: 14

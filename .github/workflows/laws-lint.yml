name: laws-lint

# ЛИНТЕР ЗАКОНОВ — уровень принуждения У5 (docs/LAWS.md §1).
# Нарушение закона не может попасть в прод: сборка падает.
on:
  push:
    branches: [main]
    paths: ["apps/web/src/**", "tools/laws-lint.py", ".github/workflows/laws-lint.yml"]
  pull_request:
    paths: ["apps/web/src/**"]
  workflow_dispatch:

jobs:
  laws:
    name: Свод законов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Линтер законов (Д003 · И001 · И003 · Т002 · Ц001)
        run: python3 tools/laws-lint.py

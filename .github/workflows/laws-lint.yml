name: laws-lint

# ЛИНТЕР ЗАКОНОВ — уровень принуждения У5 (docs/LAWS.md §1).
# Нарушение закона не может попасть в прод: сборка падает.
on:
  push:
    branches: [main]
    paths: ["apps/web/src/**", "apps/web/worker.ts", "tools/**", "docs/LAWS.md", ".github/workflows/laws-lint.yml"]
  pull_request:
    paths: ["apps/web/src/**", "apps/web/worker.ts", "tools/**"]
  workflow_dispatch:

jobs:
  laws:
    name: Свод законов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установка зависимостей (нужны типы React для tsc)
        run: npm install --no-audit --no-fund

      # ЗКН-Р014 · ЗКН-Ф016: `vite build` (esbuild) типы НЕ ПРОВЕРЯЕТ — он соберёт
      # бандл с вырезанным компонентом и отдаст RC=0. Так белым экраном стали
      # Рецепты, и так же 13.07.2026 регулярка молча съела компонент `Ring`.
      # Фон давних ошибок зафиксирован поимённо; падаем на ЛЮБОЙ НОВОЙ.
      - name: Гейт типов — ноль НОВЫХ ошибок tsc (ЗКН-Р014)
        run: python3 tools/tsc-gate.py

      - name: Линтер законов — КОД (Д001 · Д002 · Д003 · И001 · Н001 · Н005 · Н016 · Н020 · Т002 · Ф006 · Ц001)
        run: python3 tools/laws-lint.py

      # ЗКН-Р004/БТ/И/Сд: половина конституции живёт в ДАННЫХ, а не в коде.
      # Линтер их не видит — именно там нарушения жили месяцами (649 ложных «золото»).
      # ⚠️ ЦЕПОЧКА ГЕЙТОВ НЕ ЗАВИСИТ ОТ СОСЕДА (ЗКН-Ц011 · «гейт, который не бежит, — не гейт»).
      #
      # Шаги шли по умолчанию, то есть ПОСЛЕДОВАТЕЛЬНО и с обрывом на первом красном.
      # `Аудит данных (D1)` красный — и СЕМЬ гейтов ниже (навигация, карточки,
      # инфраструктура, продукт, ПКЛ, адреса, конституция) просто НЕ ЗАПУСКАЛИСЬ:
      # в логе `skipped`. Один красный шаг ПРЯТАЛ состояние всех остальных — и новый
      # закон мог уехать в прод «зелёным», ни разу не проверенный.
      #
      # `if: always()` — каждый гейт отчитывается сам. Job всё равно красный, если
      # красный любой из них; но теперь ВИДНО, какой именно.
      - name: Аудит законов — ДАННЫЕ (D1)
        if: always()
        env:
          # account_id и database_id берутся из wrangler.toml (это не секреты).
          # Секрет только токен.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/data-audit.py

      # ЗКН-К: 12 законов карточек. До этого гейта стандарт ВБК/ВСК/ВМК/ПК
      # не проверялся ничем — существовал только на бумаге.
      # ЗКН-Н: самый крупный домен (22 закона) и самый хрупкий. Каждый его закон
      # родился из поломки, которую основатель увидел на экране.
      - name: Аудит навигации (домен Н)
        if: always()
        run: python3 tools/nav-audit.py

      - name: Аудит карточек (домен К)
        if: always()
        run: python3 tools/cards-audit.py

      # ЗКН-Ф · Пл: ломается тише всего — разрушительный воркфлоу, порядок роутов,
      # лимит кронов, зеркало схемы. Ошибка не видна на экране, видна в потерянных данных.
      - name: Аудит инфраструктуры и пайплайнов (Ф · Пл)
        if: always()
        run: python3 tools/infra-audit.py

      # ЗКН-Пр · Б: дисциплина продукта. Её нарушают не багом, а «полезной фичей»:
      # добавили ленту — приложение поехало в мирскую соцсеть. Поэтому запреты в гейте.
      - name: Аудит продукта и книг (Пр · Б)
        if: always()
        run: python3 tools/product-audit.py

      # ЗКН-Р004: ЗОЛОТО ТРЕБУЕТ УЛИКИ. Метка в D1 без паспорта и досье = самозванство:
      # ровно так 649 профилей объявляли себя золотом, имея <2000 знаков.
      - name: Аудит ПКЛ и реестра (П · Р)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/pkl-audit.py

      - name: Аудит адресов (переезды — ЗКН-Н025)
        if: always()
        run: python3 tools/url-audit.py

      - name: Аудит конституции (свод против кода)
        if: always()
        run: python3 tools/laws-audit.py

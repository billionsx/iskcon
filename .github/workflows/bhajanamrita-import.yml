name: bhajanamrita import (API → decode PUA → payload + match report)

# Тянет бхаджаны с публичного API bhajanamrita (С РАЗРЕШЕНИЯ Sri Rupa Seva Kunj),
# декодирует PUA-шрифт в нормальный Unicode, мапит в payload-схему загрузчика и
# классифицирует против нашей базы. В D1 НЕ пишет — выдаёт payload + отчёт MATCH
# на ревью. Запись потом — воркфлоу «bhajans load» (mode=write) по этому payload.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Язык контента"
        required: true
        default: "ru"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Self-test декодера/маппера
        run: python3 tools/bhajans/bhajanamrita_import.py --selftest

      - name: Fetch + decode + map + classify
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 tools/bhajans/bhajanamrita_import.py --build \
            --payload data/bhajanamrita_payload.json \
            --match tools/bhajans/recon/MATCH.json \
            --lang "${{ inputs.lang }}"

      - name: Commit payload + match report
        run: |
          git config user.name "Billions X"; git config user.email "ceo@billionsx.com"
          git add data/bhajanamrita_payload.json tools/bhajans/recon/MATCH.json
          git commit -m "import(bhajanamrita): payload + match report (dry, by permission) [skip ci]" || { echo "нечего коммитить"; exit 0; }
          git push

name: ia-tracks
on:
  workflow_dispatch:
    inputs:
      run_tag: { description: tag, required: false, default: tracks }
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - run: |
          python3 - <<'PY'
          import json, urllib.request
          slugs = ["manah-siksa","siksastaka","bhakti-tattva-viveka","mukunda-mala-stotra",
                   "sanmodana-bhashya","bhaktyaloka","prema-pradipa","harinama-cintamani",
                   "caitanya-siksamrta","jagannatha-vallabha-nataka","sri-namamrita"]
          def get(u):
              try: return urllib.request.urlopen(u, timeout=30).read()
              except Exception: return None
          def titles(s):
              raw=get(f"https://archive.org/download/iskcone-{s}/playlist.json")
              if not raw: return []
              try: return [t.get("title","?") for t in json.loads(raw).get("tracks",[])]
              except Exception: return []
          data={s:titles(s) for s in slugs}
          # по 2 книги на нотис (лимит ~10 аннотаций), по 5 первых трека
          pairs=[slugs[i:i+2] for i in range(0,len(slugs),2)]
          for grp in pairs:
              lines=[]
              for s in grp:
                  ts=data[s]
                  lines.append(f"### {s} (n={len(ts)})")
                  for t in ts[:5]: lines.append("  "+t)
              msg="\n".join(lines).replace('%','%25').replace('\r','').replace('\n','%0A')
              print(f"::notice title={grp[0]}::{msg}")
          PY

name: Координаты мест Враджа (vrajapedia → D1)

# ЗКН-Пл006 · ЗКН-БТ001
#
# Карта дхамы пуста: из 672 мест координаты есть у 54 (8%).
#
# ПРИНЦИП ЗДЕСЬ ОБРАТНЫЙ, ЧЕМ У ЦЕНТРОВ ИСККОН. Центры переезжают и закрываются —
# геокодировать их адреса из архива 2011 нельзя. Места Враджа (гхаты, кунды, храмы,
# самадхи) стоят на одном месте ВЕКАМИ и не протухают: координата, взятая один раз,
# верна и через сто лет.
#
# У 564 мест уже проставлена ссылка на vrajapedia.com — это их источник.
# Скрипт НЕ выдумывает координаты: источник промолчал → место остаётся без точки.
# Точка наугад врёт паломнику, а это хуже пустой карты (ЗКН-БТ001 · ЗКН-Пр007).

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 2"

concurrency:
  group: vraja-coords
  cancel-in-progress: false

jobs:
  coords:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Координаты мест Враджа
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/vraja-coords.py

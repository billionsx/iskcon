# Движок загрузчика аудио. Запускается из gaurangers.com/downloader (бэкенд
# /api/downloader/* диспетчеризует этот workflow), либо вручную: Actions →
# «Загрузчик аудио (TG → archive.org)» → Run workflow.
#
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   TG_API_ID, TG_API_HASH, TG_SESSION_STRING   (TG_SESSION_STRING: python tools/tg-archive/make_session.py)
#   IA_ACCESS_KEY, IA_SECRET_KEY                  (нужны только для mode=upload)
# run_tag прокидывается в имя прогона — по нему страница находит статус.
name: "\u0417\u0430\u0433\u0440\u0443\u0437\u0447\u0438\u043a \u0430\u0443\u0434\u0438\u043e (TG \u2192 archive.org)"
run-name: "downloader ${{ inputs.run_tag }} \u00b7 ${{ inputs.mode }}"

concurrency:
  group: tg-archive-session
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      run_tag:
        description: "\u041c\u0435\u0442\u043a\u0430 \u043f\u0440\u043e\u0433\u043e\u043d\u0430 (\u0434\u043b\u044f \u043e\u0442\u0441\u043b\u0435\u0436\u0438\u0432\u0430\u043d\u0438\u044f)"
        default: "manual"
      mode:
        description: "package = .zip \u0432 \u0430\u0440\u0442\u0435\u0444\u0430\u043a\u0442\u044b; upload = \u043d\u0430 archive.org"
        type: choice
        options: [package, upload, pick]
        default: package
      channel:
        description: "Telegram-\u043a\u0430\u043d\u0430\u043b (@username \u0438\u043b\u0438 t.me/\u2026)"
        required: true
      ia_mode:
        description: "\u0421\u0432\u044f\u0437\u044c \u0441 \u043a\u043d\u0438\u0433\u043e\u0439 (\u0442\u043e\u043b\u044c\u043a\u043e \u0434\u043b\u044f upload)"
        type: choice
        options: [new_item, attach_to_book]
        default: new_item
      identifier:
        description: "archive.org id \u043d\u043e\u0432\u043e\u0433\u043e \u043e\u0431\u044a\u0435\u043a\u0442\u0430 (\u0434\u043b\u044f new_item)"
        default: ""
      related_book_url:
        description: "URL \u043a\u043d\u0438\u0433\u0438 \u0434\u043b\u044f \u043a\u0440\u043e\u0441\u0441-\u0441\u0432\u044f\u0437\u0438 (\u043d\u0435\u043e\u0431\u044f\u0437.)"
        default: ""
      book_identifier:
        description: "archive.org id \u043e\u0431\u044a\u0435\u043a\u0442\u0430 \u043a\u043d\u0438\u0433\u0438 (\u0434\u043b\u044f attach_to_book)"
        default: ""
      limit:
        description: "Лимит файлов (пусто = все; для теста)"
        default: ""
      match:
        description: "pick: брать только сообщения с этим текстом (заголовок/имя файла/подпись)"
        default: ""
      newest:
        description: "pick: сканировать свежие сначала (true для недавнего поста)"
        default: "true"
      book:
        description: "id книги в библиотеке (work, напр. spl) — метаданные строятся по стандарту (для upload)"
        default: ""
      meta_json:
        description: "JSON метаданных книги (если задан — используется напрямую, без запроса к сайту)"
        default: ""
      batch_json:
        description: "JSON-массив [{channel, meta}] — несколько книг последовательно в одном джобе"
        default: ""
      login_poll:
        description: "Войти в этом же раннере (один IP), ждать код в variable TG_CODE_LIVE (true/false)"
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "\u0417\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438"
        run: pip install -r tools/tg-archive/requirements.txt

      - name: "Вход в этом же раннере (один IP) — если login_poll=true"
        if: ${{ inputs.login_poll == 'true' }}
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_PHONE: ${{ secrets.TG_PHONE }}
          TG_PASSWORD: ${{ secrets.TG_PASSWORD }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: billionsx/iskcon
        run: python tg_load.py

      - name: "\u0421\u043a\u0430\u0447\u0430\u0442\u044c \u0430\u0443\u0434\u0438\u043e \u0438\u0437 \u043a\u0430\u043d\u0430\u043b\u0430"
        if: ${{ inputs.mode == 'package' }}
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ env.TG_SESSION_STRING || secrets.TG_SESSION_STRING }}
          TG_CHANNEL: ${{ inputs.channel }}
          TG_LIMIT: ${{ inputs.limit }}
        run: |
          set +e
          python tg_archive.py download 2>&1 | tee /tmp/tg.log
          rc=${PIPESTATUS[0]}
          [ $rc -ne 0 ] && echo "::error title=tg-archive-download::$(tail -c 1500 /tmp/tg.log | tr '\n\r\t' '   ')"
          exit $rc

      - name: "\u0423\u043f\u0430\u043a\u043e\u0432\u0430\u0442\u044c \u0432 .zip"
        if: ${{ inputs.mode == 'package' }}
        working-directory: tools/tg-archive
        run: python tg_archive.py package

      - name: "\u0412\u044b\u043b\u043e\u0436\u0438\u0442\u044c .zip \u0432 \u0430\u0440\u0442\u0435\u0444\u0430\u043a\u0442\u044b"
        if: ${{ inputs.mode == 'package' }}
        uses: actions/upload-artifact@v4
        with:
          name: iskcon-audio
          path: tools/tg-archive/*.zip
          retention-days: 7

      - name: "\u0417\u0430\u043b\u0438\u0442\u044c \u043d\u0430 archive.org"
        if: ${{ inputs.mode == 'upload' }}
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ env.TG_SESSION_STRING || secrets.TG_SESSION_STRING }}
          TG_CHANNEL: ${{ inputs.channel }}
          TG_LIMIT: ${{ inputs.limit }}
          BOOK_ID: ${{ inputs.book }}
          META_JSON: ${{ inputs.meta_json }}
          BATCH_JSON: ${{ inputs.batch_json }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          IA_MODE: ${{ inputs.ia_mode }}
          IA_IDENTIFIER: ${{ inputs.identifier }}
          IA_RELATED_BOOK_URL: ${{ inputs.related_book_url }}
          IA_BOOK_IDENTIFIER: ${{ inputs.book_identifier }}
        run: |
          set +e
          python tg_archive.py stream 2>&1 | tee /tmp/tg.log
          rc=${PIPESTATUS[0]}
          [ $rc -ne 0 ] && echo "::error title=tg-archive-stream::$(tail -c 1500 /tmp/tg.log | tr '\n\r\t' '   ')"
          exit $rc

      - name: "Точечно: лекция → archive.org (pick)"
        if: ${{ inputs.mode == 'pick' }}
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ env.TG_SESSION_STRING || secrets.TG_SESSION_STRING }}
          TG_CHANNEL: ${{ inputs.channel }}
          TG_LIMIT: ${{ inputs.limit }}
          TG_MATCH: ${{ inputs.match }}
          TG_NEWEST: ${{ inputs.newest }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          IA_MODE: new_item
          IA_IDENTIFIER: ${{ inputs.identifier }}
        run: |
          set +e
          python tg_archive.py run 2>&1 | tee /tmp/tg.log
          rc=${PIPESTATUS[0]}
          [ $rc -ne 0 ] && echo "::error title=tg-archive-pick::$(tail -c 1500 /tmp/tg.log | tr '\n\r\t' '   ')"
          echo "----- MANIFEST -----"; cat manifest.json 2>/dev/null | tr -d '\r'
          exit $rc

      - name: "Манифест pick → артефакт"
        if: ${{ inputs.mode == 'pick' }}
        uses: actions/upload-artifact@v4
        with:
          name: pick-manifest
          path: tools/tg-archive/manifest.json
          retention-days: 7

name: pull-covers
on:
  workflow_dispatch:
    inputs:
      run_tag: { description: "метка", required: false, default: "pull-covers" }
permissions:
  contents: write
jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Стянуть cover.jpg с archive.org → local covers
        run: |
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          import urllib.request, io, os
          from PIL import Image
          SLUGS = ["manah-siksa","siksastaka","bhakti-tattva-viveka","mukunda-mala-stotra",
            "sanmodana-bhashya","bhaktyaloka","prema-pradipa","harinama-cintamani",
            "caitanya-siksamrta","jagannatha-vallabha-nataka","sri-namamrita",
            "ray-of-vishnu","vrindavane-bhajana","uroki-lyubvi","navadvipa-dhama-mahatmya",
            "seventh-goswami","the-beggar"]
          os.makedirs("apps/web/public/covers", exist_ok=True)
          got=[]
          for s in SLUGS:
              url=f"https://archive.org/download/iskcone-{s}/cover.jpg"
              try:
                  req=urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
                  raw=urllib.request.urlopen(req, timeout=40).read()
                  im=Image.open(io.BytesIO(raw)); w,h=im.size
                  out=f"apps/web/public/covers/{s}-ia.jpg"
                  open(out,"wb").write(raw)
                  msg=f"{s}: {w}x{h} {im.mode} {len(raw)//1024}KB"
                  got.append(s)
              except Exception as e:
                  msg=f"{s}: НЕТ ({type(e).__name__})"
              print(msg); print(f"::notice title={s}::{msg}")
          print(f"::notice title=ИТОГ::стянуто {len(got)}/{len(SLUGS)}: {' '.join(got)}")
          PY
      - name: Коммит обложек
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add apps/web/public/covers/*-ia.jpg 2>/dev/null || true
          if git diff --cached --quiet; then echo "нет новых обложек"; else git commit -m "covers: стянуть cover.jpg изданий с archive.org (черновые -ia.jpg)"; git push; fi

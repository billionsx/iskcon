name: vaisnava-locations-fetch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build locations index
        run: |
          set -e
          python3 - <<'PY'
          import json, re, sys, os, traceback, urllib.request, urllib.parse

          def ann(level, title, msg):
              msg = str(msg).replace("%", "%25").replace("\r", " ").replace("\n", " | ")[:880]
              print(f"::{level} title={title}::{msg}"); sys.stdout.flush()
          def _hook(t, v, tb):
              ann("error", "LOC-FAIL", "".join(traceback.format_exception(t, v, tb))[-850:]); sys.exit(1)
          sys.excepthook = _hook

          UA = {"User-Agent": "iskcon-one-love/1.0 (+https://gaurangers.com; ceo@billionsx.com)"}
          def get(url):
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=60) as r:
                  return r.read().decode("utf-8", "replace")

          pages = [
              "https://www.vaisnavacalendar.info/calendar-file-downloads/ics-ical-calendar-files",
              "https://www.vaisnavacalendar.info/calendar-file-downloads/txt-calendar-files-2026",
          ]
          found = set()
          for u in pages:
              try:
                  html = get(u)
              except Exception as e:
                  ann("warning", "PAGE", f"{u} -> {e}"); continue
              ann("notice", "PAGE", f"{u} bytes={len(html)}")
              # ссылки вида .../2026/City [Country]-a2026-....(ics|txt), в т.ч. URL-кодированные
              for m in re.finditer(r'href="([^"]+?-a2026[^"]*?\.(?:ics|txt))"', html, re.I):
                  raw = urllib.parse.unquote(m.group(1))
                  base = raw.rsplit("/", 1)[-1]
                  mm = re.match(r"(.+?) \[([^\]]+)\]-a2026", base)
                  if mm:
                      found.add((mm.group(1).strip(), mm.group(2).strip()))
          ann("notice", "FOUND", f"locations={len(found)}")
          assert len(found) >= 30, f"too few locations: {len(found)}"

          by_country = {}
          for city, country in sorted(found):
              by_country.setdefault(country, []).append(city)
          sample = "; ".join(f"{c}:{len(v)}" for c, v in sorted(by_country.items())[:25])
          ann("notice", "COUNTRIES", f"{len(by_country)} -> {sample}")

          os.makedirs("apps/web/public/data", exist_ok=True)
          json.dump({"source": "vaisnavacalendar.info", "year": 2026,
                     "countries": [{"country": c, "cities": v} for c, v in sorted(by_country.items())]},
                    open("apps/web/public/data/vaisnava-locations.json", "w", encoding="utf-8"),
                    ensure_ascii=False, separators=(",", ":"))
          print("WROTE", os.path.getsize("apps/web/public/data/vaisnava-locations.json"))
          PY
      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A apps/web/public/data/vaisnava-locations.json
          if git diff --cached --quiet; then echo "No changes."; else
            git commit -m "data: индекс городов вайшнавского календаря (vaisnavacalendar.info)"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi

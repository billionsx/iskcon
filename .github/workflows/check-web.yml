name: Check Web (smoke only)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Probe hosts and record into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          for host in brajs.com www.brajs.com; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://$host/")
            xr=$(curl -s -I --max-time 20 "https://$host/" | grep -i 'x-robots-tag' | tr -d '\r')
            echo "$host -> HTTP $code ; $xr"
            note=$(echo "$xr" | tr -d "\"'" | cut -c1-150)
            bunx wrangler d1 execute iskcon-db --remote \
              --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'probe $host',${code:-0},'$note');" || true
          done

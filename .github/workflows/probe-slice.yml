name: Probe slice URL

on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      offset:
        required: true
        default: "0"

permissions: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      U: ${{ github.event.inputs.url }}
      O: ${{ github.event.inputs.offset }}
    steps:
      - name: SLICE
        run: |
          BODY=$(curl -sL "$U" | tr '\n\r' '  ')
          for i in 1 2 3; do
            S=$((O + (i-1)*800)); E=$((S + 800))
            CH=$(echo "$BODY" | cut -c $((S+1))-$E)
            echo "::notice title=S$i::${CH}"
          done

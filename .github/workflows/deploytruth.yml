name: Deploy truth (capture wrangler deploy error)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install
      - name: Build + deploy, capture everything
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          R=../../DEPLOY_TRUTH.md
          echo "# DEPLOY TRUTH — $(date -u)" > $R
          echo "" >> $R
          echo "git HEAD: $(git rev-parse HEAD)" >> $R
          echo "" >> $R

          echo "## build" >> $R
          bun run build > /tmp/build.log 2>&1
          echo "    vite build exit = $?" >> $R
          echo "    dist JS: $(ls dist/assets/index-*.js 2>/dev/null | xargs -n1 basename | tr '\n' ' ')" >> $R
          JS=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          echo "    'Аудио главы' в собранном dist: $(grep -c 'Аудио главы' "$JS" 2>/dev/null)" >> $R
          echo "    'initialTarget' в dist: $(grep -c 'initialTarget' "$JS" 2>/dev/null)" >> $R
          echo "    worker.ts содержит /__fresh: $(grep -c '__fresh' worker.ts)" >> $R
          echo "    worker.ts содержит Cloudflare-CDN-Cache-Control: $(grep -c 'Cloudflare-CDN-Cache-Control' worker.ts)" >> $R
          echo "    --- последние строки build.log ---" >> $R
          tail -8 /tmp/build.log | sed 's/^/    /' >> $R
          echo "" >> $R

          echo "## wrangler deploy (реальный код возврата, БЕЗ конвейера)" >> $R
          bunx wrangler deploy > /tmp/dep.log 2>&1
          RC=$?
          echo "    *** wrangler deploy exit = $RC ***" >> $R
          echo "    --- полный вывод wrangler deploy ---" >> $R
          sed -E 's#https://[^ ]*@#https://#g; s#[A-Za-z0-9_-]{40,}#<redacted>#g' /tmp/dep.log | sed 's/^/    /' >> $R
          echo "" >> $R

          echo "## версии ПОСЛЕ deploy" >> $R
          ACCT=d5cbe19470dc38599873eabfe148e6d1
          API=https://api.cloudflare.com/client/v4
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          curl -s "$API/accounts/$ACCT/workers/scripts/iskcon-web/versions?per_page=2" "${auth[@]}" \
            | jq -r '.result.items[0:2][]? | "    version \(.id) created=\(.metadata.created_on // "?") source=\(.metadata.source // "?")"' >> $R 2>/dev/null

          cd ../..
          git config user.email "ceo@billionsx.com"
          git config user.name "Billions X"
          git add DEPLOY_TRUTH.md
          git commit -m "deploy-truth: реальный код возврата и вывод wrangler deploy" || echo "nothing"
          git push || echo "push failed"

name: darshan-mayapur-probe

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe mayapur.com gallery (index, plain fetch)
        run: node scripts/darshan-probe-mayapur.mjs
      - name: Install puppeteer
        run: npm i puppeteer@23 --no-save --no-audit --no-fund
      - name: Probe mayapur.com album (render, find originals + json)
        env:
          ALBUM_ID: ${{ github.event.inputs.album_id || '594' }}
        run: node scripts/darshan-probe-mayapur-album.mjs
      - name: Publish result to side branch
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git checkout -B ci/darshan-mayapur
          git add -f data/darshan/_mayapur.json data/darshan/_mayapur_album.json
          git commit -m "chore(darshan): mayapur gallery+album probe result [skip ci]" || echo "no changes"
          git push -f origin ci/darshan-mayapur

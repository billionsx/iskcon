name: Fetch Puri cover candidates (preview shortlist)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download shortlist & convert to previews
        run: |
          set -e
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          import json, urllib.request, urllib.parse, os
          UA = {"User-Agent": "iskcon-one-love/1.0 (ceo@billionsx.com)"}
          def imageinfo(title):
              url = ("https://commons.wikimedia.org/w/api.php?action=query&prop=imageinfo"
                     "&iiprop=url|size&format=json&titles=" + urllib.request.quote(title))
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=60) as r:
                  d = json.load(r)
              for _pid, p in d.get("query",{}).get("pages",{}).items():
                  ii = (p.get("imageinfo") or [None])[0]
                  if ii: return ii.get("url"), ii.get("width"), ii.get("height")
              return None, 0, 0

          shortlist = [
              "File:Shri Jagannatha Temple.jpg",
              "File:Jagannath Temple, Puri 01.jpg",
              "File:Jagannath Temple, Puri 03.jpg",
              "File:Jagannath Temple, Puri, 2014.jpg",
              "File:Puri Jagannath Temple.jpg",
          ]
          from PIL import Image
          os.makedirs("_puricand", exist_ok=True)
          lines = []
          for i, title in enumerate(shortlist, 1):
              try:
                  furl, w, h = imageinfo(title)
                  if not furl:
                      print("no url for", title); continue
                  req = urllib.request.Request(furl, headers=UA)
                  with urllib.request.urlopen(req, timeout=180) as r:
                      raw = r.read()
                  open("/tmp/c.bin","wb").write(raw)
                  im = Image.open("/tmp/c.bin").convert("RGB")
                  if im.size[0] > 1300:
                      ratio = 1300/im.size[0]
                      im = im.resize((1300, int(im.size[1]*ratio)), Image.LANCZOS)
                  out = f"_puricand/puri-c{i}.webp"
                  im.save(out, "WEBP", quality=82, method=6)
                  print("WROTE", out, im.size)
                  lines.append(f"c{i}: {title} | {w}x{h} | {furl}")
              except Exception as e:
                  print("err", title, e)
          open("_puricand/index.txt","w").write("\n".join(lines)+"\n")
          PY

      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A _puricand 2>/dev/null || true
          if git diff --cached --quiet; then echo "No changes."; exit 0; fi
          git commit -m "media: Puri cover candidate previews (temp)"
          for i in 1 2 3 4 5 6; do
            if git push origin HEAD:main; then echo "PUSHED"; git rev-parse HEAD; exit 0; fi
            git fetch origin main; GIT_EDITOR=true git rebase origin/main || git rebase --abort
          done
          echo "push failed"; exit 1

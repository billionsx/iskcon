# Движок забора Telegram Stories канала → archive.org.
# Запускается ИЗ ПРИЛОЖЕНИЯ (бэкенд /api/stories-sync/* диспетчеризует этот workflow,
# страница gaurangers.com/stories-tool), а также по расписанию — свежие активные
# сторис подхватываются автоматически.
#
# Секреты репозитория (те же, что у аудио-загрузчика):
#   TG_API_ID, TG_API_HASH, TG_SESSION_STRING   (TG_SESSION_STRING: python tools/tg-archive/make_session.py)
#   IA_ACCESS_KEY, IA_SECRET_KEY
# run_tag прокидывается в имя прогона — по нему страница находит статус.
name: "Сторис (TG → archive.org)"
run-name: "stories ${{ inputs.run_tag }}"

on:
  workflow_dispatch:
    inputs:
      run_tag:
        description: "Метка прогона (для отслеживания)"
        default: "manual"
      channel:
        description: "Telegram-канал (пусто = @iskcone)"
        default: ""
      identifier:
        description: "archive.org id объекта сторис (пусто = iskcone-stories)"
        default: ""
  # ВРЕМЕННО ОТКЛЮЧЕНО на массовую загрузку книг: крон каждые 3ч использовал ту же
  # TG_SESSION_STRING с нового IP раннера и отзывал сессию. Вернуть после загрузки.
  # schedule:
  #   - cron: "0 */3 * * *"

concurrency:
  group: tg-archive-session  # общая блокировка с аудио-загрузчиком (одна TG-сессия)
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Зависимости"
        run: pip install -r tools/tg-stories/requirements.txt

      - name: "Забрать сторис канала"
        working-directory: tools/tg-stories
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_CHANNEL: ${{ inputs.channel }}
          IA_IDENTIFIER: ${{ inputs.identifier }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: python tg_stories.py fetch

name: Ингест «Чайтанья-бхагаваты» (docs/sources → D1)

# ЗКН-Пр007 · ЗКН-БТ001
#
# В досье уже стоят 15 цитат из «Чайтанья-бхагаваты» и «Чайтанья-мангалы» — а самих
# книг в приложении НЕТ. Читатель жмёт ссылку под цитатой и упирается в пустоту.
# Закон проекта прям: дословная цитата = обязательство внести книгу целиком.
#
# Русский текст ЛЕЖИТ В РЕПОЗИТОРИИ (93 165 строк, с комментариями Шрилы
# Бхактисиддханты Сарасвати). Книга числилась «нечитаемой» не потому, что текста
# нет, а потому, что его не внесли.
#
# ⚠️ МАДХЬЯ-КХАНДА НЕ ВНОСИТСЯ: в источнике её главы не размечены. Записать 5024
# стиха с ВЫДУМАННЫМИ адресами хуже, чем не записать — каждая ссылка вела бы не
# туда. Ади (17 глав) и Антья (10) разобраны ТОЧНО: счёт сходится с оглавлением.

on:
  workflow_dispatch:

concurrency:
  group: ingest-chaitanya
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Разбор и запись в D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/ingest-chaitanya.py

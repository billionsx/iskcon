name: darshan-api-probe

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch .data endpoints
        run: node scripts/darshan-fetch-api.mjs
      - name: Publish result
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git checkout -B ci/darshan-api
          git add -f data/darshan/_api.json
          git commit -m "chore(darshan): api probe [skip ci]" || echo "no changes"
          git push -f origin ci/darshan-api

name: export-gbc
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Export 27 GBC gold cards D1 -> CSV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          CF_DATABASE_ID: 6226aded-dd03-4e74-977f-9cd0b509e73d
        run: python3 docs/entity-registry/export_gbc_to_csv.py
      - name: Commit updated CSVs
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add docs/entity-registry/profiles_curated.csv \
                  docs/entity-registry/profiles_longform.csv \
                  docs/entity-registry/profiles_auto.csv
          git commit -m "registry: persist 27 GBC gold cards into CSV (curated+longform); drop stale auto rows [skip ci]" || echo "nothing to commit"
          git push || true

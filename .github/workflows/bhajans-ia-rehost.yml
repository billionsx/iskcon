name: bhajans IA rehost (медиа → archive.org)

# Качает медиа бхаджанов с cdn.bhajanamrita.com, заливает в archive.org
# (объект iskcone-bhajan-<slug>) и переписывает prayer_media.url на archive.org.
# Идемпотентно — можно перезапускать (резюмируется по существующим файлам).

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bhajans-ia-rehost
  cancel-in-progress: false

jobs:
  rehost:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: pip install "internetarchive>=4.1" --break-system-packages
      - name: Rehost
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: python3 tools/bhajans/ia_rehost.py
      - name: Commit report
        if: always()
        run: |
          git config user.name "Billions X"; git config user.email "ceo@billionsx.com"
          git add tools/bhajans/recon/IA_REHOST.json || true
          git commit -m "ia-rehost(bhajanamrita): отчёт переноса медиа в archive.org [skip ci]" || exit 0
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push origin main && break || sleep 3; done

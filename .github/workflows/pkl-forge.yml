name: pkl-forge (кузница — онлайн-книга о личности)

# ЗКН-П001 · П008 · П010 · П011 — конвейер, а не руки.
#   паспорт имён → жатва по 7 каналам → сборка книги → гейт → запись в D1
# Сеть тут открыта (в отличие от песочницы), поэтому k3/k5/k6/k7 работают.

on:
  workflow_dispatch:
    inputs:
      entity_id:
        description: "id личности (напр. jiva-goswami)"
        required: true
      mode:
        description: "стадия"
        type: choice
        default: forge
        options: [forge, passport, harvest, compose, gate, publish]
      dry:
        description: "не писать в D1"
        type: boolean
        default: false
      keep_old:
        description: "сохранить чужие табы старой карточки"
        type: boolean
        default: true
      candidates:
        description: "включить кандидатов (голое имя) в книгу"
        type: boolean
        default: false
      offline:
        description: "без сети (только k1/k2/k4)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  forge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Кузница
        id: forge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          D1_DATABASE_ID: 6226aded-dd03-4e74-977f-9cd0b509e73d
          # Необязателен. Есть ключ — связки пишет модель (под гейтом содержания),
          # нет ключа — связки служебные, книга всё равно полна и законна.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail                       # ЗКН-Ф: tee маскирует код возврата
          FLAGS=""
          [ "${{ inputs.dry }}" = "true" ] && FLAGS="$FLAGS --dry"
          [ "${{ inputs.keep_old }}" = "true" ] && FLAGS="$FLAGS --keep-old"
          [ "${{ inputs.candidates }}" = "true" ] && FLAGS="$FLAGS --candidates"
          [ "${{ inputs.offline }}" = "true" ] && FLAGS="$FLAGS --offline"
          python3 tools/goldforge/goldforge.py ${{ inputs.mode }} \
            "${{ inputs.entity_id }}" $FLAGS 2>&1 | tee forge.log
          RC=$?
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          exit $RC

      - name: Сводка в аннотации
        if: always()
        run: |
          # Логи GitHub лежат на неразрешённом хосте — поэтому итог печатаем
          # аннотацией и кладём в Summary: видно без скачивания артефактов.
          {
            echo "## Кузница · ${{ inputs.entity_id }}"
            echo '```'
            grep -E "каналы|k[1-7]-|strong|candidate|homonym|табов|цитат|ВЕРДИКТ|ЗАПИСАНО|✗|::" forge.log | head -40
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          grep -E "ВЕРДИКТ|ЗАПИСАНО" forge.log | while read -r l; do echo "::notice::$l"; done
          grep -E "✗" forge.log | head -10 | while read -r l; do echo "::error::$l"; done

      - name: Улики в репозиторий (паспорт · бриф · книга)
        if: success() && inputs.dry != true
        run: |
          git config user.email "ceo@billionsx.com"
          git config user.name "Billions X"
          git add docs/dossiers/passports/ docs/dossiers/*.brief.md data/pkl/ 2>/dev/null || true
          git commit -m "forge: ${{ inputs.entity_id }} — книга, паспорт, бриф [skip ci]" \
            || echo "нечего коммитить"
          for i in 1 2 3 4 5 6; do
            git fetch origin main -q
            git merge-base --is-ancestor origin/main HEAD && break
            GIT_EDITOR=true git rebase origin/main || true
            sleep 5
          done
          git push origin HEAD:main || true

      - name: Досье (артефакт — велико для репозитория)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dossier-${{ inputs.entity_id }}
          path: |
            docs/dossiers/${{ inputs.entity_id }}.dossier.json
            docs/dossiers/${{ inputs.entity_id }}.brief.md
            data/pkl/${{ inputs.entity_id }}.json
            forge.log
          if-no-files-found: warn

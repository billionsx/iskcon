name: registry-restore-ncr
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore + diagnostics
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          CF_DATABASE_ID: 6226aded-dd03-4e74-977f-9cd0b509e73d
        run: |
          set +e
          LOG=docs/entity-registry/_restore_log.txt
          echo "== probe: SELECT 1 (reveals token/api health + error body) ==" > "$LOG"
          curl -s -w "\nHTTP %{http_code}\n" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database/$CF_DATABASE_ID/query" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
            -d '{"sql":"SELECT 1 AS ok;"}' >> "$LOG" 2>&1
          echo "" >> "$LOG"
          echo "== python restore_ncr.py ==" >> "$LOG"
          python3 docs/entity-registry/restore_ncr.py >> "$LOG" 2>&1
          echo "EXIT=$?" >> "$LOG"
          cat "$LOG"
      - name: Commit diag log
        if: always()
        run: |
          git config user.email ceo@billionsx.com
          git config user.name "Billions X"
          git add docs/entity-registry/_restore_log.txt || true
          git commit -m "ci: restore diag log [skip ci]" || true
          git push || true

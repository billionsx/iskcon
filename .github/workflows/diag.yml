name: Diagnose serving + purge cache (report to repo)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diagnose, purge, write report
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          ACCT=d5cbe19470dc38599873eabfe148e6d1
          API=https://api.cloudflare.com/client/v4
          auth=(-H "Authorization: Bearer $T" -H "Content-Type: application/json")
          R=DIAG_REPORT.md
          echo "# Диагностика gaurangers.com — $(date -u)" > $R
          echo "" >> $R

          ZONE=$(curl -s "$API/zones?name=gaurangers.com" "${auth[@]}" | jq -r '.result[0].id')
          echo "zone=$ZONE" >> $R
          echo "" >> $R

          echo "## DNS-записи" >> $R
          curl -s "$API/zones/$ZONE/dns_records?per_page=100" "${auth[@]}" \
            | jq -r '.result[]? | "- \(.type) \(.name) -> \(.content) proxied=\(.proxied)"' >> $R
          echo "" >> $R

          echo "## Worker custom domains (кто из воркеров держит хост)" >> $R
          curl -s "$API/accounts/$ACCT/workers/domains?per_page=100" "${auth[@]}" \
            | jq -r '.result[]? | "- \(.hostname) -> \(.service)/\(.environment)"' >> $R
          echo "" >> $R

          echo "## Cache Rules / rulesets" >> $R
          RS=$(curl -s "$API/zones/$ZONE/rulesets" "${auth[@]}")
          printf '%s' "$RS" | jq -r '.result[]? | "- \(.phase): \(.name)"' >> $R
          CID=$(printf '%s' "$RS" | jq -r '.result[]? | select(.phase=="http_request_cache_settings") | .id' | head -1)
          if [ -n "$CID" ]; then
            echo "    rules в http_request_cache_settings:" >> $R
            curl -s "$API/zones/$ZONE/rulesets/$CID" "${auth[@]}" \
              | jq -r '.result.rules[]? | "      [\(.enabled)] \(.expression) -> cache=\(.action_parameters.cache) edge_ttl=\(.action_parameters.edge_ttl // "respect")"' >> $R
          else
            echo "    (правил кэширования в зоне нет — HTML кэшируется по умолчанию/настройкам)" >> $R
          fi
          echo "" >> $R

          echo "## Pages-проекты и их домены" >> $R
          curl -s "$API/accounts/$ACCT/pages/projects?per_page=100" "${auth[@]}" \
            | jq -r '.result[]? | "- проект \(.name): domains=\(.domains)"' >> $R
          echo "" >> $R

          echo "## Заголовки ответа apex (до purge)" >> $R
          curl -s -D - -o /dev/null --max-time 25 "https://gaurangers.com/" \
            | tr -d '\r' | grep -iE "^HTTP|^server:|^cf-cache-status:|^x-robots-tag:|^cache-control:|^age:|^etag:|^last-modified:" | sed 's/^/    /' >> $R
          echo "" >> $R

          echo "## Какой JS грузит index.html (до purge)" >> $R
          HTML=$(curl -s --max-time 25 "https://gaurangers.com/")
          JS=$(printf '%s' "$HTML" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          echo "    script (обычный /): ${JS:-?}" >> $R
          echo "" >> $R

          echo "## ПРОБА cache-buster: /?_cb=NNN (другой ключ кэша → должен дойти до воркера)" >> $R
          CBQ="?_cb=$(date +%s)"
          CBHDR=$(curl -s -D - -o /tmp/cb.html --max-time 25 "https://gaurangers.com/$CBQ")
          echo "    cf-cache-status: $(printf '%s' "$CBHDR" | tr -d '\r' | grep -i '^cf-cache-status:' | cut -d' ' -f2-)" >> $R
          echo "    cache-control:   $(printf '%s' "$CBHDR" | tr -d '\r' | grep -i '^cache-control:' | cut -d' ' -f2-)" >> $R
          JSCB=$(grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' /tmp/cb.html | head -1)
          echo "    script при cache-buster: ${JSCB:-?}" >> $R
          if [ -n "$JSCB" ]; then
            BODY=$(curl -s --max-time 30 "https://gaurangers.com$JSCB")
            echo "    'Аудио главы' в нём: $(printf '%s' "$BODY" | grep -c 'Аудио главы')  | 'initialTarget': $(printf '%s' "$BODY" | grep -c 'initialTarget')" >> $R
          fi
          echo "" >> $R

          echo "## Существуют ли файлы на сервере (HEAD)" >> $R
          for H in 896pWg7C CoKgVYa4; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "https://gaurangers.com/assets/index-$H.js")
            ccs=$(curl -s -I --max-time 20 "https://gaurangers.com/assets/index-$H.js" | tr -d '\r' | grep -i '^cf-cache-status:' | cut -d' ' -f2-)
            echo "    /assets/index-$H.js -> HTTP $code (cf-cache-status: ${ccs:-?})" >> $R
          done
          echo "    (896pWg7C = старый бандл на сайте; CoKgVYa4 = новый из сборки main)" >> $R
          echo "" >> $R

          echo "## PURGE EVERYTHING" >> $R
          PURGE=$(curl -s -X POST "$API/zones/$ZONE/purge_cache" "${auth[@]}" --data '{"purge_everything":true}')
          echo "    success=$(printf '%s' "$PURGE" | jq -r '.success') errors=$(printf '%s' "$PURGE" | jq -c '.errors')" >> $R
          echo "" >> $R

          sleep 8
          echo "## Заголовки apex (после purge)" >> $R
          curl -s -D - -o /dev/null --max-time 25 "https://gaurangers.com/" \
            | tr -d '\r' | grep -iE "^HTTP|^cf-cache-status:|^x-robots-tag:|^cache-control:|^age:" | sed 's/^/    /' >> $R
          echo "" >> $R
          HTML2=$(curl -s --max-time 25 "https://gaurangers.com/")
          JS2=$(printf '%s' "$HTML2" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          echo "    script после purge: ${JS2:-?}" >> $R

          git config user.email "ceo@billionsx.com"
          git config user.name "Billions X"
          git add DIAG_REPORT.md
          git commit -m "diag: отчёт о том, кто отдаёт gaurangers.com + purge кэша" || echo "nothing to commit"
          git push || echo "push failed"

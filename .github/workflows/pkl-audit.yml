name: pkl audit (сверка цитат ПКЛ Кришны с эталоном D1)
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Audit
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import csv, json, re, os, urllib.request, time
          csv.field_size_limit(10_000_000)
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def d1(sql, params=None):
              b={"sql":sql}
              if params is not None: b["params"]=params
              for _ in range(4):
                  try:
                      r=urllib.request.urlopen(urllib.request.Request(D1, data=json.dumps(b).encode(),
                        headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}), timeout=60)
                      return json.loads(r.read().decode())
                  except Exception: time.sleep(2)
          rows={r[0]:r[1] for r in csv.reader(open("docs/entity-registry/profiles_longform.csv",encoding="utf-8"))}
          dos=json.loads(rows["krishna"])
          Q=[]
          for t in dos["tabs"]:
              for sub in t.get("subtabs",[]):
                  for s in sub.get("sections",[]):
                      loc=f"{t['id']}/{sub['id']}"
                      for q in ([s["quote"]] if s.get("quote") else [])+s.get("quotes",[]):
                          Q.append((loc,q))
          def to_id(to):
              if not to: return None
              p=[x for x in to.strip('/').split('/') if x]
              if p and p[0]=='book': p=p[1:]
              return '.'.join(p) if p else None
          def norm(s):
              s=s or ""
              s=s.replace('«','').replace('»','').replace('\u00ad','')
              s=re.sub(r'\s+',' ',s).strip()
              return s
          # собрать id для запроса
          ids=set()
          for loc,q in Q:
              i=to_id(q.get("to"))
              if i: ids.add(i)
          # запросить D1 пачками
          d1map={}
          ids=list(ids)
          for k in range(0,len(ids),60):
              chunk=ids[k:k+60]
              inlist=",".join("'"+x.replace("'","''")+"'" for x in chunk)
              res=d1(f"SELECT v.id, v.translit, x.translation, x.purport FROM verses v LEFT JOIN verse_texts x ON x.verse_id=v.id WHERE v.id IN ({inlist})")
              for r in res["result"][0]["results"]:
                  d1map[r["id"]]={"translit":r.get("translit") or "","translation":r.get("translation") or "","purport":r.get("purport") or ""}
          report=[]
          for loc,q in Q:
              ref=q.get("ref") or ""; by=q.get("by") or ""; to=q.get("to") or ""
              tq=q.get("t") or ""; trq=q.get("translit") or ""
              i=to_id(to)
              d=d1map.get(i) if i else None
              ent={"loc":loc,"ref":ref,"by":by,"id":i,"in_d1":bool(d),
                   "t_quote":tq[:160],"translit_quote":(trq[:120] if trq else "")}
              if d:
                  tm = norm(tq)==norm(d["translation"])
                  # частичное совпадение (цитата — подстрока эталона или наоборот)
                  partial = (norm(tq) in norm(d["translation"])) or (norm(d["translation"]) in norm(tq))
                  ent["t_match"]= "exact" if tm else ("partial" if partial else "DIFF")
                  ent["d1_translation"]=d["translation"][:160]
                  if trq:
                      ent["translit_match"]= "exact" if norm(trq)==norm(d["translit"]) else "DIFF"
                      ent["d1_translit"]=d["translit"][:120]
              report.append(ent)
          os.makedirs("docs/data", exist_ok=True)
          open("docs/data/pkl_audit.json","w",encoding="utf-8").write(json.dumps(report,ensure_ascii=False,indent=1))
          # сводка
          from collections import Counter
          c=Counter(r.get("t_match","NO_REF/NOT_IN_D1") for r in report)
          ct=Counter(r.get("translit_match","—") for r in report if r.get("translit_quote"))
          summ=f"всего={len(report)} t:{dict(c)} translit:{dict(ct)}"
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'pkl-audit DONE',"+str(len(report))+",?)", params=[summ])
          print(summ)
          PY
      - name: Commit report
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add docs/data/pkl_audit.json
          git commit -m "audit: сверка цитат ПКЛ Кришны с D1 [skip ci]" || echo nochange
          git push origin HEAD:main || true

name: iskcone SB ingest (vedabase → D1, per canto)

# Тянет «Шримад-Бхагаватам» с vedabase.io в D1, послойно и идемпотентно.
# Канонические ключи: verse id = sb.<canto>.<chapter>.<seg> (он же QR/диплинк),
# division_id главы = sb.<canto>.<chapter>, песнь = sb.<canto>, ref = «ШБ <c>.<ch>.<seg>».
# Запуск дробится по песням/диапазону глав (vedabase троттлит на длинной гонке);
# параллельная загрузка стихов (24 потока), повтор безопасен (ON CONFLICT).
# По завершении пишет .sb-ingest/status-<sel>.json (читаемо снаружи) + строку в
# deploy_checks; падает, если в D1 пусто для выбранного среза.

on:
  workflow_dispatch:
    inputs:
      canto:
        description: "Песнь: 1..12 | all"
        required: true
        default: "1"
      from_ch:
        description: "С какой главы (пусто = с 1-й). Игнорируется при canto=all"
        required: false
        default: ""
      to_ch:
        description: "По какую главу включительно (пусто = до конца). Игнорируется при canto=all"
        required: false
        default: ""
      max_minutes:
        description: "Бюджет времени на запуск (грейсфул-стоп)"
        required: false
        default: "330"
      force:
        description: "Перезагрузить даже уже залитые главы (иначе пропускаем готовые)"
        required: false
        default: "false"
      workers:
        description: "Параллельных загрузок стихов"
        required: false
        default: "24"

permissions:
  contents: write

concurrency:
  group: sb-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: pip install --quiet beautifulsoup4 lxml
      - name: Ingest SB from vedabase into D1
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CANTO: ${{ github.event.inputs.canto }}
          FROM_CH: ${{ github.event.inputs.from_ch }}
          TO_CH: ${{ github.event.inputs.to_ch }}
          MAX_MIN: ${{ github.event.inputs.max_minutes }}
          FORCE: ${{ github.event.inputs.force }}
          WORKERS: ${{ github.event.inputs.workers }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, random, urllib.request
          from concurrent.futures import ThreadPoolExecutor
          from bs4 import BeautifulSoup

          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          BASE="https://vedabase.io/ru/library/sb"

          # Главы по песням (канон ШБ; совпадает со скелетом структуры).
          SB_CH=[19,10,33,31,26,19,15,24,24,90,31,13]   # песни 1..12
          NCANTOS=len(SB_CH)

          # Сквозные ordinal для divisions — чистая монотонная последовательность
          # (песнь, её главы, следующая песнь…). Так /toc и спайн prev/next корректны.
          ORD={}; d=0
          for canto in range(1, NCANTOS+1):
              d+=1; ORD[f"sb.{canto}"]=d
              for ch in range(1, SB_CH[canto-1]+1):
                  d+=1; ORD[f"sb.{canto}.{ch}"]=d

          # ── HTTP с бэкоффом ──────────────────────────────────────────────
          def get(url, tries=4):
              for t in range(tries):
                  try:
                      rq=urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"ru,en;q=0.8","accept":"text/html"})
                      with urllib.request.urlopen(rq, timeout=35) as r:
                          if r.status==200: return r.read().decode("utf-8","replace")
                  except Exception:
                      pass
                  time.sleep(1.5*(t+1)*(t+1)+random.random())
              return ""

          # ── D1 (мультистейтмент, инлайн-значения) ───────────────────────
          def d1(sql, tries=4):
              last=None
              body=json.dumps({"sql":sql}).encode()
              for t in range(tries):
                  try:
                      rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
                      with urllib.request.urlopen(rq, timeout=90) as r:
                          j=json.loads(r.read().decode())
                          if j.get("success"): return j["result"]
                          last=j
                  except Exception as e:
                      last=str(e)
                  time.sleep(1.0*(t+1))
              raise RuntimeError(f"D1 failed: {str(last)[:300]} :: {sql[:120]}")
          def rows(sql): return d1(sql)[0]["results"]
          def q(v):
              if v is None: return "NULL"
              return "'"+str(v).replace("'","''")+"'"

          # ── Парсер страницы стиха (порт av-* из loader/vedabase.ts) ──────
          def block_text(el, para=False):
              for br in el.find_all("br"): br.replace_with("\n")
              if para:
                  for p in el.find_all("p"): p.insert_before("\n\n")
              return el.get_text()
          def lines(s):
              out=[re.sub(r"[ \t]+"," ",x).strip() for x in s.split("\n")]
              s="\n".join(out); s=re.sub(r"\n{3,}","\n\n",s); return s.strip()
          def flat(s): return re.sub(r"\s+"," ",s).strip()
          def grab(soup, sel, para=False):
              els=soup.select(sel)
              return "\n".join(block_text(e, para) for e in els) if els else ""
          def parse_tokens(syn):
              if not syn: return []
              out=[]
              for piece in syn.split(";"):
                  parts=re.split(r"\s+[—–-]\s+", piece)
                  term=(parts[0] or "").strip()
                  gloss=" — ".join(parts[1:]).strip() if len(parts)>1 else ""
                  if term: out.append((term, gloss or None))
              return out
          def parse_verse(html):
              soup=BeautifulSoup(html,"lxml")
              deva=lines(grab(soup,".av-devanagari"))
              translit=lines(grab(soup,".av-verse_text"))
              uvaca=None
              if translit:
                  first=translit.split("\n")[0]
                  if re.search(r"ува|uv[āa]ca", first, re.I) and "\n" in translit:
                      uvaca=first.strip()
              return {
                  "deva": deva or None,
                  "translit": translit or None,
                  "uvaca": uvaca,
                  "tr": flat(grab(soup,".av-translation")) or None,
                  "pur": lines(grab(soup,".av-purport", para=True)) or None,
                  "tokens": parse_tokens(flat(grab(soup,".av-synonyms"))),
              }

          # сегменты стихов главы (+ best-effort заголовок главы)
          def chapter_segs(canto, ch):
              html=get(f"{BASE}/{canto}/{ch}/")
              if not html: return [], ""
              segs=[]; seen=set()
              for m in re.finditer(rf"/ru/library/sb/{canto}/{ch}/([0-9]+(?:-[0-9]+)?)/", html):
                  s=m.group(1)
                  if s not in seen: seen.add(s); segs.append(s)
              title=""
              mt=re.search(r"<h1[^>]*>(.*?)</h1>", html, re.S)
              if mt:
                  cand=re.sub(r"<[^>]+>"," ", mt.group(1)); cand=flat(cand)
                  # срезаем возможный ведущий ref-префикс «ШБ 1.1:» / «1.1.»
                  cand=re.sub(r"^(ШБ\s*)?\d+\.\d+\s*[:.\-—]\s*", "", cand).strip()
                  if 3<=len(cand)<=160 and "vedabase" not in cand.lower(): title=cand
              return segs, title

          # ── Что грузим ──────────────────────────────────────────────────
          sel=(os.environ.get("CANTO") or "1").strip().lower()
          if sel=="all":
              targets=list(range(1, NCANTOS+1))
          else:
              c=int(sel)
              if not (1<=c<=NCANTOS): raise SystemExit(f"unknown canto: {sel}")
              targets=[c]
          fr=os.environ.get("FROM_CH","").strip(); to=os.environ.get("TO_CH","").strip()
          MAX=float(os.environ.get("MAX_MIN") or "330")*60.0
          FORCE=(os.environ.get("FORCE","").strip().lower() in ("1","true","yes","on"))
          WORKERS=max(1, int(os.environ.get("WORKERS") or "24"))
          t0=time.time()

          # издание один раз
          d1("INSERT INTO editions (id,work_id,lang,title,translator,source,license,source_url) "
             "VALUES ('sb-ru','sb','ru','Шримад-Бхагаватам','А.Ч. Бхактиведанта Свами Прабхупада',"
             "'vedabase.io','pending','https://vedabase.io/ru/library/sb/') ON CONFLICT(id) DO NOTHING")
          # на всякий случай — гарантируем работу sb и схему нумерации
          d1("INSERT INTO works (id,kind,abbrev,verse_scheme) VALUES ('sb','scripture','SB','canto.chapter.verse') "
             "ON CONFLICT(id) DO UPDATE SET verse_scheme='canto.chapter.verse'")

          def flush(stmts):
              B=[]; size=0
              for st in stmts:
                  st=st.strip().rstrip(";")
                  if B and (len(B)>=30 or size>55000):
                      d1(";".join(B)+";"); B=[]; size=0
                  B.append(st); size+=len(st)
              if B: d1(";".join(B)+";")

          status={"ts": time.strftime("%Y-%m-%d %H:%M:%SZ", time.gmtime()),
                  "selection": sel, "from": fr or None, "to": to or None,
                  "chapters": [], "missed": [], "stopped_early": False}
          stopped=False

          for canto in targets:
              nch=SB_CH[canto-1]
              lo = int(fr) if (sel!="all" and fr) else 1
              hi = int(to) if (sel!="all" and to) else nch
              # песнь-раздел: чистый ordinal (перекрываем скелет, чтобы порядок песней был строгим)
              did=f"sb.{canto}"
              d1("INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) VALUES "
                 f"({q(did)},'sb',NULL,'division',{q(str(canto))},"
                 f"{q(json.dumps({'en':f'Canto {canto}','ru':f'Песнь {canto}'},ensure_ascii=False))},{ORD[did]}) "
                 "ON CONFLICT(id) DO UPDATE SET ordinal=excluded.ordinal, "
                 "title=CASE WHEN COALESCE(divisions.title,'') IN ('', '{}') THEN excluded.title ELSE divisions.title END")
              for ch in range(lo, min(hi, nch)+1):
                  if time.time()-t0 > MAX:
                      stopped=True; status["stopped_early"]=True; status["stopped_at"]=f"{canto}.{ch}"; break
                  segs, ctitle = chapter_segs(canto, ch)
                  if not segs:
                      status["missed"].append({"canto":canto,"ch":ch,"reason":"no segs (empty/throttled)"})
                      time.sleep(2.0); continue
                  chid=f"sb.{canto}.{ch}"
                  if not FORCE:
                      have=rows(f"SELECT COUNT(*) AS n FROM verses WHERE division_id='{chid}'")[0]["n"]
                      if have and have>=len(segs):
                          status["chapters"].append({"canto":canto,"ch":ch,"skipped":True,"segs":len(segs),"existing":have})
                          print("SKIP",canto,ch,"have",have,">=",len(segs)); continue
                  verses=[]; missed=0
                  def _one(arg):
                      i, seg = arg
                      url=f"{BASE}/{canto}/{ch}/{seg}/"
                      h=get(url)
                      if not h: return (seg, None)
                      v=parse_verse(h); v["seg"]=seg; v["ordinal"]=i; v["url"]=url
                      if not (v["deva"] or v["translit"] or v["tr"]): return (seg, None)
                      return (seg, v)
                  with ThreadPoolExecutor(max_workers=WORKERS) as ex:
                      for seg, v in ex.map(_one, list(enumerate(segs,1))):
                          if v is None: missed+=1
                          else: verses.append(v)
                  verses.sort(key=lambda x: x["ordinal"])

                  # ── запись главы в D1 ──
                  stmts=[]
                  ch_title_json=json.dumps({"ru": ctitle} if ctitle else {"ru": f"Песнь {canto}, глава {ch}"}, ensure_ascii=False)
                  stmts.append(
                      "INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) VALUES "
                      f"({q(chid)},'sb',{q(did)},'chapter',{q(str(ch))},{q(ch_title_json)},{ORD[chid]}) "
                      "ON CONFLICT(id) DO UPDATE SET ordinal=excluded.ordinal")
                  if ctitle:
                      stmts.append(f"UPDATE divisions SET title={q(ch_title_json)} WHERE id={q(chid)}")
                  for v in verses:
                      vid=f"sb.{canto}.{ch}.{v['seg']}"; ref=f"ШБ {canto}.{ch}.{v['seg']}"
                      stmts.append(
                          "INSERT INTO verses (id,work_id,division_id,ref,ordinal,devanagari,translit,uvaca,source_url) VALUES "
                          f"({q(vid)},'sb',{q(chid)},{q(ref)},{v['ordinal']},{q(v['deva'])},{q(v['translit'])},{q(v['uvaca'])},{q(v['url'])}) "
                          "ON CONFLICT(id) DO UPDATE SET devanagari=COALESCE(excluded.devanagari,verses.devanagari),"
                          "translit=COALESCE(excluded.translit,verses.translit),uvaca=COALESCE(excluded.uvaca,verses.uvaca),"
                          "ref=excluded.ref,ordinal=excluded.ordinal,source_url=COALESCE(verses.source_url,excluded.source_url)")
                  for v in verses:
                      if v["tr"] or v["pur"]:
                          vid=f"sb.{canto}.{ch}.{v['seg']}"
                          stmts.append(
                              "INSERT INTO verse_texts (verse_id,edition_id,translation,purport) VALUES "
                              f"({q(vid)},'sb-ru',{q(v['tr'])},{q(v['pur'])}) "
                              "ON CONFLICT(verse_id,edition_id) DO UPDATE SET "
                              "translation=COALESCE(excluded.translation,verse_texts.translation),"
                              "purport=COALESCE(excluded.purport,verse_texts.purport)")
                  for v in verses:
                      if v["tokens"]:
                          vid=f"sb.{canto}.{ch}.{v['seg']}"
                          stmts.append(f"DELETE FROM verse_tokens WHERE verse_id={q(vid)}")
                          for k,(term,gloss) in enumerate(v["tokens"],1):
                              stmts.append(f"INSERT INTO verse_tokens (verse_id,ordinal,term,gloss) VALUES ({q(vid)},{k},{q(term)},{q(gloss)})")
                  flush(stmts)

                  deva=sum(1 for v in verses if v["deva"]); trl=sum(1 for v in verses if v["translit"])
                  tr=sum(1 for v in verses if v["tr"]); pur=sum(1 for v in verses if v["pur"])
                  tok=sum(1 for v in verses if v["tokens"])
                  rec={"canto":canto,"ch":ch,"title":ctitle or None,"segs":len(segs),"written":len(verses),
                       "deva":deva,"translit":trl,"translation":tr,"purport":pur,"tokens":tok,"missed":missed}
                  status["chapters"].append(rec)
                  print("CH", json.dumps(rec, ensure_ascii=False))
                  time.sleep(0.3)
                  if stopped: break
              if stopped: break

          # ── Верификация из D1 (читаемый сигнал: падаем, если пусто) ──────
          like = "sb.%" if sel=="all" else f"sb.{targets[0]}.%"
          vr=rows(f"SELECT COUNT(*) AS verses,"
                  f"SUM(CASE WHEN length(COALESCE(devanagari,''))>0 THEN 1 ELSE 0 END) AS deva,"
                  f"SUM(CASE WHEN length(COALESCE(translit,''))>0 THEN 1 ELSE 0 END) AS translit "
                  f"FROM verses WHERE work_id='sb' AND division_id LIKE '{like}'")[0]
          tx=rows("SELECT COUNT(*) AS n FROM verse_texts x JOIN verses v ON v.id=x.verse_id "
                  f"WHERE v.work_id='sb' AND v.division_id LIKE '{like}' AND length(COALESCE(x.translation,''))>0")[0]
          status["db_verify"]={"verses":vr.get("verses"),"deva":vr.get("deva"),"translit":vr.get("translit"),"with_translation":tx.get("n")}
          total_written=sum(c.get("written",0) for c in status["chapters"])
          skipped=sum(1 for c in status["chapters"] if c.get("skipped"))
          status["total_written"]=total_written; status["skipped_chapters"]=skipped

          os.makedirs(".sb-ingest", exist_ok=True)
          json.dump(status, open(f".sb-ingest/status-{sel}.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)

          body_txt=("sel="+sel+" verses="+str(vr.get("verses"))+" tr="+str(tx.get("n"))
                    +" missed="+str(len(status["missed"]))
                    +(" STOPPED@"+status.get("stopped_at","") if status["stopped_early"] else ""))
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone sb ingest',"
             +q(str(total_written))+","+q(body_txt)+")")

          print("RESULT", json.dumps(status["db_verify"], ensure_ascii=False), "written:", total_written, "missed:", len(status["missed"]))
          if not vr.get("verses"):
              raise SystemExit("FAIL: no SB verses present for selection after run")
          PY
      - name: Commit status (readable verification)
        if: always()
        run: |
          git config user.email "ceo@billionsx.com"
          git config user.name "Billions X"
          git add .sb-ingest/ 2>/dev/null || true
          git commit -m "chore(sb-ingest): status [skip ci]" 2>/dev/null || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main 2>/dev/null || true
            if git push origin main 2>/dev/null; then echo "pushed"; break; fi
            echo "push retry $i"; sleep $((RANDOM % 5 + 2))
          done

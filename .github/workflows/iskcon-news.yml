name: "Новости ИСККОН → RU (3 источника)"

# Тянем официальные новости ТРЁХ агентств (iskconnews.org · iskcon.org ·
# dandavats.com), переводим на русский с BBT-точностью (Claude, глоссарий
# канонических имён) и кладём в D1 (news_posts). Идемпотентно: guid = <src>:<id>,
# уже загруженное пропускается (ЗКН-Пл006/Пл018).
#
# ОТКЛЮЧЕНО 17.07.2026: мусорная агентская лента убрана из приложения (endpoint
# /api/news отдаёт пусто, субтаб «Новости» снят). Автоматический ингест
# остановлен — cron удалён, чтобы D1 не накапливал новые записи. Оставлен только
# ручной workflow_dispatch на случай будущей курируемой выборки.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Максимум НОВЫХ статей за прогон"
        default: "12"
      pages:
        description: "Сколько страниц WP REST API (по 20 статей)"
        default: "1"

concurrency:
  group: iskcon-news
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: "Забор → перевод → запись в D1"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
        run: |
          python3 tools/news/iskcon_news.py \
            --limit "${{ github.event.inputs.limit || '12' }}" \
            --pages "${{ github.event.inputs.pages || '1' }}"

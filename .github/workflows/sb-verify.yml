# Сверка озвучки ШБ с книгой: аудио на archive.org ↔ стихи в D1 + живой эндпоинт.
# Отчёт коммитится в docs/diagnostics/sb-audio-verify.md (песочница не видит прод).
name: "Сверка озвучки ШБ"
run-name: "sb-verify"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/sb-verify.yml"
      - "tools/tg-archive/sb_verify.py"
      - "tools/tg-archive/sb_gaps.py"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # «Заливка идёт сама» — это ОБЕЩАНИЕ. Оно держится ровно на одном: GH_TOKEN обязан
      # уметь запускать воркфлоу (actions:write). Если не умеет — самодокат встанет молча,
      # и половина Бхагаватам никогда не доедет. Проверяем это механически, а не на веру.
      # ЗКН-Пл013 — АВТОМАТИЗМ ЭТО МЕХАНИЗМ, А НЕ ОБЕЩАНИЕ: прежде чем сказать
      # «идёт само», диспатч проверяется механически (токен был мёртв — 401).
      - name: "Самодокат жив? (GH_TOKEN умеет запускать воркфлоу)"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/billionsx/iskcon/actions/workflows/probe-url.yml/dispatches" \
            -d '{"ref":"main","inputs":{"url":"https://brajs.com/api/books/sb/audio/available"}}')
          echo "dispatch → HTTP $CODE"
          if [ "$CODE" != "204" ]; then
            echo "::error title=samodokat::GH_TOKEN НЕ может запускать воркфлоу (HTTP $CODE) — самодокат мёртв, заливка встанет"
            exit 1
          fi
          echo "::notice::Самодокат жив: GH_TOKEN запускает воркфлоу (204)"

      # ПОЛНАЯ сверка каналов с книгой — независимо от того, сколько уже залито.
      # Отвечает на вопрос «какие стихи чтец не записал» по СЫРЫМ именам файлов.
      - name: "Сверка КАНАЛ ↔ КНИГА (немые стихи всех 12 песней)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python tools/tg-archive/sb_gaps.py

      - name: "Сверка"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python tools/tg-archive/sb_verify.py

      - name: "Отчёт → в репо"
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -f docs/diagnostics/sb-audio-verify.md ] || exit 0
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add docs/diagnostics/sb-audio-verify.md
          git commit -m "sb: сверка озвучки с книгой [skip ci]" || { echo "нечего коммитить"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase "https://x-access-token:${GH_TOKEN}@github.com/billionsx/iskcon.git" main || true
            git push "https://x-access-token:${GH_TOKEN}@github.com/billionsx/iskcon.git" HEAD:main && break
            sleep 3
          done

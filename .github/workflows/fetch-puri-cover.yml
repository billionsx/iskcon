name: Fetch Jagannath-Mandir cover for Puri from Wikimedia

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover, choose & convert Puri cover from Wikimedia Commons
        run: |
          set -e
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          import json, urllib.request, urllib.parse, os, re, sys
          UA = {"User-Agent": "iskcon-one-love/1.0 (ceo@billionsx.com)"}
          def api(params):
              params = {**params, "format": "json"}
              url = "https://commons.wikimedia.org/w/api.php?" + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.load(r)

          titles = set()
          # 1) full-text search in the File namespace
          for srs in ["Jagannath Temple Puri exterior", "Jagannath Temple Puri shikhara",
                      "Jagannath Temple Puri", "Shree Mandir Puri", "Puri Jagannath temple tower"]:
              try:
                  d = api({"action":"query","list":"search","srnamespace":"6","srsearch":srs,"srlimit":"40"})
                  for it in d.get("query",{}).get("search",[]):
                      titles.add(it["title"])
              except Exception as e:
                  print("search err", srs, e)
          # 2) category members
          for cat in ["Category:Jagannath Temple, Puri", "Category:Exterior of Jagannath Temple, Puri",
                      "Category:Shikhara of Jagannath Temple, Puri"]:
              try:
                  d = api({"action":"query","list":"categorymembers","cmtitle":cat,"cmtype":"file","cmlimit":"200"})
                  for it in d.get("query",{}).get("categorymembers",[]):
                      titles.add(it["title"])
              except Exception as e:
                  print("cat err", cat, e)
          print("collected titles:", len(titles))

          # filename keywords that signal a non-hero image (historical print / art / deity / closeup / festival)
          EXCLUDE = re.compile(
              r"deit|idol|pattachitra|\bart\b|\bmap\b|\bplan\b|stamp|postcard|wellcome|lacma|"
              r"drawing|paint|sketch|engrav|lithograph|interior|inside|sculptur|relief|carv|"
              r"close[ -]?view|close[ -]?up|\bdetail|fa(c|ç)ade|architrave|mouldings|panel|"
              r"fergusson|\b1[6789]\d\d\b|\b20[01]\d\b.*scan|ratha|chariot|rath ?yatra|"
              r"\bnight\b|\bmodel\b|replica|aruna|nila ?chakra|\bflag\b|singhadwara only|"
              r"diagram|illustration|book|page \d|ILN|juggernaut|pilgrim", re.I)

          cands = []
          tl = list(titles)
          for i in range(0, len(tl), 40):
              batch = tl[i:i+40]
              try:
                  d = api({"action":"query","titles":"|".join(batch),"prop":"imageinfo",
                           "iiprop":"url|size|mime|extmetadata"})
              except Exception as e:
                  print("imageinfo err", e); continue
              for _pid, p in d.get("query",{}).get("pages",{}).items():
                  ii = (p.get("imageinfo") or [None])[0]
                  if not ii: continue
                  title = p.get("title","")
                  w, h = ii.get("width",0), ii.get("height",0)
                  url = ii.get("url"); mime = ii.get("mime","")
                  if not url or "image" not in mime: continue
                  if mime in ("image/svg+xml","image/gif"): continue
                  em = ii.get("extmetadata",{}) or {}
                  lic = ((em.get("LicenseShortName") or {}).get("value","")) or ""
                  artist = re.sub("<[^>]+>","",((em.get("Artist") or {}).get("value","")) or "").strip()
                  artist = re.sub(r"\s+"," ",artist)[:80]
                  bad = bool(EXCLUDE.search(title))
                  cands.append({"title":title,"url":url,"w":w,"h":h,"lic":lic,"artist":artist,"bad":bad})

          cands.sort(key=lambda c: -(c["w"]*c["h"]))
          os.makedirs("apps/web/public/media", exist_ok=True)
          with open("puri.candidates.txt","w") as f:
              for c in cands:
                  f.write(f'{"SKIP" if c["bad"] else "ok  "} {c["w"]}x{c["h"]} '
                          f'{c["lic"][:18]:18} {c["title"]}  | {c["url"]}\n')
          print("wrote puri.candidates.txt:", len(cands), "files")

          def good(c):
              if c["bad"] or c["w"] < 1200: return False
              ar = c["w"]/max(c["h"],1)
              return 0.55 <= ar <= 2.2   # avoid extreme strips/panoramas; allow portrait→4:5
          choices = [c for c in cands if good(c)]
          if not choices:
              print("NO_CHOICE — no suitable high-res exterior found")
              sys.exit(0)
          ch = choices[0]
          print("CHOSEN:", ch["title"], f'{ch["w"]}x{ch["h"]}', ch["lic"], ch["url"])

          req = urllib.request.Request(ch["url"], headers=UA)
          with urllib.request.urlopen(req, timeout=180) as r:
              raw = r.read()
          open("/tmp/puri.bin","wb").write(raw)
          from PIL import Image
          im = Image.open("/tmp/puri.bin").convert("RGB")
          if im.size[0] > 1600:
              ratio = 1600/im.size[0]
              im = im.resize((1600, int(im.size[1]*ratio)), Image.LANCZOS)
          out = "apps/web/public/media/puri.webp"
          im.save(out, "WEBP", quality=84, method=6)
          print("WROTE", out, im.size, os.path.getsize(out), "bytes")
          open("apps/web/public/media/puri.credit.txt","w").write(
              f'Source: Wikimedia Commons — {ch["title"]}\nURL: {ch["url"]}\n'
              f'License: {ch["lic"]}\nArtist: {ch["artist"]}\nFetched: workflow run\n'
          )
          PY

      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A puri.candidates.txt apps/web/public/media/puri.webp apps/web/public/media/puri.credit.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."; git rev-parse HEAD; exit 0
          fi
          git commit -m "media: Jagannath-Mandir cover for Puri (Wikimedia Commons) + candidates"
          for i in 1 2 3 4 5 6; do
            if git push origin HEAD:main; then echo "PUSHED"; git rev-parse HEAD; exit 0; fi
            echo "push rejected, rebasing (attempt $i)"
            git fetch origin main
            GIT_EDITOR=true git rebase origin/main || git rebase --abort
          done
          echo "push failed after retries"; exit 1

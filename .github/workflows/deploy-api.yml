name: Deploy API (Cloudflare Workers)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install
      - name: Deploy to Cloudflare Workers
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler deploy 2>&1 | tee /tmp/deploy.log

      - name: Ensure DB indexes (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0003_perf_indexes.sql

      - name: Ensure user-accounts schema (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0004_user_accounts.sql

      - name: Ensure calendar schema (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0005_gcal_calendar.sql

      - name: Ensure japa schema (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0006_japa.sql

      - name: Ensure sadhana-day schema (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0007_sadhana_day.sql

      - name: Ensure notes schema (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0008_notes.sql

      - name: Ensure darshan schema (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler d1 execute iskcon-db --remote --file migrations/0009_darshan.sql

      - name: Verify notes table is live in D1
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "— columns of notes —"
          bunx wrangler d1 execute iskcon-db --remote \
            --command "SELECT group_concat(name) AS cols FROM pragma_table_info('notes');"
          echo "— indexes on notes —"
          bunx wrangler d1 execute iskcon-db --remote \
            --command "SELECT name FROM sqlite_master WHERE type='index' AND tbl_name='notes';"
          echo "— row count (sanity) —"
          bunx wrangler d1 execute iskcon-db --remote \
            --command "SELECT COUNT(*) AS notes_rows FROM notes;"

      - name: Smoke test live /v1/health and record into D1
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          WD=$(grep -oiE "https://[a-z0-9.-]+\.workers\.dev" /tmp/deploy.log | head -1)
          echo "workers.dev: $WD"
          check () {
            local url="$1" code
            for i in $(seq 1 6); do
              code=$(curl -s -o /tmp/b.json -w "%{http_code}" "$url/v1/health")
              [ "$code" = "200" ] && break
              sleep 10
            done
            local body
            body=$(tr -d '\n"'"'"'\\' < /tmp/b.json 2>/dev/null | cut -c1-250)
            echo "$url/v1/health -> $code"
            bunx wrangler d1 execute iskcon-db --remote \
              --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'$url',${code:-0},'$body');" || true
          }
          [ -n "$WD" ] && check "$WD"
          check "https://api.gaurangers.com"
          echo "smoke done"

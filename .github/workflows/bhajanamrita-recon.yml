name: bhajanamrita recon (map structure — by owner permission)

# Разведка структуры bhajanamrita.com перед написанием парсера.
# Контент используется С РАЗРЕШЕНИЯ правообладателя (Sri Rupa Seva Kunj),
# подтверждённого владельцем проекта. Раннер ходит вежливо, с паузами,
# представляется и не грузит сайт. Складывает СЫРЬЁ в репо для анализа.

on:
  workflow_dispatch:
    inputs:
      base:
        description: "База сайта"
        required: true
        default: "https://bhajanamrita.com"

permissions:
  contents: write

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe site
        env:
          BASE: ${{ inputs.base }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request, urllib.error, pathlib

          BASE=os.environ["BASE"].rstrip("/")
          UA="gaurangers-bhajan-sync/1.0 (ISKCON ONE LOVE; by permission of Sri Rupa Seva Kunj; ceo@billionsx.com)"
          OUT=pathlib.Path("tools/bhajans/recon"); OUT.mkdir(parents=True, exist_ok=True)

          def get(url, timeout=40):
              rq=urllib.request.Request(url, headers={"User-Agent":UA,"Accept":"*/*"})
              with urllib.request.urlopen(rq, timeout=timeout) as r:
                  return r.status, r.headers.get("Content-Type",""), r.read()

          def save(name, data):
              p=OUT/name
              p.write_bytes(data if isinstance(data,(bytes,bytearray)) else data.encode("utf-8"))
              print(f"  saved {name} ({len(data)} b)")

          report={"base":BASE, "fetched":[], "errors":[], "sitemaps":[], "url_sample":[],
                  "api_hints":[], "json_endpoints":[], "script_bundles":[]}

          def grab(path, fname, note=""):
              url = path if path.startswith("http") else BASE+path
              try:
                  st,ct,data=get(url)
                  save(fname, data)
                  report["fetched"].append({"url":url,"status":st,"ctype":ct,"bytes":len(data),"note":note})
                  return data.decode("utf-8","replace"), ct, st
              except urllib.error.HTTPError as e:
                  report["errors"].append({"url":url,"http":e.code}); print(f"  HTTP {e.code} {url}")
              except Exception as e:
                  report["errors"].append({"url":url,"err":str(e)[:200]}); print(f"  ERR {url}: {e}")
              finally:
                  time.sleep(0.7)  # вежливая пауза между запросами
              return "", "", None

          # 1) robots + sitemaps
          robots,_,_ = grab("/robots.txt","robots.txt")
          smaps=re.findall(r'(?im)^\s*sitemap:\s*(\S+)', robots) or [BASE+"/sitemap.xml"]
          report["sitemaps"]=smaps
          urls=set()
          for i,sm in enumerate(smaps[:5]):
              body,_,_=grab(sm, f"sitemap_{i}.xml")
              urls |= set(re.findall(r'<loc>\s*([^<\s]+)\s*</loc>', body))
          # вложенные индексы карт
          nested=[u for u in list(urls) if u.endswith(".xml")]
          for j,u in enumerate(nested[:10]):
              body,_,_=grab(u, f"sitemap_nested_{j}.xml")
              urls |= set(re.findall(r'<loc>\s*([^<\s]+)\s*</loc>', body))
          urls={u for u in urls if not u.endswith(".xml")}
          report["url_count"]=len(urls)
          report["url_sample"]=sorted(urls)[:120]

          # 2) оболочка /ru — ищем API и бандлы
          shell,_,_ = grab("/ru","shell_ru.html")
          report["script_bundles"]=re.findall(r'<script[^>]+src="([^"]+)"', shell)[:30]
          report["api_hints"]=sorted(set(re.findall(r'["\'](/(?:api|data|content|bhajans?|songs?)[^"\']*)["\']', shell)))[:40]
          report["json_endpoints"]=sorted(set(re.findall(r'https?://[^"\']+\.json', shell)))[:40]
          # встроенные данные (__NEXT_DATA__ / window.__*)
          for m in re.finditer(r'id="__NEXT_DATA__"[^>]*>(.*?)</script>', shell, re.S):
              save("next_data.json", m.group(1)); report["api_hints"].append("__NEXT_DATA__ present")

          # 3) образцы страниц-бхаджанов из карты (по эвристике пути)
          cand=[u for u in sorted(urls) if re.search(r'/(bhajan|song|kirtan|prayer|geet|pesn)', u, re.I)]
          if not cand:
              cand=[u for u in sorted(urls) if u.count("/")>=4][:0] or sorted(urls)[:0]
          report["bhajan_candidates_count"]=len(cand)
          report["bhajan_candidates_sample"]=cand[:60]
          for k,u in enumerate(cand[:3]):
              grab(u, f"sample_bhajan_{k}.html", note="образец страницы-бхаджана")
              # если рядом есть .json того же ресурса — тоже пробуем
              grab(u.rstrip("/")+".json", f"sample_bhajan_{k}.json", note="попытка JSON того же ресурса")

          save("RECON.json", json.dumps(report, ensure_ascii=False, indent=2))
          print("\nSUMMARY:",
                "urls=",report.get("url_count"),
                "candidates=",report.get("bhajan_candidates_count"),
                "errors=",len(report["errors"]))
          PY

      - name: Commit recon artifacts
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add tools/bhajans/recon
          git commit -m "recon(bhajanamrita): карта структуры сайта [skip ci]" || { echo "нечего коммитить"; exit 0; }
          git push

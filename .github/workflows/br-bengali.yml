name: br-bengali

# Бхакти-ратнакара — БЕНГАЛЬСКИЙ ОРИГИНАЛ (PD).
#
# Зачем: английское переложение в репо анонимно, права неустановимы (PENDING) —
# по ЗКН-ПР009 п.3 оно НЕ МОЖЕТ быть посредником. Оригинал 1888 г. на archive.org
# помечен «In Public Domain» и УЖЕ распознан IA (tesseract 5, -l ben, 600 ppi).
# Тянем его сюда: с PD-оригинала перевод легален (license=own-translation).
#
# Гейт наблюдаемости: логи Actions на не-allowlisted хостах, поэтому весь отчёт
# уходит в ::notice:: аннотации (закон Ф014 — скрипт говорит, что сломалось).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install internetarchive
        run: pip install --quiet internetarchive

      - name: Pull Bengali OCR + assess quality
        run: |
          python3 - <<'PY'
          import io, re, sys, unicodedata
          from internetarchive import download

          # 1888, Ramdeb Mishra, Murshidabad · dc.rights: In Public Domain
          PRIMARY = ("in.ernet.dli.2015.356261", "2015.356261.Bhaktiratnakar_djvu.txt")
          # 2-е изд. 1913, Радхараман-пресс — второй свидетель для сверки чтений
          WITNESS = ("BhaktiRatnakar", None)

          def note(m):  print(f"::notice::{m}", flush=True)
          def err(m):   print(f"::error::{m}",  flush=True)

          def grab(ident, fname):
              try:
                  download(ident, files=[fname] if fname else None,
                           destdir="_ia", no_directory=False, verbose=True)
              except Exception as e:
                  err(f"{ident}: скачивание упало — {type(e).__name__}: {e}")
                  return None
              import pathlib
              root = pathlib.Path("_ia") / ident
              if not root.exists():
                  err(f"{ident}: каталог не создан")
                  return None
              cands = sorted(root.glob("*djvu.txt")) or sorted(root.glob("*.txt"))
              if not cands:
                  err(f"{ident}: djvu.txt не найден; есть: {[p.name for p in root.iterdir()][:8]}")
                  return None
              return cands[0]

          src = grab(*PRIMARY)
          if src is None:
              sys.exit(1)

          raw = src.read_text(encoding="utf-8", errors="replace")

          # ── КАЧЕСТВО OCR ────────────────────────────────────────────────────
          BENG = lambda c: "\u0980" <= c <= "\u09FF"
          LATIN = lambda c: c.isascii() and c.isalpha()
          nb = sum(1 for c in raw if BENG(c))
          nl = sum(1 for c in raw if LATIN(c))
          alpha = nb + nl
          ratio = (nb / alpha * 100) if alpha else 0.0

          # тарангa по-бенгальски: তরঙ্গ ; бенгальские цифры ০-৯
          taranga = len(re.findall(r"তরঙ্গ", raw))
          bdigits = len(re.findall(r"[\u09E6-\u09EF]+", raw))
          lines = [l for l in raw.split("\n") if l.strip()]

          note(f"файл: {src.name} · {len(raw):,} симв. · {len(lines):,} непустых строк")
          note(f"бенгальских букв: {nb:,} · латиницы: {nl:,} · ДОЛЯ БЕНГАЛИ: {ratio:.1f}%")
          note(f"вхождений «তরঙ্গ» (таранга): {taranga} · групп бенгальских цифр: {bdigits:,}")

          if ratio < 70:
              err(f"OCR негоден: бенгали всего {ratio:.1f}% — распознан мусор")
              sys.exit(1)
          if taranga == 0:
              note("ВНИМАНИЕ: маркер «তরঙ্গ» не найден — деление на волны придётся искать иначе")

          dst = "docs/sources/bhakti-ratnakara/Bhakti-Ratnakara.BN.txt"
          import pathlib
          pathlib.Path(dst).parent.mkdir(parents=True, exist_ok=True)
          pathlib.Path(dst).write_text(raw, encoding="utf-8")
          note(f"положено: {dst}")
          PY

      - name: Commit
        run: |
          git config user.name  "Billions X"
          git config user.email "ceo@billionsx.com"
          git add docs/sources/bhakti-ratnakara/Bhakti-Ratnakara.BN.txt
          git diff --cached --quiet && { echo "::notice::нечего коммитить"; exit 0; }
          git commit -m "BR: Bengali PD original (archive.org 1888, IA tesseract ben OCR)"
          for i in 1 2 3 4 5; do
            git pull --rebase -q origin main && git push -q origin HEAD:main && break
            sleep 5
          done
          echo "::notice::бенгальский оригинал в main"

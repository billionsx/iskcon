# КАТХА · ЗАЛИВКА (каналы катхи → archive.org → плеер)
#
# Исполняет карту tools/tg-archive/katha_plan.json — альбом, имя файла в архиве и
# название дорожки решены ДО заливки и лежат в репозитории (ЗКН-Пл010).
#
# ЗКН-Ф021: альбом считается готовым, только когда файлы ВИДНЫ в archive.org
# (metadata-API), а не когда «команда отправлена». Не всё доехало — прогон
# перезапускает себя; заливка идемпотентна, лежащее в архиве не качается заново.
name: "Катха · заливка"
run-name: "katha-ingest · осталось: ${{ inputs.note || '?' }}"

concurrency:
  group: tg-archive-session      # ЗКН-Пл003: одна сессия Telegram — одна очередь
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      note:
        description: "(служебное) счётчик самоцепочки"
        default: ""
      speaker:
        description: "Только один рассказчик (slug; пусто = все)"
        default: ""

permissions:
  contents: read
  actions: write                 # самоцепочка: воркфлоу перезапускает сам себя

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Зависимости
        run: pip install -r tools/tg-archive/requirements.txt internetarchive

      - name: Залить
        id: run
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          ONLY_SPEAKER: ${{ inputs.speaker }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BUDGET_MIN: "290"
          DL_PARALLEL: "8"
          IA_PARALLEL: "5"
        run: python katha_ingest.py run

      # ЗКН-Ф021: сверка с архивом + уточнение длительности по самому файлу
      # (в метаданных Telegram она бывает вздорной). Идёт всегда, даже после сбоя.
      - name: Сверка с архивом
        if: always()
        working-directory: tools/tg-archive
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ONLY_SPEAKER: ${{ inputs.speaker }}
        run: python katha_ingest.py verify

      - name: Продолжить, если осталось
        if: ${{ steps.run.outputs.left != '0' && steps.run.outputs.left != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          LEFT="${{ steps.run.outputs.left }}"
          echo "::notice::осталось $LEFT записей — перезапускаю себя"
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/katha-ingest.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"note\":\"$LEFT\",\"speaker\":\"${{ inputs.speaker }}\"}}"

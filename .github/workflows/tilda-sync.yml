name: Tilda sync (iskcone project only)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync iskcone Tilda project -> D1 (self-logging)
        shell: bash --noprofile --norc {0}
        env:
          PK: ${{ secrets.TILDA_PUBLIC_KEY }}
          SK: ${{ secrets.TILDA_SECRET_KEY }}
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e +o pipefail
          ACCT=d5cbe19470dc38599873eabfe148e6d1
          DB=6226aded-dd03-4e74-977f-9cd0b509e73d
          T="https://api.tildacdn.info/v1"
          D1="https://api.cloudflare.com/client/v4/accounts/$ACCT/d1/database/$DB/query"
          post(){ curl -s -X POST "$D1" -H "Authorization: Bearer $CF" -H "Content-Type: application/json" --data @"$1" >/dev/null; }
          d1(){ jq -nc --arg sql "$1" --argjson p "$2" '{sql:$sql,params:$p}' >/tmp/q.json; post /tmp/q.json; }

          run(){
            curl -s "$T/getprojectslist/?publickey=$PK&secretkey=$SK" > /tmp/projects.json
            echo "projects status=$(jq -r '.status' /tmp/projects.json 2>&1)  head=$(head -c 160 /tmp/projects.json)"
            [ "$(jq -r '.status' /tmp/projects.json 2>/dev/null)" = "FOUND" ] || { echo "ABORT: cannot list projects (likely Tilda rate limit 150/hr)"; return; }
            jq -r '.result[] | "  proj \(.id): \(.title)"' /tmp/projects.json

            target=""
            # 1) match by title
            while IFS=$'\t' read -r id title; do
              echo "$title" | grep -qiE 'iskcon|iskcone|кришн|гауранг|gaur|one love' && { target=$id; echo "matched by title: $id ($title)"; break; }
            done < <(jq -r '.result[] | [(.id|tostring),.title] | @tsv' /tmp/projects.json)
            # 2) fallback: scan project info for domain iskcone
            if [ -z "$target" ]; then
              for id in $(jq -r '.result[].id' /tmp/projects.json); do
                curl -s "$T/getprojectinfo/?publickey=$PK&secretkey=$SK&projectid=$id" > /tmp/pi.json
                if grep -qi 'iskcone' /tmp/pi.json; then target=$id; echo "matched by domain: $id"; break; fi
                sleep 0.2
              done
            fi
            [ -z "$target" ] && { echo "ABORT: iskcone project not found"; return; }

            curl -s "$T/getpageslist/?publickey=$PK&secretkey=$SK&projectid=$target" > /tmp/pages.json
            np=$(jq -r '.result | length' /tmp/pages.json 2>/dev/null)
            echo "iskcone project=$target pages=$np"
            [ "$(jq -r '.status' /tmp/pages.json)" = "FOUND" ] || { echo "ABORT: pageslist status $(jq -r '.status' /tmp/pages.json)"; return; }

            # clean slate, then refill ONLY this project
            d1 "DELETE FROM tilda_assets" "[]"; d1 "DELETE FROM tilda_pages" "[]"

            total=0; assets=0; errors=0
            for pageid in $(jq -r '.result[]?.id' /tmp/pages.json); do
              curl -s "$T/getpagefull/?publickey=$PK&secretkey=$SK&pageid=$pageid" > /tmp/full.json
              [ "$(jq -r '.status' /tmp/full.json 2>/dev/null)" = "FOUND" ] || { echo "page $pageid skip"; errors=$((errors+1)); continue; }
              jq -r '.result.html // ""' /tmp/full.json > /tmp/html.txt 2>/dev/null
              grep -oE 'https://[A-Za-z0-9._-]*tildacdn[A-Za-z0-9._/-]*\.(png|jpg|jpeg|webp|gif|svg)' /tmp/html.txt 2>/dev/null | sort -u > /tmp/imgs.txt
              imgs=$(jq -R . /tmp/imgs.txt 2>/dev/null | jq -cs '.' 2>/dev/null); [ -z "$imgs" ] && imgs='[]'
              alias=$(jq -r '.result.alias // ""' /tmp/full.json)
              jq -nc --slurpfile f /tmp/full.json --argjson imgs "$imgs" '($f[0].result) as $r |
                {sql:"INSERT OR REPLACE INTO tilda_pages (pageid,projectid,alias,title,descr,html,images_json,img_count,fetched_at) VALUES (?,?,?,?,?,?,?,?,datetime(\u0027now\u0027))",
                 params:[($r.id|tostring),($r.projectid//""|tostring),($r.alias//""),($r.title//""),($r.descr//""),($r.html//""),($imgs|tostring),($imgs|length)]}' > /tmp/q.json
              post /tmp/q.json
              jq -nc --arg pid "$pageid" --arg al "$alias" --argjson imgs "$imgs" '{sql:"INSERT INTO tilda_assets (pageid,alias,url,fetched_at) SELECT ?,?,value,datetime(\u0027now\u0027) FROM json_each(?)",params:[$pid,$al,($imgs|tostring)]}' > /tmp/q.json
              post /tmp/q.json
              n=$(jq 'length' <<<"$imgs" 2>/dev/null); assets=$((assets+n)); total=$((total+1))
              echo "page $pageid [$alias] imgs=$n"
              sleep 0.2
            done
            echo "SYNCED pages=$total images=$assets errors=$errors"
          }

          run > /tmp/run.log 2>&1
          echo "===== RUN LOG ====="; cat /tmp/run.log
          B=$(tail -c 4500 /tmp/run.log | base64 -w0)
          jq -nc --arg b "$B" '{sql:"INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime(\u0027now\u0027),\u0027tilda log\u0027,0,?)",params:[$b]}' > /tmp/q.json
          post /tmp/q.json
          exit 0

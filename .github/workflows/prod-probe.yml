name: prod-probe
on:
  workflow_dispatch:
    inputs:
      absent:
        description: 'Строки, которых на живом проде быть НЕ ДОЛЖНО (через |)'
        required: false
        default: ''
      expect:
        description: 'Строки, которые на живом проде БЫТЬ ОБЯЗАНЫ (через |)'
        required: false
        default: ''

# ЗКН-Р015 — «ГОТОВО» = УВИДЕЛ НА ЖИВОМ. Не «задеплоил», не «гейт зелёный».
# Этот зонд качает ВСЕ чанки боевого сайта и проверяет приёмку по строкам.
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Приёмка на живом проде
        run: |
          AP=https://gaurangers.com
          E=$(curl -s --max-time 25 "$AP/" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          echo "::notice::вход: $E"
          curl -s --max-time 60 "$AP$E" -o /tmp/all.js
          # все чанки, на которые ссылается вход
          grep -oE '/assets/[A-Za-z0-9_.-]+\.js' /tmp/all.js | sort -u > /tmp/chunks.txt
          echo "::notice::чанков: $(wc -l < /tmp/chunks.txt)"
          while read -r C; do curl -s --max-time 30 "$AP$C" >> /tmp/all.js || true; done < /tmp/chunks.txt
          echo "::notice::скачано всего: $(wc -c < /tmp/all.js) байт"

          FAIL=0
          IFS='|'
          for S in ${{ github.event.inputs.absent }}; do
            [ -z "$S" ] && continue
            if grep -qF "$S" /tmp/all.js; then
              echo "::error::НЕ УБРАНО: «$S» всё ещё в боевом бандле"; FAIL=1
            else
              echo "::notice::убрано ✓ «$S»"
            fi
          done
          for S in ${{ github.event.inputs.expect }}; do
            [ -z "$S" ] && continue
            if grep -qF "$S" /tmp/all.js; then
              echo "::notice::на месте ✓ «$S»"
            else
              echo "::error::НЕ ДОЕХАЛО: «$S» в боевом бандле НЕТ"; FAIL=1
            fi
          done
          exit $FAIL

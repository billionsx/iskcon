name: prod-probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Поиск личностей на живом API
        run: |
          for Q in "прабхупада" "бхактиведанта" "нитьянанда" "prabhupada" "Шрила Прабхупада" "рупа госвами"; do
            R=$(curl -s -G --max-time 25 "https://gaurangers.com/api/entities" \
                  --data-urlencode "q=$Q" --data-urlencode "limit=5" -w "|%{http_code}")
            CODE=${R##*|}; BODY=${R%|*}
            N=$(printf '%s' "$BODY" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d.get('items',[])))" 2>/dev/null || echo "ERR")
            FIRST=$(printf '%s' "$BODY" | python3 -c "import sys,json;d=json.load(sys.stdin);i=d.get('items') or [{}];print((i[0].get('name_ru') or '—'))" 2>/dev/null || echo "—")
            if [ "$CODE" = "200" ] && [ "$N" != "0" ] && [ "$N" != "ERR" ]; then
              echo "::notice::«$Q» → HTTP $CODE · найдено $N · первый: $FIRST"
            else
              echo "::error::«$Q» → HTTP $CODE · найдено $N"
            fi
          done

          echo "::notice::--- глобальный поиск ---"
          R=$(curl -s -G --max-time 25 "https://gaurangers.com/api/search" --data-urlencode "q=прабхупада" -w "|%{http_code}")
          CODE=${R##*|}; BODY=${R%|*}
          P=$(printf '%s' "$BODY" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d.get('personalities',[])))" 2>/dev/null || echo ERR)
          if [ "$CODE" = "200" ] && [ "$P" != "0" ] && [ "$P" != "ERR" ]; then
            echo "::notice::/api/search «прабхупада» → HTTP $CODE · личностей $P"
          else
            echo "::error::/api/search «прабхупада» → HTTP $CODE · личностей $P"
          fi

name: prod-probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Тело ошибки
        run: |
          echo "::notice::--- /api/entities?q=прабхупада ---"
          curl -s -G --max-time 25 "https://gaurangers.com/api/entities" --data-urlencode "q=прабхупада" -o /tmp/b.txt -w "%{http_code}" > /tmp/c.txt
          echo "::notice::HTTP $(cat /tmp/c.txt)"
          head -c 900 /tmp/b.txt | tr '\n' ' ' | fold -w 150 | while read -r L; do echo "::error::$L"; done
          echo "::notice::--- контрольный: без q ---"
          curl -s --max-time 25 "https://gaurangers.com/api/entities?limit=2" -o /tmp/b2.txt -w "%{http_code}" > /tmp/c2.txt
          echo "::notice::HTTP $(cat /tmp/c2.txt) · $(head -c 120 /tmp/b2.txt | tr '\n' ' ')"

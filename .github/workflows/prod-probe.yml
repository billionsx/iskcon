name: prod-probe
on:
  workflow_dispatch:
    inputs:
      absent:
        description: 'Строки, которых на живом проде быть НЕ ДОЛЖНО (через |)'
        required: false
        default: ''
      expect:
        description: 'Строки, которые на живом проде БЫТЬ ОБЯЗАНЫ (через |)'
        required: false
        default: ''

# ЗКН-Р015 — «ГОТОВО» = УВИДЕЛ НА ЖИВОМ. Не «задеплоил», не «гейт зелёный».
jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      ABSENT: ${{ github.event.inputs.absent }}
      EXPECT: ${{ github.event.inputs.expect }}
    steps:
      - name: Приёмка на живом проде
        run: |
          AP=https://gaurangers.com
          E=$(curl -s --max-time 25 "$AP/" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          echo "::notice::вход: $E"
          curl -s --max-time 60 "$AP$E" -o /tmp/all.js

          # Vite пишет ленивые чанки ОТНОСИТЕЛЬНЫМИ путями («./Name-hash.js»),
          # а не «/assets/…». Первая версия зонда искала «/assets/» и нашла 0 чанков.
          grep -oE '\./[A-Za-z0-9_.-]+-[A-Za-z0-9_-]{8}\.js' /tmp/all.js \
            | sed 's|^\./|/assets/|' | sort -u > /tmp/chunks.txt
          echo "::notice::чанков: $(wc -l < /tmp/chunks.txt)"
          while read -r C; do curl -s --max-time 30 "$AP$C" >> /tmp/all.js || true; done < /tmp/chunks.txt
          echo "::notice::скачано всего: $(wc -c < /tmp/all.js) байт"

          FAIL=0
          if [ -n "$ABSENT" ]; then
            printf '%s' "$ABSENT" | tr '|' '\n' | while IFS= read -r S; do
              [ -z "$S" ] && continue
              if grep -qF "$S" /tmp/all.js; then echo "::error::НЕ УБРАНО: «$S» всё ещё в боевом бандле"; echo x >> /tmp/fail
              else echo "::notice::убрано ✓ «$S»"; fi
            done
          fi
          if [ -n "$EXPECT" ]; then
            printf '%s' "$EXPECT" | tr '|' '\n' | while IFS= read -r S; do
              [ -z "$S" ] && continue
              if grep -qF "$S" /tmp/all.js; then echo "::notice::на месте ✓ «$S»"
              else echo "::error::НЕ ДОЕХАЛО: «$S» в боевом бандле НЕТ"; echo x >> /tmp/fail; fi
            done
          fi
          [ -f /tmp/fail ] && FAIL=1
          exit $FAIL

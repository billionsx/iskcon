name: prod-probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Воркер против домена
        run: |
          WD=https://iskcon-web.ceo-5cb.workers.dev
          AP=https://gaurangers.com

          hash() { curl -s --max-time 25 "$1" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1; }

          HW=$(hash "$WD/")
          HA=$(hash "$AP/")
          HB=$(hash "$AP/?cb=$RANDOM$RANDOM")
          echo "::notice::workers.dev  → ${HW:-<пусто>}"
          echo "::notice::gaurangers   → ${HA:-<пусто>}"
          echo "::notice::gaurangers?cb→ ${HB:-<пусто>}"

          for pair in "workers.dev|$WD|$HW" "apex|$AP|$HA"; do
            NAME=${pair%%|*}; rest=${pair#*|}; BASE=${rest%%|*}; H=${rest##*|}
            [ -z "$H" ] && continue
            curl -s --max-time 60 "$BASE$H" -o /tmp/e.js
            if grep -q "darshan/all" /tmp/e.js; then
              echo "::notice::$NAME: ВТОРАЯ ПАРТИЯ ЕСТЬ (darshan/all найден)"
            else
              echo "::error::$NAME: второй партии НЕТ (darshan/all отсутствует)"
            fi
          done

          echo "::notice::--- заголовки apex / ---"
          curl -sI --max-time 25 "$AP/" | tr -d '\r' | grep -iE '^(cache-control|cf-cache-status|age|server|etag|x-robots)' \
            | while read -r L; do echo "::notice::$L"; done

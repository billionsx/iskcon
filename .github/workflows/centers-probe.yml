name: centers-probe
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: BUILD_SHA + SQL центров из задеплоенного воркера → D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request, urllib.error
          cfg = open("apps/web/wrangler.toml", encoding="utf-8").read()
          acc = re.search(r'account_id\s*=\s*"([^"]+)"', cfg).group(1)
          dbid = re.search(r'database_id\s*=\s*"([^"]+)"', cfg).group(1)
          tok = os.environ["CLOUDFLARE_API_TOKEN"]
          H = {"Authorization": "Bearer " + tok}
          notes = []
          raw = ""
          try:
              url = "https://api.cloudflare.com/client/v4/accounts/%s/workers/scripts/iskcon-web/content" % acc
              raw = urllib.request.urlopen(urllib.request.Request(url, headers=H), timeout=60).read().decode("utf-8", "replace")
              notes.append("code_bytes=%d" % len(raw))
          except urllib.error.HTTPError as e:
              notes.append("content_HTTP_%s" % e.code)
              try:
                  url2 = "https://api.cloudflare.com/client/v4/accounts/%s/workers/scripts/iskcon-web" % acc
                  raw = urllib.request.urlopen(urllib.request.Request(url2, headers=H), timeout=60).read().decode("utf-8", "replace")
                  notes.append("fallback_bytes=%d" % len(raw))
              except Exception as e2:
                  notes.append("fallback_err=" + str(e2)[:60])
          except Exception as e:
              notes.append("content_err=" + str(e)[:80])

          shas = re.findall(r"[0-9a-f]{40}", raw)
          notes.append("BUILD_SHA=" + (shas[0] if shas else "NONE"))
          notes.append("uniq_sha=" + ",".join(sorted(set(shas))[:3]))
          idx = raw.find("FROM centers")
          if idx < 0:
              idx = raw.replace(" ", "").find("FROMcenters")
              notes.append("FROM_centers=only_minified" if idx >= 0 else "FROM_centers=ABSENT")
          else:
              notes.append("FROM_centers=present")
          # найдём сам SELECT ... FROM centers ... (до LIMIT)
          m = re.search(r".{0,60}FROM\s+centers.{0,140}", raw)
          sql = re.sub(r"\s+", " ", m.group(0)) if m else "NO_SQL_SNIPPET"
          for pat in ["status", "lat IS NOT NULL", "lng IS NOT NULL", "published", "visible", "deleted", "'live'", "live"]:
              if pat in raw[max(0,idx-200):idx+300] if idx>=0 else False:
                  notes.append("near[%s]" % pat)

          note_s = " ;; ".join(notes)[:350]
          for n in notes: print("::notice::" + n)
          print("::notice SQL::" + sql[:300])
          Hj = dict(H); Hj["Content-Type"] = "application/json"
          qurl = "https://api.cloudflare.com/client/v4/accounts/%s/d1/database/%s/query" % (acc, dbid)
          for tgt, val in [("worker-build-sha", note_s), ("worker-centers-sql", sql[:400])]:
              body = json.dumps({"sql": "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),?,0,?)",
                                 "params": [tgt, val.replace("'", " ").replace('"', " ")]}).encode()
              try:
                  urllib.request.urlopen(urllib.request.Request(qurl, data=body, headers=Hj), timeout=30).read()
              except Exception as e:
                  print("write err", e)
          print("done")
          PY

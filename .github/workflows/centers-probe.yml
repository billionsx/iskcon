name: centers-probe

# Диагностика ЗКН-Пл017: какую D1-базу РЕАЛЬНО биндит задеплоенный iskcon-web,
# и сколько живых центров видит воркер в СВОЕЙ базе против repo-конфига (6226aded).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Реальный биндинг воркера + COUNT в его базе → D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request
          cfg = open("apps/web/wrangler.toml", encoding="utf-8").read()
          acc = re.search(r'account_id\s*=\s*"([^"]+)"', cfg).group(1)
          repo_db = re.search(r'database_id\s*=\s*"([^"]+)"', cfg).group(1)
          tok = os.environ["CLOUDFLARE_API_TOKEN"]
          H = {"Authorization": "Bearer " + tok, "Content-Type": "application/json"}

          def get(url):
              return json.load(urllib.request.urlopen(urllib.request.Request(url, headers=H), timeout=30))

          def d1count(dbid):
              url = f"https://api.cloudflare.com/client/v4/accounts/{acc}/d1/database/{dbid}/query"
              body = json.dumps({"sql": "SELECT COUNT(*) AS n FROM centers WHERE status='live'"}).encode()
              try:
                  r = json.load(urllib.request.urlopen(urllib.request.Request(url, data=body, headers=H), timeout=30))
                  return (r.get("result") or [{}])[0].get("results", [{}])[0].get("n", "?")
              except Exception as e:
                  return "ERR " + str(e)[:60]

          # реальные биндинги задеплоенного воркера
          s = get(f"https://api.cloudflare.com/client/v4/accounts/{acc}/workers/scripts/iskcon-web/settings")
          binds = (s.get("result") or {}).get("bindings", [])
          d1b = [b for b in binds if str(b.get("type","")).startswith("d1")]
          rows = [f"repo_cfg_db={repo_db} live={d1count(repo_db)}"]
          for b in d1b:
              did = b.get("id") or b.get("database_id") or "?"
              rows.append(f"binding:{b.get('name')}={did} live={d1count(did)}")
          if not d1b:
              rows.append("NO_D1_BINDINGS_FOUND raw=" + json.dumps(binds)[:200])

          for r in rows:
              print("::notice::" + r)
          safe = " ;; ".join(rows).replace("'", " ").replace('"', " ")[:480]
          url = f"https://api.cloudflare.com/client/v4/accounts/{acc}/d1/database/{repo_db}/query"
          payload = json.dumps({"sql": "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'worker-db-binding',0,?)", "params": [safe]}).encode()
          print("D1 write:", urllib.request.urlopen(urllib.request.Request(url, data=payload, headers=H), timeout=30).read().decode()[:150])
          PY

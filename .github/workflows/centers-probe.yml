name: centers-probe
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Достать код задеплоенного iskcon-web и грепнуть SQL центров → D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request
          cfg = open("apps/web/wrangler.toml", encoding="utf-8").read()
          acc = re.search(r'account_id\s*=\s*"([^"]+)"', cfg).group(1)
          dbid = re.search(r'database_id\s*=\s*"([^"]+)"', cfg).group(1)
          tok = os.environ["CLOUDFLARE_API_TOKEN"]
          H = {"Authorization": "Bearer " + tok}

          url = f"https://api.cloudflare.com/client/v4/accounts/{acc}/workers/scripts/iskcon-web/content"
          req = urllib.request.Request(url, headers=H)
          raw = urllib.request.urlopen(req, timeout=60).read().decode("utf-8", "replace")

          notes = []
          notes.append(f"code_bytes={len(raw)}")
          notes.append(f"has_status_live={'YES' if re.search(r\"status\\s*=\\s*'live'\", raw) else 'NO'}")
          # все вхождения FROM centers ... с контекстом
          occ = [m.start() for m in re.finditer(r"FROM\s+centers", raw)]
          notes.append(f"FROM_centers_count={len(occ)}")
          snips = []
          for i in occ[:6]:
              s = raw[max(0, i-20):i+120].replace("\n", " ")
              s = re.sub(r"\s+", " ", s)
              snips.append(s)
          # ищем фильтры, которые могли бы обнулить
          for pat in ["lat IS NOT NULL", "lng IS NOT NULL", "published", "visible", "is_live", "AND status", "deleted"]:
              if pat in raw:
                  notes.append(f"FOUND[{pat}]")

          payload_note = " ;; ".join(notes)[:300]
          payload_snip = " ||| ".join(snips)[:900]
          for n in notes: print("::notice::" + n)
          for s in snips: print("::notice SQL::" + s)

          Hj = dict(H); Hj["Content-Type"] = "application/json"
          qurl = f"https://api.cloudflare.com/client/v4/accounts/{acc}/d1/database/{dbid}/query"
          for tgt, val in [("worker-code-notes", payload_note), ("worker-code-sql", payload_snip)]:
              body = json.dumps({"sql": "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),?,0,?)",
                                 "params": [tgt, val.replace("'", " ").replace('"', " ")]}).encode()
              urllib.request.urlopen(urllib.request.Request(qurl, data=body, headers=Hj), timeout=30).read()
          print("done")
          PY

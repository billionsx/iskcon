name: probe-cities
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract authoritative ICS key list (downloads page + seva form)
        run: |
          python3 - <<'PY'
          import json, re, urllib.request, urllib.parse, urllib.error
          UA = {"User-Agent": "iskcon-one-love/1.0 (+https://gaurangers.com; ceo@billionsx.com)"}
          def get(url, timeout=90):
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, headers=UA), timeout=timeout) as r:
                      return getattr(r,"status",200), r.read().decode("utf-8","replace")
              except urllib.error.HTTPError as e:
                  return e.code, ""
              except Exception as e:
                  return 0, str(e)
          pages = {
            "dl2026": "https://www.vaisnavacalendar.info/calendar-file-downloads/ics-ical-calendar-files-2026",
            "dl2027": "https://www.vaisnavacalendar.info/calendar-file-downloads/ics-ical-calendar-files-2027",
          }
          keys = set()
          dumps = {}
          for name, url in pages.items():
              st, html = get(url)
              dec = urllib.parse.unquote(html)
              found = re.findall(r'ICS/20\d\d/([^"\'<>]+?)-a20\d\d-ICS\.ics', dec)
              for f in found:
                  k = f.strip().split("/")[-1]
                  if k: keys.add(k)
              dumps[name] = {"status": st, "len": len(html), "found": len(found)}
              print(name, url, st, "len", len(html), "ics_links", len(found))
          # seva form option labels (city display names)
          st, form = get("https://www.vaisnavacalendar.info/seva/index.php?controller=pjFront&action=pjActionLoadForm&theme=4")
          opts = re.findall(r'<option\s+value="(\d+)"\s*>([^<]+)</option>', form)
          print("seva options:", len(opts))
          json.dump({
            "pages": dumps,
            "ics_keys": sorted(keys),
            "seva_options": [{"id": i, "label": l.strip()} for i, l in opts],
          }, open("CITY_PROBE.json","w"), ensure_ascii=False, indent=1)
          print("WROTE CITY_PROBE.json ; keys", len(keys), "; seva_opts", len(opts))
          PY
      - name: Commit
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add CITY_PROBE.json
          git commit -m "probe: authoritative ICS key list [skip ci]" || echo "nothing"
          git push || echo "push failed"

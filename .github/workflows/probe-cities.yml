name: probe-cities
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dump vaisnavacalendar.info homepage + scripts
        run: |
          python3 - <<'PY'
          import re, urllib.request, urllib.parse, urllib.error
          UA = {"User-Agent": "iskcon-one-love/1.0 (+https://gaurangers.com; ceo@billionsx.com)"}
          ORIGIN = "https://www.vaisnavacalendar.info"
          def get(url, timeout=60):
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, headers=UA), timeout=timeout) as r:
                      return getattr(r,"status",200), r.read().decode("utf-8","replace")
              except urllib.error.HTTPError as e:
                  return e.code, ""
              except Exception as e:
                  return 0, str(e)
          st, html = get(ORIGIN + "/")
          open("VC_HOME.html","w",encoding="utf-8").write(html)
          print("home", st, len(html))
          # all script srcs + any .js / .json paths mentioned
          srcs = re.findall(r'<script[^>]+src=["\']([^"\']+)["\']', html)
          paths = set(re.findall(r'["\']([^"\']+\.(?:js|json))["\']', html))
          paths |= set(srcs)
          # also guess common town files
          for g in ["/js/towns.js","/towns.js","/js/cities.js","/cities.js","/data/towns.js","/js/town.js","/ajax.php","/js/main.js","/js/script.js"]:
              paths.add(g)
          print("candidate assets:", sorted(paths)[:60])
          out = []
          seen = set()
          for p in sorted(paths):
              url = p if p.startswith("http") else ORIGIN + ("/" + p.lstrip("/"))
              if url in seen: continue
              seen.add(url)
              s, body = get(url)
              has_bracket = len(re.findall(r'\[[A-Za-z .]+\]', body))
              out.append(f"\n===== {url}  (status {s}, len {len(body)}, brackets {has_bracket}) =====\n")
              if 200 <= s < 300 and body:
                  out.append(body[:200000])
              print("asset", url, s, len(body), "brackets", has_bracket)
          open("VC_SCRIPTS.txt","w",encoding="utf-8").write("".join(out))
          print("WROTE VC_HOME.html + VC_SCRIPTS.txt")
          PY
      - name: Commit
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add VC_HOME.html VC_SCRIPTS.txt
          git commit -m "probe: dump vaisnavacalendar.info assets [skip ci]" || echo "nothing"
          git push || echo "push failed"

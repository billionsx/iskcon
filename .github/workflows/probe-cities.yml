name: probe-cities
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Discover vaisnavacalendar.info city list + verify RU controls
        run: |
          python3 - <<'PY'
          import json, re, urllib.request, urllib.parse, urllib.error
          UA = {"User-Agent": "iskcon-one-love/1.0 (+https://gaurangers.com; ceo@billionsx.com)"}
          def get(url, timeout=60):
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, headers=UA), timeout=timeout) as r:
                      return getattr(r, "status", 200), r.read().decode("utf-8", "replace")
              except urllib.error.HTTPError as e:
                  try: body = e.read().decode("utf-8","replace")
                  except Exception: body = ""
                  return e.code, body
              except Exception:
                  return 0, ""
          pages = {}
          for u in ["https://www.vaisnavacalendar.info/",
                    "https://www.vaisnavacalendar.info/index.php",
                    "https://www.vaisnavacalendar.info/ICS",
                    "https://www.vaisnavacalendar.info/sitemap.xml"]:
              st, html = get(u)
              dec = urllib.parse.unquote(html)
              ics = sorted(set(m.strip() for m in re.findall(r'([^"\'<>]+?\[[^\]]+\])-a20\d\d-ICS', dec)))
              opts = sorted(set(m.strip() for m in re.findall(r'<option[^>]*>([^<]+)</option>', html)))
              brk = sorted(set(m.strip() for m in re.findall(r'([A-Za-z][A-Za-z .\'-]+ \[[A-Za-z .]+\])', dec)))
              pages[u] = {"status": st, "len": len(html), "ics_keys": ics[:600],
                          "options": opts[:600], "bracket_texts": brk[:600], "head": html[:1200]}
              print(u, "->", st, "len", len(html), "ics", len(ics), "options", len(opts), "brackets", len(brk))
          controls = ["Moskva [Russia]","Vladivostok [Russia]","Novosibirsk [Russia]","Perm [Russia]","Saint Petersburg [Russia]"]
          variants = ["Ekaterinburg [Russia]","Yekaterinburg [Russia]","Nizhniy Novgorod [Russia]","Rostov on Don [Russia]",
                      "Rostov-na-Donu [Russia]","Sochi [Russia]","Krasnodar [Russia]","Kazan [Russia]","Samara [Russia]",
                      "Ufa [Russia]","Chelyabinsk [Russia]","Simferopol [Ukraine]","Sevastopol [Ukraine]"]
          probe = []
          for k in controls + variants:
              st, txt = get("https://www.vaisnavacalendar.info/ICS" + urllib.parse.quote(f"/2026/{k}-a2026-ICS.ics"))
              probe.append({"key": k, "status": st, "vevents": txt.count("BEGIN:VEVENT")})
              print("probe", k, st, txt.count("BEGIN:VEVENT"))
          json.dump({"pages": pages, "probe": probe}, open("CITY_PROBE.json","w"), ensure_ascii=False, indent=1)
          print("WROTE CITY_PROBE.json")
          PY
      - name: Commit results
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add CITY_PROBE.json
          git commit -m "probe: discover vaisnavacalendar.info city list [skip ci]" || echo "nothing"
          git push || echo "push failed"

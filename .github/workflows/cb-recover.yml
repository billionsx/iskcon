name: "Возврат переводов Чайтанья-бхагаваты"
run-name: "cb-recover"

# 43 стиха из 11 441 имели транслитерацию, но НЕ ИМЕЛИ ПЕРЕВОДА. Читатель видел
# бенгальский стих и толкование — но не понимал, что стих говорит.
#
# Переводы всё это время лежали В ИСТОЧНИКЕ (`docs/sources/chaitanya-lila/`).
# Первый разбор их пропустил: между стихом и переводом вклиниваются КОЛОНТИТУЛЫ
# страницы («Стих 2», «Глава 5»), попавшие в текст при распознавании. Разбор
# упирался в них и бросал.
#
# ЗКН-Пл006: источник важнее метода — не переводить самому, а найти пропущенное.
# ЗКН-Пл011: связывать по КЛЮЧУ (транслитерация), а не по порядку.
# ЗКН-БТ002: неоднозначные совпадения ОТБРАСЫВАЮТСЯ — лучше немой стих, чем лживый.

on:
  workflow_dispatch:

concurrency:
  group: d1-ingest
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Поиск и возврат
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/cb-recover-translations.py

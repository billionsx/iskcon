name: "Tilda-экспорт → зеркала (без коммита в git)"

# РАНЬШЕ этот воркфлоу коммитил ~438 МБ Tilda-экспорта прямо в archive/tilda-export/
# — и раздувал репозиторий на каждом прогоне. Теперь (ЗКН-Пл023/Ф025) экспорт
# скачивается, пакуется и уходит на ДВА бесплатных зеркала (archive.org + GitHub
# Releases); в git попадает только крошечный текстовый индекс (manifest.jsonl +
# files.tsv). Бинарь в дерево больше НЕ коммитится. Класс датируется — каждый импорт
# это свежая резервная копия, старые не затираются.

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Tilda export .zip URL"
        required: true
        default: "https://export.tildacdn.com/export/zips/iskcone_8ac9a678f5ee92b3d21f49f8a7ccafab2439e093.zip"

concurrency:
  group: tilda-import
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: "Зависимости (internetarchive)"
        run: pip install "internetarchive>=3.5"
      - name: "Скачать Tilda-экспорт"
        run: |
          set -e
          URL="${{ github.event.inputs.zip_url }}"
          curl -sS -L --fail --retry 5 --retry-delay 3 --max-time 600 \
               -A "Mozilla/5.0 (compatible; iskcon-import/1.0)" \
               -o /tmp/tilda.zip "$URL"
          echo "Скачано байт:"; wc -c < /tmp/tilda.zip; file /tmp/tilda.zip
          rm -rf /tmp/tilda-export && mkdir -p /tmp/tilda-export
          unzip -q -o /tmp/tilda.zip -d /tmp/tilda-export
          echo "Файлов: $(find /tmp/tilda-export -type f | wc -l) · размер: $(du -sh /tmp/tilda-export | cut -f1)"
      - name: "На два зеркала (в дерево НЕ коммитим)"
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLS="tilda-$(date -u +%Y%m%d)"
          python3 tools/assets/offload.py offload \
            --class "$CLS" \
            --path /tmp/tilda-export \
            --base /tmp/tilda-export \
            --source "${{ github.event.inputs.zip_url }}"
      - name: "Коммит индекса (крошечный текст)"
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A docs/assets
          if git diff --cached --quiet; then echo "нет изменений индекса"; exit 0; fi
          git commit -q -m "Tilda-экспорт на зеркала, индекс в git (Пл023)"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo OK; break; fi
            git fetch origin main -q; GIT_EDITOR=true git rebase origin/main -q || git rebase --abort; sleep 4
          done

name: ISKCON places scrape (centres.iskcon.org -> apps/web/public/data/iskcon-places.json)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scrape official directory
        run: |
          set -e
          python3 -m pip install --quiet requests beautifulsoup4
          python3 - <<'PY'
          import json, re, time, sys, os, traceback
          import requests
          from bs4 import BeautifulSoup
          from concurrent.futures import ThreadPoolExecutor, as_completed
          def ann(level, title, msg):
              msg = str(msg).replace("%","%25").replace("\r"," ").replace("\n"," | ")[:900]
              print(f"::{level} title={title}::{msg}"); sys.stdout.flush()
          ann("notice","SCRAPE","start v2")
          def _hook(t,v,tb):
              ann("error","SCRAPE-FAIL", "".join(traceback.format_exception(t,v,tb))[-850:])
              sys.exit(1)
          sys.excepthook=_hook

          S = requests.Session()
          S.headers.update({"User-Agent": "iskcon-one-love/1.0 (+https://gaurangers.com; ceo@billionsx.com)"})
          BASE = "https://centres.iskcon.org"

          # ── официальные регионы → континент приложения ──
          REGION2CONT = {
            "africa": "Африка", "europe": "Европа", "uk": "Европа", "russia": "Европа",
            "central-asia": "Азия", "far-east-asia": "Азия", "india": "Азия", "south-asia": "Азия",
            "southeast-asia": "Азия", "middle-east": "Азия", "asia-pacific": "Азия",
            "oceania": "Океания", "usa-canada": "Северная Америка", "us-canada": "Северная Америка",
            "latin-america": "Южная Америка", "latin-america-caribbean": "Южная Америка",
          }
          REGION_LABEL = {
            "africa": "Африка", "europe": "Европа", "uk": "Великобритания", "russia": "Россия",
            "central-asia": "Центральная Азия", "far-east-asia": "Дальний Восток", "india": "Индия",
            "south-asia": "Южная Азия", "southeast-asia": "Юго-Восточная Азия", "middle-east": "Ближний Восток",
            "asia-pacific": "Азия-Пацифика", "oceania": "Океания", "usa-canada": "США и Канада",
            "us-canada": "США и Канада", "latin-america": "Латинская Америка",
            "latin-america-caribbean": "Латинская Америка",
          }

          def fetch(u, t=25):
              r = S.get(u, timeout=t); r.raise_for_status(); return r.text

          # ── 1) slug → регион: проходим страницы /centre-region/{slug}/ с пагинацией ──
          slug_region = {}
          for reg in REGION2CONT:
              page = 1
              while page < 30:
                  u = f"{BASE}/centre-region/{reg}/" + (f"page/{page}/" if page > 1 else "")
                  try: html = fetch(u)
                  except Exception: break
                  links = set(re.findall(r'href="' + re.escape(BASE) + r'/centre/([a-z0-9\-]+)/"', html))
                  for sl in links: slug_region.setdefault(sl, reg)
                  print(f"region {reg} p{page}: +{len(links)}"); sys.stdout.flush()
                  if 'class="next' not in html and "›" not in html and f"/page/{page+1}/" not in html: break
                  page += 1
              time.sleep(0.2)
          print("slug→region:", len(slug_region)); ann("notice","REGIONS", f"slugs={len(slug_region)}")

          # ── 2) sitemap → канонические URL центров (ровно один сегмент slug) ──
          urls = set()
          for sm in ["/wp-sitemap.xml", "/sitemap.xml", "/sitemap_index.xml"]:
              try:
                  t = fetch(BASE + sm, 30)
                  locs = re.findall(r"<loc>([^<]+)</loc>", t)
                  for l in locs:
                      if l.endswith(".xml"):
                          try:
                              for l2 in re.findall(r"<loc>([^<]+)</loc>", fetch(l, 30)):
                                  m = re.match(re.escape(BASE) + r"/centre/([a-z0-9\-]+)/$", l2)
                                  if m: urls.add(m.group(1))
                          except Exception: pass
                      else:
                          m = re.match(re.escape(BASE) + r"/centre/([a-z0-9\-]+)/$", l)
                          if m: urls.add(m.group(1))
              except Exception as e: print("sitemap", sm, "err", e)
          urls |= set(slug_region)  # регионы могли дать слаги, отсутствующие в sitemap
          slugs = sorted(urls)
          print("centre slugs:", len(slugs)); ann("notice","SLUGS", f"total={len(slugs)}")

          def txt(el): return re.sub(r"\s+", " ", el.get_text(" ", strip=True)) if el else ""

          def parse_centre(slug):
              u = f"{BASE}/centre/{slug}/"
              html = fetch(u, 20)
              soup = BeautifulSoup(html, "html.parser")
              name = txt(soup.select_one("h1.entry-title")) or txt(soup.select_one("h1"))
              if not name or name.lower() in ("centre", "centres"): return None
              lat = lng = None
              m = re.search(r'"lat"\s*:\s*"?(-?\d+\.\d+)"?\s*,\s*"lng"\s*:\s*"?(-?\d+\.\d+)"?', html)
              if not m: m = re.search(r'data-lat(?:itude)?="(-?\d+\.\d+)"[^>]*data-l(?:ng|ongitude)="(-?\d+\.\d+)"', html)
              if not m: m = re.search(r'latitude["\']?\s*[:=]\s*["\']?(-?\d+\.\d+)["\']?[,;\s]+["\']?longitude["\']?\s*[:=]\s*["\']?(-?\d+\.\d+)', html, re.I)
              if m: lat, lng = float(m.group(1)), float(m.group(2))
              # email/website только из основного контента (не из футера/логина)
              art = soup.select_one("article") or soup.select_one(".entry-content") or soup
              ahtml = str(art)
              email = ""
              em = re.search(r"[\w.+-]+@[\w-]+\.[\w.-]+", ahtml)
              if em and "iskcon.org" not in em.group(0).split("@")[1][:20]: email = em.group(0)
              elif em: email = em.group(0)
              website = ""
              for a in art.select("a[href^='http']"):
                  h = a.get("href", "")
                  if not h or "centres.iskcon.org" in h or "facebook.com/tr" in h: continue
                  if any(k in h.lower() for k in ["iskcon", "harekrishna", "hare-krishna", "krishna", "govinda", "bbt"]):
                      website = h; break
              cats = sorted({txt(a) for a in soup.select("a[href*='centre-category']") if txt(a)})
              reg = slug_region.get(slug)
              # регион можно добрать со страницы
              if not reg:
                  rm = re.search(r"/centre-region/([a-z\-]+)/", html)
                  if rm and rm.group(1) in REGION2CONT: reg = rm.group(1)
              return {
                  "id": slug, "name": name, "categories": cats or ["Centre"],
                  "region": REGION_LABEL.get(reg, ""), "continent": REGION2CONT.get(reg, "Другое"),
                  "address": "", "city": "", "state": "", "country": "",
                  "lat": lat, "lng": lng, "phone": "", "email": email,
                  "website": website, "source": u,
              }

          places = {}
          ok = err = 0
          def safe(sl):
              try: return parse_centre(sl)
              except Exception as e: return ("ERR", sl, str(e))
          with ThreadPoolExecutor(max_workers=10) as ex:
              futs = {ex.submit(safe, sl): sl for sl in slugs}
              done = 0
              for f in as_completed(futs):
                  r = f.result(); done += 1
                  if isinstance(r, tuple):
                      err += 1
                      if err < 8: print("ERR", r[1], r[2])
                  elif r: places[r["id"]] = r; ok += 1
                  else: err += 1
                  if done % 60 == 0: print(f"...{done}/{len(slugs)} ok={ok} err={err}"); sys.stdout.flush()
          print(f"OFFICIAL parsed ok={ok} err={err}"); ann("notice","OFFICIAL", f"ok={ok} err={err}")

          # ── 3) iskcondesiretree: страны → адрес/телефон/email/сайт; merge по имени ──
          DT = "https://centers.iskcondesiretree.com"
          def norm(s):
              s = re.sub(r"\(.*?\)", " ", s.lower())
              s = re.sub(r"\b(iskcon|hare|krishna|krsna|sri|shri|sree|temple|mandir|center|centre|of|the|and)\b", " ", s)
              return re.sub(r"[^a-z0-9]+", " ", s).strip()
          dt_entries = []
          try:
              chtml = fetch(DT + "/country/", 30)
              countries = re.findall(r'href="(' + re.escape(DT) + r'/country/[a-z0-9\-]+/)"[^>]*>([^<]+)<', chtml)
              countries = list(dict.fromkeys(countries))
              print("DT countries:", len(countries))
              def dt_country(cu_cn):
                  cu, cn = cu_cn
                  out = []
                  try: h = fetch(cu, 30)
                  except Exception: return out
                  soup = BeautifulSoup(h, "html.parser")
                  for blk in soup.select(".entry-content p, .entry-content li, article p"):
                      t = blk.get_text("\n", strip=True)
                      if "Address:" not in t: continue
                      nm = t.split("\n")[0].split("Address:")[0].strip(" :–-")
                      am = re.search(r"Address:\s*(.+?)(?:Phone|Tel|Email|E-mail|Website|$)", t, re.S)
                      pm = re.search(r"(?:Phone|Tel)[:\s]*([+\d][\d\s()\-+,/.]{6,60})", t)
                      em = re.search(r"[\w.+-]+@[\w-]+\.[\w.-]+", t)
                      wm = re.search(r"(?:Website|Web)[:\s]*((?:https?://)?[\w.-]+\.[a-z]{2,}[^\s,]*)", t, re.I)
                      out.append({"name": nm, "country": cn.strip(),
                                  "address": re.sub(r"\s+", " ", am.group(1)).strip(" ,;") if am else "",
                                  "phone": pm.group(1).strip(" ,") if pm else "",
                                  "email": em.group(0) if em else "",
                                  "website": (wm.group(1) if wm else "")})
                  return out
              with ThreadPoolExecutor(max_workers=10) as ex:
                  for f in as_completed({ex.submit(dt_country, c): c for c in countries}):
                      dt_entries += f.result()
              print("DT entries:", len(dt_entries)); ann("notice","DT", f"entries={len(dt_entries)}")
          except Exception as e:
              print("DT failed:", e)

          # merge
          dt_index = {}
          for e in dt_entries:
              dt_index.setdefault(norm(e["name"]), e)
          merged = 0
          for p in places.values():
              k = norm(p["name"])
              e = dt_index.get(k)
              if not e:
                  # пробуем по первым двум словам
                  toks = k.split()
                  if len(toks) >= 2:
                      e = dt_index.get(" ".join(toks[:2]))
              if e:
                  merged += 1
                  if not p["address"]: p["address"] = e["address"]
                  if not p["phone"]: p["phone"] = e["phone"]
                  if not p["email"]: p["email"] = e["email"]
                  if not p["website"] and e["website"]:
                      w = e["website"]; p["website"] = w if w.startswith("http") else "https://" + w
                  if not p["country"]: p["country"] = e["country"]
          print("merged with DT:", merged); ann("notice","MERGE", f"merged={merged}")

          # страна из адреса, если ещё пусто
          for p in places.values():
              if not p["country"] and p["address"]:
                  parts = [x.strip() for x in p["address"].split(",") if x.strip()]
                  if parts:
                      c = re.sub(r"[\d\-–]+$", "", parts[-1]).strip()
                      if 3 <= len(c) <= 40 and not any(ch.isdigit() for ch in c): p["country"] = c
              # город — из адреса (второй с конца) либо из имени в скобках
              if not p["city"] and p["address"]:
                  parts = [x.strip() for x in p["address"].split(",") if x.strip()]
                  if len(parts) >= 2: p["city"] = parts[-2][:40]

          data = sorted(places.values(), key=lambda p: (p["continent"], p["region"], p["country"], p["name"]))
          for p in data:
              cl = " ".join(p["categories"]).lower() + " " + p["name"].lower()
              p["kind"] = "restaurant" if any(k in cl for k in ["restaurant", "govinda", "cafe", "café"]) else "centre"
          rest_n = sum(1 for p in data if p["kind"] == "restaurant")
          with_reg = sum(1 for p in data if p["continent"] != "Другое")
          with_addr = sum(1 for p in data if p["address"])
          with_ph = sum(1 for p in data if p["phone"])
          ann("notice","TOTAL", f"places={len(data)} rest={rest_n} regioned={with_reg} addr={with_addr} phone={with_ph}")
          assert len(data) >= 150, f"Too few: {len(data)}"
          assert with_reg >= len(data) * 0.6, f"Regions failed: {with_reg}/{len(data)}"
          os.makedirs("apps/web/public/data", exist_ok=True)
          json.dump({"updated": time.strftime("%Y-%m-%d"), "source": "centres.iskcon.org + iskcondesiretree", "places": data},
                    open("apps/web/public/data/iskcon-places.json", "w", encoding="utf-8"),
                    ensure_ascii=False, separators=(",", ":"))
          print("WROTE", os.path.getsize("apps/web/public/data/iskcon-places.json"), "bytes")
          PY

      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A apps/web/public/data/
          if git diff --cached --quiet; then echo "No changes."; else
            git commit -m "data: каталог центров и ресторанов ИСККОН (официальный centres.iskcon.org)"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
          git rev-parse HEAD

name: ISKCON places scrape (centres.iskcon.org -> apps/web/public/data/iskcon-places.json)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scrape official directory
        run: |
          set -e
          python3 -m pip install --quiet requests beautifulsoup4
          python3 - <<'PY'
          import json, re, time, sys, os, traceback
          import requests
          from bs4 import BeautifulSoup
          from concurrent.futures import ThreadPoolExecutor, as_completed

          def ann(level, title, msg):
              msg = str(msg).replace("%", "%25").replace("\r", " ").replace("\n", " | ")[:880]
              print(f"::{level} title={title}::{msg}"); sys.stdout.flush()
          def _hook(t, v, tb):
              ann("error", "SCRAPE-FAIL", "".join(traceback.format_exception(t, v, tb))[-850:]); sys.exit(1)
          sys.excepthook = _hook

          S = requests.Session()
          S.headers.update({"User-Agent": "iskcon-one-love/1.0 (+https://gaurangers.com; ceo@billionsx.com)"})
          OFF = "https://centres.iskcon.org"
          DT = "https://centers.iskcondesiretree.com"
          def fetch(u, t=30):
              r = S.get(u, timeout=t); r.raise_for_status(); return r.text
          def norm(s):
              s = re.sub(r"\(.*?\)", " ", (s or "").lower())
              s = re.sub(r"\b(iskcon|hare|krishna|krsna|sri|shri|sree|temple|mandir|center|centre|centers|of|the|and|new)\b", " ", s)
              return re.sub(r"[^a-z0-9]+", " ", s).strip()

          # ═══ 1) OFFICIAL: канонические центры из sitemap (имя, lat/lng, категория, email/site) ═══
          slugs = set()
          for sm in ["/wp-sitemap.xml", "/sitemap.xml", "/sitemap_index.xml"]:
              try:
                  t = fetch(OFF + sm)
                  for l in re.findall(r"<loc>([^<]+)</loc>", t):
                      if l.endswith(".xml"):
                          try:
                              for l2 in re.findall(r"<loc>([^<]+)</loc>", fetch(l)):
                                  m = re.match(re.escape(OFF) + r"/centre/([a-z0-9\-]+)/$", l2)
                                  if m: slugs.add(m.group(1))
                          except Exception: pass
                      else:
                          m = re.match(re.escape(OFF) + r"/centre/([a-z0-9\-]+)/$", l)
                          if m: slugs.add(m.group(1))
              except Exception as e: print("sitemap err", sm, e)
          slugs = sorted(slugs)
          ann("notice", "SLUGS", f"official={len(slugs)}")

          def txt(el): return re.sub(r"\s+", " ", el.get_text(" ", strip=True)) if el else ""
          def parse_official(slug):
              u = f"{OFF}/centre/{slug}/"
              html = fetch(u, 20)
              soup = BeautifulSoup(html, "html.parser")
              name = txt(soup.select_one("h1.entry-title")) or txt(soup.select_one("h1"))
              if not name or name.lower() in ("centre", "centres"): return None
              lat = lng = None
              m = re.search(r'"lat"\s*:\s*"?(-?\d+\.\d+)"?\s*,\s*"lng"\s*:\s*"?(-?\d+\.\d+)"?', html)
              if not m: m = re.search(r'data-lat(?:itude)?="(-?\d+\.\d+)"[^>]*data-l(?:ng|ongitude)="(-?\d+\.\d+)"', html)
              if m: lat, lng = float(m.group(1)), float(m.group(2))
              art = soup.select_one("article") or soup.select_one(".entry-content") or soup
              email = ""
              em = re.search(r"[\w.+-]+@[\w-]+\.[\w.-]+", str(art))
              if em: email = em.group(0)
              website = ""
              for a in art.select("a[href^='http']"):
                  h = a.get("href", "")
                  if not h or "centres.iskcon.org" in h or "facebook.com/tr" in h: continue
                  if any(k in h.lower() for k in ["iskcon", "harekrishna", "hare-krishna", "krishna", "govinda", "bbt"]):
                      website = h; break
              cats = sorted({txt(a) for a in soup.select("a[href*='centre-category']") if txt(a)})
              return {"id": slug, "name": name, "categories": cats or ["Centre"],
                      "lat": lat, "lng": lng, "email": email, "website": website, "source": u}
          official = {}
          ok = err = 0
          with ThreadPoolExecutor(max_workers=10) as ex:
              for f in as_completed({ex.submit(lambda sl=sl: parse_official(sl)): sl for sl in slugs}):
                  try:
                      r = f.result()
                      if r: official[norm(r["name"])] = r; ok += 1
                      else: err += 1
                  except Exception: err += 1
          ann("notice", "OFFICIAL", f"ok={ok} err={err}")

          # ═══ 2) DT: структурированные записи (Address/Phone/Email/Website) c таксономиями ═══
          def dt_listing_entries(url):
              """Одна листинговая страница DT: записи 'Name <br> Address: ... Phone: ...'."""
              try: h = fetch(url, 35)
              except Exception: return []
              soup = BeautifulSoup(h, "html.parser")
              body = soup.select_one(".entry-content") or soup.select_one("article") or soup
              out = []
              # каждая запись — параграф/элемент списка с 'Address:'
              for blk in body.find_all(["p", "li", "div"], recursive=True):
                  t = blk.get_text("\n", strip=True)
                  if "Address:" not in t or len(t) > 1200: continue
                  nm = t.split("\n")[0].split("Address:")[0].strip(" :–—-")
                  if not nm or len(nm) > 90: continue
                  am = re.search(r"Address:\s*(.+?)(?:\n(?:Phone|Tel|Email|E-?mail|Website|Mail)\b|$)", t, re.S | re.I)
                  pm = re.search(r"(?:Phone|Tel)[:\s]*([+\d][\d\s()\-+,/.]{6,60})", t, re.I)
                  em = re.search(r"[\w.+-]+@[\w-]+\.[\w.-]+", t)
                  wm = re.search(r"(?:Website|Web)[:\s]*((?:https?://)?[\w.-]+\.[a-z]{2,}\S*)", t, re.I)
                  out.append({"name": nm,
                              "address": re.sub(r"\s+", " ", am.group(1)).strip(" ,;") if am else "",
                              "phone": pm.group(1).strip(" ,") if pm else "",
                              "email": em.group(0) if em else "",
                              "website": (wm.group(1).rstrip('.,') if wm else "")})
              return out

          dt_all = dt_listing_entries(DT + "/centers/")
          ann("notice", "DT-CENTERS", f"entries={len(dt_all)}")
          dt_rest = dt_listing_entries(DT + "/restaurants/")
          ann("notice", "DT-REST", f"entries={len(dt_rest)}")
          rest_names = {norm(e["name"]) for e in dt_rest}

          # континенты: /continents/ — секции «Continent» с именами; имена → континент
          CONT_RU = {"asia": "Азия", "europe": "Европа", "africa": "Африка", "oceania": "Океания",
                     "australia": "Океания", "north america": "Северная Америка",
                     "south america": "Южная Америка", "antarctica": "Другое"}
          name_cont = {}
          try:
              h = fetch(DT + "/continents/", 35)
              soup = BeautifulSoup(h, "html.parser")
              body = soup.select_one(".entry-content") or soup
              cur = None
              for el in body.descendants:
                  if getattr(el, "name", None) in ("h1", "h2", "h3", "h4", "strong", "b"):
                      t = el.get_text(" ", strip=True).lower()
                      for k in CONT_RU:
                          if k in t: cur = CONT_RU[k]; break
                  elif getattr(el, "name", None) == "a" and cur:
                      nm = el.get_text(" ", strip=True)
                      if nm and len(nm) < 80: name_cont[norm(nm)] = cur
              # fallback: plain text lines under headings
          except Exception as e: print("continents err", e)
          ann("notice", "DT-CONT", f"mapped={len(name_cont)}")

          # страны: /country/ — единая страница с якорями-секциями
          name_country = {}
          try:
              h = fetch(DT + "/country/", 35)
              soup = BeautifulSoup(h, "html.parser")
              body = soup.select_one(".entry-content") or soup
              cur = None
              COUNTRY_HDR = re.compile(r"^[A-Z][A-Za-z .()&'\-]{2,40}$")
              for el in body.descendants:
                  nm = getattr(el, "name", None)
                  if nm in ("h2", "h3", "h4", "strong", "b"):
                      t = el.get_text(" ", strip=True)
                      if COUNTRY_HDR.match(t) and len(t.split()) <= 4: cur = t
                  elif nm == "a" and cur:
                      t = el.get_text(" ", strip=True)
                      if t and len(t) < 80: name_country.setdefault(norm(t), cur)
          except Exception as e: print("country err", e)
          ann("notice", "DT-COUNTRY", f"mapped={len(name_country)}")

          # страна → континент (карта из v1, на случай отсутствия в /continents/)
          C2C = {}
          def reg(c, names):
              for n in names: C2C[n.lower()] = c
          reg("Азия", ["India","Bangladesh","Nepal","Sri Lanka","Pakistan","China","Hong Kong","Taiwan","Japan","South Korea","Korea","Malaysia","Singapore","Indonesia","Philippines","Thailand","Vietnam","Cambodia","Myanmar","Burma","Burma(Myanmar)","Laos","Mongolia","Kazakhstan","Kyrgyzstan","Uzbekistan","Tajikistan","Turkmenistan","Azerbaijan","Armenia","Georgia","Israel","United Arab Emirates","UAE","Bahrain","Qatar","Kuwait","Oman","Saudi Arabia","Lebanon","Jordan","Turkey","Iran","Iraq","Afghanistan","Bhutan","Maldives"])
          reg("Европа", ["United Kingdom","UK","England","Scotland","Wales","Ireland","France","Germany","Italy","Spain","Portugal","Netherlands","Belgium","Luxembourg","Switzerland","Austria","Poland","Czech Republic","Czechia","Slovakia","Hungary","Romania","Bulgaria","Greece","Croatia","Serbia","Bosnia","Slovenia","Macedonia","Albania","Montenegro","Denmark","Sweden","Norway","Finland","Iceland","Estonia","Latvia","Lithuania","Belarus","Ukraine","Moldova","Russia","Malta","Cyprus"])
          reg("Северная Америка", ["United States","United States of America","USA","Canada","Mexico","Guatemala","Belize","Honduras","El Salvador","Nicaragua","Costa Rica","Panama","Cuba","Jamaica","Haiti","Dominican Republic","Bahamas","Barbados","Trinidad and Tobago","Puerto Rico","Guyana","Suriname"])
          reg("Южная Америка", ["Brazil","Argentina","Chile","Peru","Colombia","Venezuela","Ecuador","Bolivia","Paraguay","Uruguay"])
          reg("Африка", ["South Africa","Nigeria","Ghana","Kenya","Tanzania","Uganda","Ethiopia","Egypt","Morocco","Senegal","Ivory Coast","Cameroon","Congo","Zambia","Zimbabwe","Botswana","Namibia","Mozambique","Malawi","Madagascar","Mauritius","Rwanda","Benin","Togo","Sierra Leone","Liberia","Gambia","Guinea","Mali","Angola","Swaziland","Eswatini","Lesotho"])
          reg("Океания", ["Australia","New Zealand","Fiji","Papua New Guinea","Samoa","Tonga","Vanuatu","New Caledonia","Solomon Islands"])
          def cont_from_country(c):
              return C2C.get((c or "").strip().lower(), "")

          # ═══ 3) MERGE: official (база) + DT (контакты) → каталог ═══
          places = {}
          dt_index = {norm(e["name"]): e for e in dt_all}
          merged = 0
          for k, o in official.items():
              e = dt_index.get(k)
              country = name_country.get(k, "")
              cont = name_cont.get(k, "") or cont_from_country(country)
              p = {"id": o["id"], "name": o["name"], "categories": o["categories"],
                   "address": e["address"] if e else "", "city": "", "state": "",
                   "country": country or (e and ""), "continent": cont or "Другое",
                   "lat": o["lat"], "lng": o["lng"],
                   "phone": (e["phone"] if e else ""), "email": o["email"] or (e["email"] if e else ""),
                   "website": o["website"] or (e and e["website"] and ("https://" + e["website"] if not e["website"].startswith("http") else e["website"])) or "",
                   "source": o["source"]}
              if e: merged += 1
              places[k] = p
          # DT-записи, которых нет в official — добавляем (DT шире географически)
          added = 0
          for k, e in dt_index.items():
              if k in places: continue
              country = name_country.get(k, "")
              cont = name_cont.get(k, "") or cont_from_country(country)
              w = e["website"]
              places[k] = {"id": re.sub(r"\W+", "-", e["name"].lower()).strip("-")[:80],
                           "name": e["name"], "categories": ["Centre"],
                           "address": e["address"], "city": "", "state": "",
                           "country": country, "continent": cont or "Другое",
                           "lat": None, "lng": None, "phone": e["phone"], "email": e["email"],
                           "website": ("https://" + w if w and not w.startswith("http") else w),
                           "source": DT + "/centers/"}
              added += 1
          ann("notice", "MERGE", f"matched={merged} added_from_dt={added}")

          # страна из адреса (последний сегмент), затем континент
          for p in places.values():
              if not p["country"] and p["address"]:
                  parts = [x.strip() for x in p["address"].split(",") if x.strip()]
                  if parts:
                      c = re.sub(r"[\d\-– ]+$", "", parts[-1]).strip()
                      if 3 <= len(c) <= 40 and not any(ch.isdigit() for ch in c): p["country"] = c
              if p["continent"] == "Другое" and p["country"]:
                  cc = cont_from_country(p["country"])
                  if cc: p["continent"] = cc
              if not p["city"] and p["address"]:
                  parts = [x.strip() for x in p["address"].split(",") if x.strip()]
                  if len(parts) >= 3: p["city"] = parts[-2][:40]

          data = sorted(places.values(), key=lambda p: (p["continent"], p["country"], p["city"], p["name"]))
          for p in data:
              cl = " ".join(p["categories"]).lower() + " " + p["name"].lower()
              isr = norm(p["name"]) in rest_names or any(k in cl for k in ["restaurant", "govinda", "cafe", "café"])
              p["kind"] = "restaurant" if isr else "centre"
              p["region"] = ""
          rest_n = sum(1 for p in data if p["kind"] == "restaurant")
          with_cont = sum(1 for p in data if p["continent"] != "Другое")
          with_addr = sum(1 for p in data if p["address"])
          with_ph = sum(1 for p in data if p["phone"])
          with_ll = sum(1 for p in data if p["lat"] is not None)
          ann("notice", "TOTAL", f"places={len(data)} rest={rest_n} cont={with_cont} addr={with_addr} phone={with_ph} latlng={with_ll}")
          assert len(data) >= 300, f"Too few: {len(data)}"
          assert with_addr >= 300, f"Addresses failed: {with_addr}"
          os.makedirs("apps/web/public/data", exist_ok=True)
          json.dump({"updated": time.strftime("%Y-%m-%d"),
                     "source": "centres.iskcon.org + centers.iskcondesiretree.com",
                     "places": data},
                    open("apps/web/public/data/iskcon-places.json", "w", encoding="utf-8"),
                    ensure_ascii=False, separators=(",", ":"))
          print("WROTE", os.path.getsize("apps/web/public/data/iskcon-places.json"), "bytes")
          PY

      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A apps/web/public/data/
          if git diff --cached --quiet; then echo "No changes."; else
            git commit -m "data: каталог центров и ресторанов ИСККОН (официальный centres.iskcon.org)"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
          git rev-parse HEAD

name: ISKCON places scrape (centres.iskcon.org -> apps/web/public/data/iskcon-places.json)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scrape official directory
        run: |
          set -e
          python3 -m pip install --quiet requests beautifulsoup4
          python3 - <<'PY'
          import json, re, time, sys, os, traceback, html as H
          import requests

          def ann(level, title, msg):
              msg = str(msg).replace("%", "%25").replace("\r", " ").replace("\n", " | ")[:880]
              print(f"::{level} title={title}::{msg}"); sys.stdout.flush()
          def _hook(t, v, tb):
              ann("error", "SCRAPE-FAIL", "".join(traceback.format_exception(t, v, tb))[-850:]); sys.exit(1)
          sys.excepthook = _hook

          S = requests.Session()
          S.headers.update({"User-Agent": "iskcon-one-love/1.0 (+https://gaurangers.com; ceo@billionsx.com)"})
          DT = "https://centers.iskcondesiretree.com"

          def get_all(path, fields):
              out, page = [], 1
              while page < 40:
                  r = S.get(f"{DT}/wp-json/wp/v2/{path}", params={"per_page": 100, "page": page, "_fields": fields}, timeout=40)
                  if r.status_code != 200: break
                  arr = r.json()
                  if not arr: break
                  out += arr
                  if len(arr) < 100: break
                  page += 1
              return out

          # ── 1) Категории: дерево Континент → Страна → Штат/Город + типы ──
          cats = get_all("categories", "id,name,parent,count")
          ann("notice", "CATS", f"total={len(cats)}")
          byid = {c["id"]: c for c in cats}
          CONT_RU = {"africa": "Африка", "asia": "Азия", "europe": "Европа",
                     "north america": "Северная Америка", "south america": "Южная Америка",
                     "oceania": "Океания", "australia": "Океания", "australia & oceania": "Океания",
                     "central america": "Северная Америка", "middle east": "Азия",
                     "caribbean": "Северная Америка"}
          def path_to_root(cid):
              out = []
              seen = set()
              while cid and cid in byid and cid not in seen:
                  seen.add(cid); c = byid[cid]; out.append(c); cid = c.get("parent", 0)
              return out  # [leaf .. root]
          cont_roots = {c["id"]: CONT_RU[c["name"].strip().lower()] for c in cats
                        if c.get("parent", 0) == 0 and c["name"].strip().lower() in CONT_RU}
          type_roots = {c["id"]: c["name"] for c in cats
                        if c.get("parent", 0) == 0 and c["id"] not in cont_roots}
          ann("notice", "ROOTS", f"continents={list(set(cont_roots.values()))} types={list(type_roots.values())[:10]}")

          # ── 2) Посты ──
          posts = get_all("posts", "id,link,title,content,categories")
          ann("notice", "POSTS", f"total={len(posts)}")

          def strip_html(s):
              s = re.sub(r"<br\s*/?>", "\n", s)
              s = re.sub(r"</(div|p|li|h[1-6])>", "\n", s)
              s = re.sub(r"<[^>]+>", " ", s)
              return H.unescape(s)

          places = {}
          def norm(s):
              s = re.sub(r"\(.*?\)", " ", (s or "").lower())
              s = re.sub(r"\b(iskcon|hare|krishna|krsna|sri|shri|sree|temple|mandir|center|centre|centers|of|the|and|new)\b", " ", s)
              return re.sub(r"[^a-z0-9]+", " ", s).strip()

          for po in posts:
              name = H.unescape(po["title"]["rendered"]).strip()
              if not name: continue
              continent = country = state = city = ""
              kinds = set()
              for cid in po.get("categories", []):
                  chain = path_to_root(cid)  # leaf..root
                  if not chain: continue
                  root = chain[-1]
                  if root["id"] in cont_roots:
                      continent = continent or cont_roots[root["id"]]
                      geo = list(reversed(chain))  # root..leaf: [continent, country, state?, city?]
                      if len(geo) >= 2: country = country or H.unescape(geo[1]["name"])
                      if len(geo) >= 3: state = state or H.unescape(geo[2]["name"])
                      if len(geo) >= 4: city = city or H.unescape(geo[3]["name"])
                      elif len(geo) == 3 and not city: city = H.unescape(geo[2]["name"])
                  elif root["id"] in type_roots:
                      kinds.add(type_roots[root["id"]])
              text = strip_html(po["content"]["rendered"])
              am = re.search(r"Address\s*[:：]\s*(.+?)(?:\n|$)", text, re.I)
              address = re.sub(r"\s+", " ", am.group(1)).strip(" ,;") if am else ""
              pm = re.search(r"(?:Phone|Tel|Contact)\s*[:：]?\s*([+\d][\d\s()\-+,/.]{6,60})", text, re.I)
              phone = pm.group(1).strip(" ,") if pm else ""
              em = re.search(r"[\w.+-]+@[\w-]+\.[\w.-]+", text)
              email = em.group(0).rstrip(".") if em else ""
              wm = re.search(r"https?://[^\s\"<>]+", po["content"]["rendered"])
              website = ""
              for w in re.findall(r"href=\\?\"(https?://[^\"\\]+)", po["content"]["rendered"]):
                  if "iskcondesiretree" in w or "google.com/url" in w or w.startswith("mailto"): continue
                  website = w; break
              if not website:
                  vm = re.search(r"(?:website|web)\s*[:：]\s*((?:https?://)?[\w.-]+\.[a-z]{2,}\S*)", text, re.I)
                  if vm:
                      website = vm.group(1).rstrip('.,')
                      if not website.startswith("http"): website = "https://" + website
              if not city:
                  city = name.split("–")[0].split("-")[0].strip()[:40] if "," not in name else ""
              k = norm(name) or name.lower()
              places[k] = {
                  "id": re.sub(r"\W+", "-", name.lower()).strip("-")[:80],
                  "name": name,
                  "categories": sorted(kinds) or ["Centre"],
                  "address": address, "city": city, "state": state,
                  "country": country, "continent": continent or "Другое",
                  "lat": None, "lng": None,
                  "phone": phone, "email": email, "website": website,
                  "source": po["link"],
              }

          # ── 3) Координаты + official source из предыдущего файла (без запросов к official) ──
          prev_path = "apps/web/public/data/iskcon-places.json"
          coords = src_official = 0
          if os.path.exists(prev_path):
              try:
                  prev = json.load(open(prev_path, encoding="utf-8")).get("places", [])
                  pidx = {}
                  for pp in prev:
                      pidx.setdefault(norm(pp.get("name", "")), pp)
                  for k, p in places.items():
                      e = pidx.get(k)
                      if e:
                          if e.get("lat") is not None and p["lat"] is None:
                              p["lat"], p["lng"] = e["lat"], e["lng"]; coords += 1
                          if "centres.iskcon.org" in (e.get("source") or ""):
                              p["source"] = e["source"]; src_official += 1
                          if not p["email"] and e.get("email"): p["email"] = e["email"]
                          if not p["website"] and e.get("website"): p["website"] = e["website"]
              except Exception as e2: print("prev merge err", e2)
          ann("notice", "COORDS", f"latlng_from_prev={coords} official_src={src_official}")

          data = sorted(places.values(), key=lambda p: (p["continent"], p["country"], p["city"], p["name"]))
          for p in data:
              cl = " ".join(p["categories"]).lower() + " " + p["name"].lower()
              p["kind"] = "restaurant" if any(x in cl for x in ["restaurant", "govinda", "cafe", "café"]) else "centre"
              p["region"] = p["state"]
          rest_n = sum(1 for p in data if p["kind"] == "restaurant")
          with_cont = sum(1 for p in data if p["continent"] != "Другое")
          with_addr = sum(1 for p in data if p["address"])
          with_ph = sum(1 for p in data if p["phone"])
          with_ll = sum(1 for p in data if p["lat"] is not None)
          with_ctry = sum(1 for p in data if p["country"])
          ann("notice", "TOTAL", f"places={len(data)} rest={rest_n} cont={with_cont} country={with_ctry} addr={with_addr} phone={with_ph} latlng={with_ll}")
          assert len(data) >= 500, f"Too few: {len(data)}"
          assert with_addr >= 400, f"Addresses: {with_addr}"
          assert with_cont >= 400, f"Continents: {with_cont}"
          os.makedirs("apps/web/public/data", exist_ok=True)
          json.dump({"updated": time.strftime("%Y-%m-%d"),
                     "source": "centers.iskcondesiretree.com (+ centres.iskcon.org coords)",
                     "places": data},
                    open("apps/web/public/data/iskcon-places.json", "w", encoding="utf-8"),
                    ensure_ascii=False, separators=(",", ":"))
          print("WROTE", os.path.getsize("apps/web/public/data/iskcon-places.json"), "bytes")
          PY

      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A apps/web/public/data/
          if git diff --cached --quiet; then echo "No changes."; else
            git commit -m "data: каталог центров и ресторанов ИСККОН (официальный centres.iskcon.org)"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
          git rev-parse HEAD

# Авто-ingest аудио из канала @iskcone → archive.org → лента (ВКЗ).
# Каждые 6 часов (и вручную) сканирует свежие сообщения, качает НОВЫЕ аудио
# (уже зарегистрированные пропускает), льёт на archive.org/iskcone-lectures и
# регистрирует в D1 feed_audio — лента сразу показывает их карточкой ВКЗ.
#
# Секреты: TG_API_ID, TG_API_HASH, TG_SESSION_STRING, IA_ACCESS_KEY, IA_SECRET_KEY,
#          CLOUDFLARE_API_TOKEN.
name: "Авто-ingest аудио (@iskcone -> ВКЗ)"
run-name: "tg-audio · ${{ github.event_name }}"

concurrency:
  group: tg-archive-session
  cancel-in-progress: false

on:
  schedule:
    # ЗКН-Ф024: НЕ на минуте tg-video (чётные часы :17) — иначе аудио вечно
    # стоит pending в общей TG-сессии и его отменяет ближайший тик историй.
    - cron: "5 1,7,13,19 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Сколько свежих сообщений сканировать"
        default: "150"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: "Зависимости"
        run: pip install -r tools/tg-archive/requirements.txt

      - name: "Уже зарегистрированные id -> TG_SKIP_IDS"
        working-directory: tools/tg-archive
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ids=$(python feed_register.py skip-ids)
          echo "TG_SKIP_IDS=$ids" >> "$GITHUB_ENV"
          echo "пропускаем уже зарегистрированных: $(echo "$ids" | tr ',' '\n' | grep -c . || echo 0)"

      - name: "Скачать новое -> залить -> зарегистрировать"
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_CHANNEL: "@iskcone"
          TG_LIMIT: ${{ inputs.limit || '150' }}
          TG_NEWEST: "true"
          TG_SKIP_IDS: ${{ env.TG_SKIP_IDS }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          IA_MODE: new_item
          IA_IDENTIFIER: iskcone-lectures
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FEED_KIND_LABEL: "Лекция"
        run: |
          set +e
          python tg_archive.py download 2>&1 | tee /tmp/tg.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then echo "::error title=tg-audio-download::$(tail -c 1500 /tmp/tg.log | tr '\n\r\t' '   ')"; exit $rc; fi
          NEW=$(python -c "import json;m=json.load(open('manifest.json'));print(len([f for f in m.get('files',[]) if f.get('downloaded')]))" 2>/dev/null || echo 0)
          echo "Новых аудио: $NEW"
          if [ "$NEW" -gt 0 ]; then
            python tg_archive.py upload 2>&1 | tee -a /tmp/tg.log
            ru=${PIPESTATUS[0]}
            if [ $ru -ne 0 ]; then echo "::error title=tg-audio-upload::$(tail -c 1500 /tmp/tg.log | tr '\n\r\t' '   ')"; exit $ru; fi
            python feed_register.py register
          else
            echo "Новых аудио нет — регистрировать нечего."
          fi

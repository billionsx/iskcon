name: Probe prod endpoint

on:
  workflow_dispatch:
    inputs:
      path:
        description: "Path to GET on https://gaurangers.com"
        required: true
        default: "/api/tg/iskcone"

permissions: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: GET
        run: |
          set -e
          URL="https://gaurangers.com${{ github.event.inputs.path }}"
          BODY=$(curl -s -w "\nHTTP=%{http_code}" "$URL")
          echo "$BODY" | tail -c 1200
          CODE=$(echo "$BODY" | tail -1)
          echo "::notice title=PROBE ${URL}::${CODE} :: $(echo "$BODY" | head -c 600 | tr '\n' ' ')"

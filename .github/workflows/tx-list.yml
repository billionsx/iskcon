name: tx-list
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: query
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def d1(sql):
              rq=urllib.request.Request(D1, data=json.dumps({"sql":sql}).encode(),
                  headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq, timeout=90) as r:
                  j=json.loads(r.read().decode())
                  if not j.get("success"): raise RuntimeError(str(j)[:300])
                  return j["result"][0]["results"]
          rows=d1("""
            SELECT v.work_id AS w, v.ref AS ref, v.ordinal AS ord, v.division_id AS divid,
                   v.source_url AS url,
                   CASE WHEN (t.translation IS NULL OR t.translation='') THEN 'EMPTY' ELSE 'NOCYR' END AS kind,
                   substr(COALESCE(t.translation,''),1,90) AS tr,
                   CASE WHEN v.devanagari IS NOT NULL AND v.devanagari<>'' THEN 1 ELSE 0 END AS dev,
                   substr(COALESCE(v.translit,''),1,50) AS tl,
                   CASE WHEN t.purport IS NOT NULL AND t.purport<>'' THEN 1 ELSE 0 END AS pur
            FROM verses v LEFT JOIN verse_texts t ON t.verse_id=v.id
            WHERE (t.translation IS NULL OR t.translation='' OR t.translation NOT GLOB '*[А-Яа-яЁё]*')
            ORDER BY v.work_id, v.ordinal
          """)
          os.makedirs("docs/diag", exist_ok=True)
          json.dump(rows, open("docs/diag/tx-missing.json","w",encoding="utf-8"), ensure_ascii=False, indent=1)
          by={}
          for r in rows: by[r["w"]]=by.get(r["w"],0)+1
          print("::notice title=TXLIST::"+str(len(rows))+" rows · "+", ".join(f"{k}:{v}" for k,v in sorted(by.items())))
          PY
      - name: commit
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add docs/diag/tx-missing.json
          git commit -m "diag: tx-missing.json [skip ci]" || { echo none; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main 2>/dev/null || true
            git push origin main 2>/dev/null && break
            sleep 3
          done

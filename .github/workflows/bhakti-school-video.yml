name: "Видео @bhakti.school → лента (archive.org)"

# Ролики Школы Бхакти (@bhakti.school) на YouTube → скачиваем (yt-dlp) →
# перезаливаем на archive.org → регистрируем в D1 feed_media (ЗКН-Пл019). Лента
# Даршана (субтаб «Видео» и «Лента») читает их через /api/media и играет инлайн
# бесшовным <video>, без ухода на YouTube. Идемпотентно: guid = youtube:<vid>,
# уже залитое пропускается. Видео тяжёлое — K роликов за прогон.
#
# Пишет ТОЛЬКО в D1 (не в репозиторий) — значит deploy-web дёргать не нужно
# (лента читает базу вживую), капкан ЗКН-Ф022 тут не срабатывает.
#
# Секреты: IA_ACCESS_KEY, IA_SECRET_KEY, CLOUDFLARE_API_TOKEN. Перевод — бесплатный (без ключа).

on:
  schedule:
    - cron: "37 */6 * * *"   # каждые 6 часов (UTC)
  workflow_dispatch:
    inputs:
      limit:
        description: "Максимум НОВЫХ роликов за прогон"
        default: "3"

concurrency:
  group: bhakti-school-video
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: "ffmpeg (склейка видео+аудио в mp4)"
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: "PO-token провайдер (обход SABR/PO-token YouTube)"
        run: |
          docker run -d --name bgutil -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          for i in $(seq 1 20); do
            if curl -s -o /dev/null http://127.0.0.1:4416/ 2>/dev/null; then echo "POT-провайдер поднялся"; break; fi
            sleep 2
          done
      - name: "Зависимости"
        run: |
          pip install -r tools/video/requirements.txt
          pip install -U bgutil-ytdlp-pot-provider   # плагин yt-dlp: берёт PO-token у провайдера
      - name: "Диагностика POT (провайдер + плагин связаны?)"
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "::notice title=POT /ping::$(curl -s --max-time 8 http://127.0.0.1:4416/ping | head -c 200 || echo 'нет ответа')"
          python3 - <<'PY' || true
          import os, tempfile
          from yt_dlp import YoutubeDL
          cf = None
          raw = os.environ.get("YT_COOKIES", "").strip()
          if raw:
              fd, cf = tempfile.mkstemp(suffix=".txt")
              open(cf, "w").write(raw if raw.endswith("\n") else raw + "\n")
          URL = "https://www.youtube.com/watch?v=8zGRtr1bE8E"
          configs = [
              ("default+pot", {"fetch_pot": ["always"]}),
              ("web_safari", {"fetch_pot": ["always"], "player_client": ["web_safari"]}),
              ("tv", {"fetch_pot": ["always"], "player_client": ["tv"]}),
              ("tv_embedded", {"fetch_pot": ["always"], "player_client": ["tv_embedded"]}),
              ("android_vr", {"fetch_pot": ["always"], "player_client": ["android_vr"]}),
              ("ios", {"fetch_pot": ["always"], "player_client": ["ios"]}),
              ("mweb", {"fetch_pot": ["always"], "player_client": ["mweb"]}),
          ]
          for name, ea in configs:
              opts = {"quiet": True, "no_warnings": True, "skip_download": True, "cookiefile": cf,
                      "extractor_args": {"youtube": ea}}
              try:
                  with YoutubeDL(opts) as ydl:
                      info = ydl.extract_info(URL, download=False)
                  fmts = (info or {}).get("formats") or []
                  v = sum(1 for f in fmts if f.get("vcodec") not in (None, "none"))
                  a = sum(1 for f in fmts if f.get("acodec") not in (None, "none"))
                  print("::notice title=cfg %s::форматов=%d (видео=%d аудио=%d)" % (name, len(fmts), v, a))
              except Exception as e:
                  print("::notice title=cfg %s::ошибка: %s" % (name, str(e)[:110]))
          PY
      - name: "YouTube → archive.org → D1"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          python3 tools/video/bhakti_school.py --limit "${{ github.event.inputs.limit || '3' }}"

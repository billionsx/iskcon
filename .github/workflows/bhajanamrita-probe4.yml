name: bhajanamrita probe4 (real API shapes)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture admin API
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, json, pathlib, time
          API="https://admin.bhajanamrita.com"
          UA="gaurangers-bhajan-sync/1.0 (by permission of Sri Rupa Seva Kunj; ceo@billionsx.com)"
          OUT=pathlib.Path("tools/bhajans/recon"); OUT.mkdir(parents=True, exist_ok=True)
          def get(path):
              rq=urllib.request.Request(API+path, headers={"User-Agent":UA,"Accept":"application/json"})
              with urllib.request.urlopen(rq, timeout=40) as r:
                  return r.status, r.headers.get("Content-Type",""), r.read()
          def shape(o, d=0, md=4):
              if d>md: return "…"
              if isinstance(o,dict): return {k:shape(v,d+1,md) for k,v in list(o.items())[:30]}
              if isinstance(o,list): return [shape(o[0],d+1,md), f"…×{len(o)}"] if o else []
              if isinstance(o,str): return f"str:{o[:40]!r}" if len(o)<=40 else f"str({len(o)})"
              return type(o).__name__
          rep={}
          def probe(tag, path):
              try:
                  st,ct,data=get(path)
                  try: j=json.loads(data)
                  except Exception: j=None
                  if j is not None:
                      (OUT/f"api_{tag}.json").write_bytes(data)
                      rep[tag]={"status":st,"bytes":len(data),"shape":shape(j)}
                  else:
                      rep[tag]={"status":st,"ctype":ct,"bytes":len(data),"head":data[:160].decode('utf-8','replace')}
              except urllib.error.HTTPError as e:
                  rep[tag]={"http":e.code,"path":path}
              except Exception as e:
                  rep[tag]={"err":str(e)[:160],"path":path}
              time.sleep(0.6)

          probe("list_ru","/api/public/bhajans/?lang=ru")
          # вытащим первый id/slug из списка для детального запроса
          first_id=first_slug=None
          lp=OUT/"api_list_ru.json"
          if lp.exists():
              j=json.loads(lp.read_text())
              arr = j if isinstance(j,list) else (j.get("data") or j.get("items") or j.get("bhajans") or j.get("results") or [])
              if isinstance(arr,list) and arr and isinstance(arr[0],dict):
                  first_id=arr[0].get("id"); first_slug=arr[0].get("slug")
                  rep["_first"]={"id":first_id,"slug":first_slug,"keys":list(arr[0].keys())}
          if first_id is not None:
              probe("full_by_id", f"/api/public/bhajans/{first_id}/full?lang=ru")
          if first_slug:
              probe("full_by_slug", f"/api/public/bhajans/{first_slug}/full?lang=ru")
          probe("full_gurudev_slug","/api/public/bhajans/gurudev/full?lang=ru")
          probe("full_amara_slug","/api/public/bhajans/amara-jivana/full?lang=ru")

          (OUT/"PROBE4.json").write_text(json.dumps(rep,ensure_ascii=False,indent=2))
          print(json.dumps(rep,ensure_ascii=False,indent=2)[:4000])
          PY
      - name: Commit
        run: |
          git config user.name "Billions X"; git config user.email "ceo@billionsx.com"
          git add tools/bhajans/recon
          git commit -m "probe4(bhajanamrita): real API shapes [skip ci]" || exit 0
          git push

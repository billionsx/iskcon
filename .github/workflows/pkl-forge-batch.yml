name: pkl-forge-batch (кузница — пакет личностей)

# Кузница по списку. Один прогон кует BATCH личностей, затем ЗАПУСКАЕТ САМ СЕБЯ
# с остатком очереди (самоцепочка) — как конвейер загрузки аудио ШБ.
#
# Провал гейта на одной личности НЕ убивает пакет: она уходит в список павших,
# очередь идёт дальше. Молчаливая потеря половины пакета из-за одной ошибки —
# худшее, что может сделать пакетный скрипт.

on:
  workflow_dispatch:
    inputs:
      ids:
        description: "id через запятую (очередь)"
        required: true
      batch:
        description: "сколько ковать за один прогон"
        default: "5"
      keep_old:
        description: "сохранять рукописные табы (машина не повторяет их цитаты)"
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

jobs:
  forge:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Ковка пакета
        id: batch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          D1_DATABASE_ID: 6226aded-dd03-4e74-977f-9cd0b509e73d
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # ЗАКОН: `cmd | tee log` отдаёт код возврата TEE, а не cmd. Без этого
          # пакет ставит галочку личности, которая провалила гейт (так и вышло с
          # Бхугарбхой в первом прогоне). Ошибка обязана быть видимой.
          set -o pipefail
          IDS="${{ inputs.ids }}"
          N="${{ inputs.batch }}"
          KEEP=""
          [ "${{ inputs.keep_old }}" = "true" ] && KEEP="--keep-old"
          IFS=',' read -ra ALL <<< "$IDS"
          DONE=""; REST=""; OK=0; FAIL=0; i=0
          for id in "${ALL[@]}"; do
            id="$(echo "$id" | xargs)"
            [ -z "$id" ] && continue
            i=$((i+1))
            if [ "$i" -gt "$N" ]; then REST="$REST,$id"; continue; fi
            echo "::group::кую $id"
            if python3 tools/goldforge/goldforge.py forge "$id" $KEEP 2>&1 | tee "f-$id.log"; then
              V=$(grep -oE "level=[a-z]+" "f-$id.log" | tail -1)
              C=$(grep -oE "· [0-9 ]+ симв\." "f-$id.log" | tail -1)
              echo "::notice::✓ $id $V $C"
              OK=$((OK+1)); DONE="$DONE $id"
            else
              echo "::error::✗ $id — гейт не пропустил (см. лог)"
              grep -E "✗" "f-$id.log" | head -5 | while read -r l; do echo "::warning::$id: $l"; done
              FAIL=$((FAIL+1))
            fi
            echo "::endgroup::"
          done
          echo "rest=${REST#,}" >> "$GITHUB_OUTPUT"
          {
            echo "## Пакет: выковано $OK · не прошло гейт $FAIL"
            echo "Осталось в очереди: \`${REST#,}\`"
            echo '```'
            grep -hE "ЗАПИСАНО|ВЕРДИКТ|✗" f-*.log | head -40
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Улики в репозиторий
        if: always()
        run: |
          git config user.email "ceo@billionsx.com"
          git config user.name "Billions X"
          git add docs/dossiers/passports/ docs/dossiers/*.brief.md \
            docs/dossiers/*.prev.json data/pkl/ 2>/dev/null || true
          git commit -m "forge: пакет — книги, паспорта, брифы [skip ci]" || echo "нечего коммитить"
          for i in 1 2 3 4 5 6; do
            git fetch origin main -q
            git merge-base --is-ancestor origin/main HEAD && break
            GIT_EDITOR=true git rebase origin/main || true
            sleep 5
          done
          git push origin HEAD:main || true

      - name: Самоцепочка — следующий пакет
        if: always() && steps.batch.outputs.rest != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          sleep 10
          gh workflow run pkl-forge-batch.yml -R "${{ github.repository }}" \
            -f ids="${{ steps.batch.outputs.rest }}" \
            -f batch="${{ inputs.batch }}" \
            -f keep_old="${{ inputs.keep_old }}"
          echo "::notice::очередь продолжена: ${{ steps.batch.outputs.rest }}"

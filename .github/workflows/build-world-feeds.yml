name: Build world GCal feeds (precompute)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shard:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clone GCAL engine (gaurabda)
        run: git clone --depth 1 https://github.com/gopa810/gaurabda-calendar.git _gaurabda
      - name: Generate shard ${{ matrix.shard }} of 8
        run: |
          python3 scripts/gen_world_feeds.py _gaurabda /tmp/feeds ${{ matrix.shard }} 8
          echo "shard ${{ matrix.shard }} files: $(ls /tmp/feeds 2>/dev/null | wc -l)"
      - uses: actions/upload-artifact@v4
        with:
          name: feeds-${{ matrix.shard }}
          path: /tmp/feeds
          retention-days: 1
          if-no-files-found: warn

  collect:
    needs: shard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clone GCAL engine (gaurabda)
        run: git clone --depth 1 https://github.com/gopa810/gaurabda-calendar.git _gaurabda
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/allfeeds
      - name: Merge shard feeds + build coords index
        run: |
          mkdir -p apps/web/public/data/gcal
          for d in /tmp/allfeeds/feeds-*; do
            [ -d "$d" ] || continue
            cp -n "$d"/*.json apps/web/public/data/gcal/ 2>/dev/null || true
          done
          echo "feeds in repo now: $(ls apps/web/public/data/gcal | wc -l)"
          python3 scripts/build_gcal_index.py apps/web/public/data _gaurabda
      - name: GBC verification gate (output must match official GCal to the minute)
        run: python3 scripts/verify_gbc.py _gaurabda
      - name: Commit feeds + index
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          rm -rf _gaurabda
          git add apps/web/public/data/gcal apps/web/public/data/gcal-index.json
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "precompute: world GCal feeds (gaurabda, ~2387 cities) + coords index"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && { echo pushed; break; } || sleep 12
          done

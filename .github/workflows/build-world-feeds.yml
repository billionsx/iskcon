name: Build world GCal feeds (precompute)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clone GCAL engine (gaurabda)
        run: git clone --depth 1 https://github.com/gopa810/gaurabda-calendar.git _gaurabda
      - name: Generate world feeds + coords index
        run: |
          python3 scripts/gen_world_feeds.py _gaurabda apps/web/public/data
          echo "feeds now: $(ls apps/web/public/data/gcal | wc -l)"
          echo "index entries: $(python3 -c "import json;print(len(json.load(open('apps/web/public/data/gcal-index.json'))))")"
      - name: GBC verification gate (output must match official GCal to the minute)
        run: python3 scripts/verify_gbc.py _gaurabda

      - name: Commit feeds
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          rm -rf _gaurabda
          git add apps/web/public/data/gcal apps/web/public/data/gcal-index.json
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "precompute: world GCal feeds (gaurabda GBC locations, ~2387 cities) + coords index"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && { echo pushed; break; } || sleep 12
          done

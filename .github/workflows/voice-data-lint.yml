name: Голос — линт ДАННЫХ (ЗКН-Д013)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Прогон закона по КАЖДОЙ строке базы
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
          D1_DATABASE_ID: 6226aded-dd03-4e74-977f-9cd0b509e73d
        run: python3 tools/voice-data-lint.py 2>&1 | tee lint.log
      - name: Отчёт
        if: always()
        run: |
          {
            echo "## Голос — линт данных (ЗКН-Д013)"
            echo '```'
            cat lint.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Логи GitHub на неразрешённом хосте — отчёт обязан быть в аннотациях
          while IFS= read -r l; do
            case "$l" in
              *озвучено*|*ВСЕГО*|*НЕМОЙ*|*ПРОЗА*|*ПОЛЕВЫЕ*) echo "::notice::$l" ;;
              *"✗"*) echo "::error::$l" ;;
            esac
          done < lint.log

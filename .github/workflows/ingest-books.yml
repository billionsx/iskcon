name: Ингест книг (docs/sources → D1)

# ЗКН-Пр007 · ЗКН-БТ001 · ЗКН-Б007
#
# Один инструмент на все книги. Разбор СВЕРЯЕТСЯ с самой книгой, а не с моим
# представлением о ней. Не сошлось — в базу НЕ пишем.
#
# ИЕРАРХИЯ ИСТОЧНИКОВ: вносятся только ПЕРВИЧНЫЕ (те, из которых можно цитировать
# дословно). ВТОРИЧНЫЕ (Розен, Капур, «Жития святых», «Прабхупада-шикшамрита») —
# справочный материал кузницы, НЕ книги библиотеки: внести их вровень с
# первоисточником значило бы поставить пересказ рядом с оригиналом.

on:
  workflow_dispatch:

concurrency:
  group: ingest-books
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Разбор и запись в D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/ingest-books.py

name: vedabase prose ingest (параметризованный)

# Универсальный загрузчик ПРОЗАИЧЕСКИХ книг Шрилы Прабхупады с vedabase.io (ru):
# главы → абзацы. Модель D1: works(verse_scheme='prose'), divisions(level=chapter),
# verses(абзацы, deva/translit/uvaca NULL), verse_texts(translation=абзац, <work>-ru).
# Идемпотентно/резюмируемо. По завершении коммитит apps/web/public/data/book-stats/<work>.json.
#
# Книги (work / slug / abbrev / title):
#   owk / owk / «На пути к Кришне»      rv  / rv  / «Раджа-видья»
#   pop / pop / «Путь к совершенству»    bbd / bbd / «По ту сторону рождения и смерти»
#   poy / poy / «Совершенство йоги»      sc  / sc  / «Ещё один шанс»
#   tqk / tqk / «Молитвы царицы Кунти»    spl / spl / «Шрила Прабхупада-лиламрита»

on:
  workflow_dispatch:
    inputs:
      work:    { description: "work_id в D1 (owk, rv, …)", required: true }
      slug:    { description: "vedabase ru slug", required: true }
      abbrev:  { description: "аббревиатура (ОПК, РВ, …)", default: "" }
      title:   { description: "русское название книги", required: true }
      mode:    { description: "probe | all", default: "all" }
      force:   { description: "перезаливать (true/false)", default: "false" }
      max_minutes: { description: "бюджет минут", default: "45" }

permissions:
  contents: write

jobs:
  prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install --quiet beautifulsoup4 lxml
      - name: Run
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORK: ${{ github.event.inputs.work }}
          SLUG: ${{ github.event.inputs.slug }}
          ABBREV: ${{ github.event.inputs.abbrev }}
          TITLE: ${{ github.event.inputs.title }}
          MODE: ${{ github.event.inputs.mode }}
          FORCE: ${{ github.event.inputs.force }}
          MAXMIN: ${{ github.event.inputs.max_minutes }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request, sys, traceback
          from bs4 import BeautifulSoup
          WORK=os.environ["WORK"].strip(); SLUG=os.environ["SLUG"].strip()
          ABBREV=(os.environ.get("ABBREV") or WORK.upper()).strip()
          TITLE=os.environ["TITLE"].strip()
          MODE=(os.environ.get("MODE") or "all").strip()
          FORCE=(os.environ.get("FORCE") or "false").strip()=="true"
          BUDGET=float(os.environ.get("MAXMIN") or "45")*60
          T0=time.time()
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          BASE=f"https://vedabase.io/ru/library/{SLUG}/"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def _hook(t,v,tb):
              os.makedirs(".vd", exist_ok=True)
              json.dump({"fatal":"".join(traceback.format_exception(t,v,tb))[-1800:]},
                        open(".vd/status.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
              sys.__excepthook__(t,v,tb)
          sys.excepthook=_hook

          def d1(sql, many=None):
              payload={"sql":sql} if many is None else {"sql":sql,"params":many}
              rq=urllib.request.Request(D1, data=json.dumps(payload).encode(),
                  headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq, timeout=90) as r:
                  j=json.loads(r.read().decode())
                  if not j.get("success"): raise RuntimeError(str(j)[:400])
                  return j["result"][0]["results"]
          def q(v): return "NULL" if v is None else "'"+str(v).replace("'","''")+"'"
          def get(url, tries=4):
              for t in range(tries):
                  try:
                      rq=urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"ru,en;q=0.8","accept":"text/html"})
                      with urllib.request.urlopen(rq, timeout=40) as r:
                          if r.status==200: return r.read().decode("utf-8","replace")
                  except Exception: pass
                  time.sleep(1.5*(t+1))
              return ""

          def chapter_index():
              html=get(BASE); soup=BeautifulSoup(html,"lxml")
              seen={}; order=[]
              for a in soup.select("a[href]"):
                  m=re.search(rf"/ru/library/{re.escape(SLUG)}/([^/]+)/?$", a.get("href",""))
                  if not m: continue
                  seg=m.group(1)
                  if not seg or seg in seen: continue
                  seen[seg]=re.sub(r"\s+"," ",a.get_text()).strip(); order.append(seg)
              def keyf(s):
                  if s=="preface": return (0,0)
                  if s in ("introduction","intro"): return (1,0)
                  if s.isdigit(): return (2,int(s))
                  return (3,0)
              return [(s, seen[s]) for s in sorted(order, key=keyf)]

          BOILER=re.compile(r"(Поддержать|Support Us|Privacy|Bhaktivedanta VedaBase|Спасибо|vedabase\.io|t\.me/|facebook\.com|Settings|Настройки)", re.I)
          def parse_chapter(html):
              soup=BeautifulSoup(html,"lxml")
              for t in soup(["script","style","nav","header","footer","aside"]): t.decompose()
              h1=soup.select_one("h1")
              title=re.sub(r"\s+"," ", h1.get_text()).strip() if h1 else ""
              if title: title=re.sub(r"^ГЛАВА\s+\d+\s*[:.]\s*","",title).strip()
              cand=soup.select("main .s-justify") or soup.select(".s-justify") or soup.select("main .copy")
              paras=[]
              for e in cand:
                  for br in e.find_all("br"): br.replace_with("\n")
                  t=re.sub(r"[ \t]+"," ", e.get_text()).strip(); t=re.sub(r"\n{2,}","\n",t)
                  if not t or BOILER.search(t): continue
                  if re.match(r"^ГЛАВА\s+\d+", t): continue
                  if title and t==title: continue
                  if t.startswith("Посвящается"): continue
                  paras.append(t)
              out=[]
              for t in paras:
                  if out and t==out[-1]: continue
                  out.append(t)
              return title, out

          idx=chapter_index()
          print("INDEX:", len(idx), json.dumps(idx[:6], ensure_ascii=False))
          if MODE=="probe":
              os.makedirs(".vd", exist_ok=True)
              sample={}
              for seg,_ in idx[:2]:
                  ti,pa=parse_chapter(get(BASE+seg+"/")); sample[seg]={"title":ti,"paras":len(pa),"head":pa[:2]}
              json.dump({"work":WORK,"index":idx,"count":len(idx),"sample":sample},
                        open(".vd/status.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
              raise SystemExit

          d1(f"INSERT INTO works (id,kind,abbrev,verse_scheme) VALUES ({q(WORK)},'scripture',{q(ABBREV)},'prose') "
             "ON CONFLICT(id) DO UPDATE SET verse_scheme=excluded.verse_scheme, abbrev=excluded.abbrev")
          d1(f"INSERT INTO editions (id,work_id,lang,title,translator,source,license,source_url) VALUES "
             f"({q(WORK+'-ru')},{q(WORK)},'ru',{q(TITLE)},'А.Ч. Бхактиведанта Свами Прабхупада','vedabase.io','pending',{q(BASE)}) "
             "ON CONFLICT(id) DO NOTHING")

          def num_for(seg,i):
              if seg=="preface": return "-2"
              if seg in ("introduction","intro"): return "-1"
              if seg.isdigit(): return seg
              return str(1000+i)

          stats={"work":WORK,"sections":[],"written_paras":0,"stopped_early":False}
          for i,(seg,ititle) in enumerate(idx):
              if time.time()-T0>BUDGET: stats["stopped_early"]=True; stats["stopped_at"]=seg; break
              div_id=f"{WORK}.{seg}"; num=num_for(seg,i)
              existing=d1(f"SELECT COUNT(*) AS n FROM verses WHERE work_id={q(WORK)} AND division_id={q(div_id)}")[0]["n"]
              url=BASE+seg+"/"; title,paras=parse_chapter(get(url))
              ttl=title or ititle or seg
              if existing and not FORCE:
                  stats["sections"].append({"seg":seg,"skipped":True,"existing":existing}); continue
              d1("INSERT INTO divisions (id,work_id,parent_id,level,number,title,ordinal) "
                 f"VALUES ({q(div_id)},{q(WORK)},NULL,'chapter',{q(num)},json_object('ru',{q(ttl)}),{i}) "
                 "ON CONFLICT(id) DO UPDATE SET number=excluded.number, title=excluded.title, ordinal=excluded.ordinal")
              d1(f"DELETE FROM verse_texts WHERE verse_id IN (SELECT id FROM verses WHERE division_id={q(div_id)})")
              d1(f"DELETE FROM verses WHERE division_id={q(div_id)}")
              for pi,para in enumerate(paras, start=1):
                  vid=f"{div_id}.{pi}"; ref=f"{ABBREV} {seg}.{pi}"
                  d1("INSERT INTO verses (id,work_id,division_id,ordinal,ref,devanagari,translit,uvaca,source_url) "
                     f"VALUES ({q(vid)},{q(WORK)},{q(div_id)},{pi},{q(ref)},NULL,NULL,NULL,{q(url)}) "
                     "ON CONFLICT(id) DO UPDATE SET ordinal=excluded.ordinal")
                  d1("INSERT INTO verse_texts (verse_id,edition_id,translation,purport) "
                     f"VALUES ({q(vid)},{q(WORK+'-ru')},{q(para)},NULL) "
                     "ON CONFLICT(verse_id,edition_id) DO UPDATE SET translation=excluded.translation")
              stats["written_paras"]+=len(paras)
              stats["sections"].append({"seg":seg,"paras":len(paras),"title":ttl})
              print(f"  {seg}: {len(paras)} абз · {ttl[:50]}")

          ver=d1(f"SELECT COUNT(DISTINCT division_id) AS chapters, COUNT(*) AS verses FROM verses WHERE work_id={q(WORK)}")[0]
          stats["db"]=ver
          os.makedirs("apps/web/public/data/book-stats", exist_ok=True)
          json.dump({"work":WORK,"chapters":ver["chapters"],"verses":ver["verses"],"prose":True,"stopped_early":stats["stopped_early"]},
                    open(f"apps/web/public/data/book-stats/{WORK}.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
          os.makedirs(".vd", exist_ok=True)
          json.dump(stats, open(".vd/status.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
          print("DONE:", json.dumps(ver, ensure_ascii=False))
          if ver["verses"]==0: raise SystemExit("EMPTY")
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),"
             f"{q('vd prose '+WORK)},{ver['verses']},{q('chapters='+str(ver['chapters'])+' verses='+str(ver['verses']))})")
          PY
      - name: Commit stats
        if: always()
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add apps/web/public/data/book-stats/*.json .vd/*.json 2>/dev/null || true
          git commit -m "chore(${{ github.event.inputs.work }}): prose ingest stats [skip ci]" 2>/dev/null || { echo none; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main 2>/dev/null || true
            if git push origin main 2>/dev/null; then echo pushed; break; fi
            sleep $((RANDOM % 5 + 2))
          done

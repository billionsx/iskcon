name: bhajanamrita probe5 (decode PUA font)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  font:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: deps
        run: pip install -q fonttools brotli pillow
      - name: fetch css, font, render PUA glyphs
        run: |
          python3 - <<'PY'
          import urllib.request, re, pathlib, io, json
          BASE="https://bhajanamrita.com"
          UA="gaurangers-bhajan-sync/1.0 (by permission of Sri Rupa Seva Kunj; ceo@billionsx.com)"
          OUT=pathlib.Path("tools/bhajans/recon/font"); OUT.mkdir(parents=True, exist_ok=True)
          def get(url):
              rq=urllib.request.Request(url, headers={"User-Agent":UA})
              with urllib.request.urlopen(rq, timeout=60) as r: return r.read()

          shell=get(BASE+"/ru").decode("utf-8","replace")
          css_urls=re.findall(r'href="(/_next/static/chunks/[^"]+\.css)"', shell)
          media=set()
          fams={}
          for cu in css_urls:
              css=get(BASE+cu).decode("utf-8","replace")
              for m in re.finditer(r'@font-face\{([^}]*)\}', css):
                  blk=m.group(1)
                  fam=re.search(r'font-family:\s*([^;]+)', blk)
                  src=re.findall(r'url\(([^)]+)\)', blk)
                  for s in src:
                      s=s.strip('"\'')
                      if re.search(r'\.(woff2?|ttf|otf)', s):
                          media.add(s); fams[s]=(fam.group(1).strip() if fam else "?")
          print("font urls:", media)
          PUA=[0xF101,0xF103,0xF109,0xF10F,0xF111,0xF113,0xF115,0xF119,0xF11B,0xF11D,0xF11F,0xF121]
          report={"fonts":[]}
          from fontTools.ttLib import TTFont
          from PIL import Image, ImageFont, ImageDraw
          idx=0
          for s in sorted(media):
              url = s if s.startswith("http") else BASE+s
              try: raw=get(url)
              except Exception as e:
                  report["fonts"].append({"url":url,"err":str(e)[:120]}); continue
              name=url.split("/")[-1].split("?")[0]
              (OUT/name).write_bytes(raw)
              # woff2 -> ttf in-memory
              try:
                  f=TTFont(io.BytesIO(raw))
              except Exception as e:
                  report["fonts"].append({"url":url,"family":fams.get(s),"err":"ttx "+str(e)[:100]}); continue
              cmap=f.getBestCmap()
              defined=[cp for cp in PUA if cp in cmap]
              gnames={hex(cp):cmap.get(cp) for cp in PUA}
              report["fonts"].append({"file":name,"family":fams.get(s),"pua_defined":[hex(c) for c in defined],"glyph_names":gnames})
              # render glyphs if this font defines PUA
              if defined:
                  # need a ttf path for PIL; save flat ttf
                  ttf=OUT/(name+".ttf"); f.save(str(ttf))
                  try:
                      pf=ImageFont.truetype(str(ttf), 96)
                  except Exception as e:
                      report["fonts"][-1]["render_err"]=str(e)[:100]; continue
                  for cp in PUA:
                      img=Image.new("RGB",(128,140),"white"); d=ImageDraw.Draw(img)
                      d.text((12,8), chr(cp), font=pf, fill="black")
                      img.save(OUT/f"glyph_{name}_{cp:04X}.png")
          (OUT/"FONT.json").write_text(json.dumps(report,ensure_ascii=False,indent=2))
          print(json.dumps(report,ensure_ascii=False,indent=2)[:2500])
          PY
      - name: Commit
        run: |
          git config user.name "Billions X"; git config user.email "ceo@billionsx.com"
          git add tools/bhajans/recon/font
          git commit -m "probe5(bhajanamrita): PUA font glyphs [skip ci]" || exit 0
          git push

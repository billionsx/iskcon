name: iskcone SB recheck deva (verify no-deva verses at source)

# Берёт из D1 все стихи ШБ без devanagari, тянет их страницы с vedabase и
# проверяет, есть ли там .av-devanagari. Если есть — дочитывает (self-heal).
# Если нет — фиксирует как «отсутствует в источнике». Пишет .sb-ingest/recheck-deva.json.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: pip install --quiet beautifulsoup4 lxml
      - name: Recheck no-deva SB verses
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, re, json, time, urllib.request
          from bs4 import BeautifulSoup
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def d1(sql):
              body=json.dumps({"sql":sql}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq, timeout=90) as r:
                  j=json.loads(r.read().decode())
                  if not j.get("success"): raise RuntimeError(str(j)[:300])
                  return j["result"][0]["results"]
          def q(v): return "NULL" if v is None else "'"+str(v).replace("'","''")+"'"
          def get(url, tries=4):
              for t in range(tries):
                  try:
                      rq=urllib.request.Request(url, headers={"user-agent":UA,"accept-language":"ru,en;q=0.8","accept":"text/html"})
                      with urllib.request.urlopen(rq, timeout=35) as r:
                          if r.status==200: return r.read().decode("utf-8","replace")
                  except Exception: pass
                  time.sleep(1.5*(t+1))
              return ""
          def lines(s):
              out=[re.sub(r"[ \t]+"," ",x).strip() for x in s.split("\n")]
              s="\n".join(out); s=re.sub(r"\n{3,}","\n\n",s); return s.strip()
          def deva_of(html):
              soup=BeautifulSoup(html,"lxml")
              els=soup.select(".av-devanagari")
              if not els: return ""
              for e in els:
                  for br in e.find_all("br"): br.replace_with("\n")
              return lines("\n".join(e.get_text() for e in els))

          missing=d1("SELECT id, ref, source_url FROM verses WHERE work_id='sb' AND (devanagari IS NULL OR length(devanagari)=0) ORDER BY id")
          report={"checked":len(missing),"fixed":[],"source_has_no_deva":[],"unreachable":[]}
          for r in missing:
              vid=r["id"]; ref=r["ref"]; url=r.get("source_url") or ""
              if not url:
                  report["unreachable"].append({"id":vid,"ref":ref,"reason":"no source_url"}); continue
              html=get(url)
              if not html:
                  report["unreachable"].append({"id":vid,"ref":ref,"url":url}); continue
              dv=deva_of(html)
              if dv:
                  d1(f"UPDATE verses SET devanagari={q(dv)} WHERE id={q(vid)}")
                  report["fixed"].append({"id":vid,"ref":ref,"url":url,"chars":len(dv)})
              else:
                  report["source_has_no_deva"].append({"id":vid,"ref":ref,"url":url})
              time.sleep(0.4)

          os.makedirs(".sb-ingest", exist_ok=True)
          json.dump(report, open(".sb-ingest/recheck-deva.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
          print("RECHECK:", json.dumps({k:(len(v) if isinstance(v,list) else v) for k,v in report.items()}, ensure_ascii=False))
          # обновлённое покрытие
          row=d1("SELECT COUNT(*) AS verses, SUM(CASE WHEN length(COALESCE(devanagari,''))>0 THEN 1 ELSE 0 END) AS deva FROM verses WHERE work_id='sb'")[0]
          print("AFTER:", json.dumps(row, ensure_ascii=False))
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone sb recheck-deva',"
             +str(len(report["fixed"]))+",'fixed="+str(len(report['fixed']))+" still_no_deva="+str(len(report['source_has_no_deva']))+" deva="+str(row.get('deva'))+"/"+str(row.get('verses'))+"')")
          PY
      - name: Commit recheck report
        if: always()
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add .sb-ingest/recheck-deva.json 2>/dev/null || true
          git commit -m "chore(sb-recheck): no-deva verses verified at source [skip ci]" 2>/dev/null || { echo nothing; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main 2>/dev/null || true
            if git push origin main 2>/dev/null; then echo pushed; break; fi
            sleep $((RANDOM % 5 + 2))
          done

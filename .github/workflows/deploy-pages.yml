name: Deploy Pages preview

on:
  workflow_dispatch:

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install
      - name: Build site
        working-directory: apps/web
        run: bun run build
      - name: Pages deploy + verify, record into D1
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d5cbe19470dc38599873eabfe148e6d1
        run: |
          set +e
          bunx wrangler pages deploy dist --project-name=gaurangers --branch=main --commit-dirty=true 2>&1 | tee /tmp/pages.log
          rc=$?
          url=$(grep -oE 'https://[a-z0-9-]+\.pages\.dev' /tmp/pages.log | tail -1)
          echo "pages url=$url rc=$rc"
          code=000; xr=""; note=""
          if [ -n "$url" ]; then
            for i in $(seq 1 5); do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$url/")
              [ "$code" = "200" ] && break; sleep 5
            done
            xr=$(curl -s -I --max-time 25 "$url/" | grep -i x-robots-tag | tr -d '\r')
            note="$url ; $xr"
          else
            note="FAIL rc=$rc : $(grep -iE 'error|forbidden|authenticat|permission|denied|unauthor|\[code' /tmp/pages.log | head -1)"
          fi
          bunx wrangler d1 execute iskcon-db --remote \
            --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'pages preview',${code:-0},'$(echo "$note" | tr -d "\"'" | cut -c1-190)');" || true

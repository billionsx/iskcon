name: books probe2 (глубокий поиск текстов по рус-гаудия библиотекам)
on: { workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Probe
        env: { CF: "${{ secrets.CLOUDFLARE_API_TOKEN }}" }
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.parse, re, json, os
          def get(u):
              try:
                  return urllib.request.urlopen(urllib.request.Request(u,headers={"User-Agent":"Mozilla/5.0 (probe)"}),timeout=30).read().decode("utf-8","replace")
              except Exception as e: return None
          out=[]
          TIT=["вишну-пурана","вишну пурана","кришна-сандарбха","кришна сандарбха","говинда-лиламрита","говинда лиламрита","вишну-пуран","сандарбх","лиламрит"]
          def links(html, base):
              ls=set()
              for m in re.findall(r'href=["\\\']([^"\\\']+)["\\\']', html or ""):
                  try: ls.add(urllib.parse.urljoin(base,m))
                  except: pass
              return ls
          roots=["https://vasudeva.ru/","https://gaudiya.ru/","https://www.gaudiya.ru/","https://harekrishna.ru/","https://www.krishna.ru/","https://bhaktivedanta.ru/","https://scriptures.ru/","https://www.oum.ru/literature/"]
          interesting=[]
          for root in roots:
              h=get(root)
              if not h: out.append(f"{root} — НЕДОСТУПЕН"); continue
              hit=[t for t in TIT if t in h.lower()]
              out.append(f"{root} OK len={len(h)} titles_home={hit}")
              ls=links(h,root)
              libl=[L for L in ls if any(k in L.lower() for k in ["librar","biblio","knig","book","text","liter","pdf","vishnu","puran","sandarbh","govinda","lilamrit"])]
              for L in sorted(libl)[:12]:
                  out.append(f"   L: {L}")
                  if any(k in L.lower() for k in ["vishnu","puran","sandarbh","govinda","lilamrit"]): interesting.append(L)
          # explore interesting + library indexes one level deeper
          for L in interesting[:14]:
              hh=get(L)
              if not hh: out.append(f"deep {L} — недоступен"); continue
              hit=[t for t in TIT if t in hh.lower()]
              out.append(f"deep {L} len={len(hh)} titles={hit}")
          os.makedirs("docs/data",exist_ok=True)
          open("docs/data/books_probe2.txt","w",encoding="utf-8").write("\n".join(out))
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          import urllib.request as U
          U.urlopen(U.Request(f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query",
            data=json.dumps({"sql":"INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'books-probe2 DONE',0,?)","params":["\n".join(out)[:1850]]}).encode(),
            headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}),timeout=40).read()
          print("\n".join(out))
          PY
      - name: Commit
        run: |
          git config user.email "ceo@billionsx.com"; git config user.name "Billions X"
          git add docs/data/books_probe2.txt && git commit -m "probe2 [skip ci]" || echo no
          git push origin HEAD:main || true

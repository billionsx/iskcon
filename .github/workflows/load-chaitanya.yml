name: load-chaitanya
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update chaitanya longform (D1 HTTP API, bound params)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - << 'PY'
          import json, os, urllib.request, urllib.error, sys
          doc = open('docs/dossiers/chaitanya.json', encoding='utf-8').read()
          obj = json.loads(doc)
          assert isinstance(obj, dict) and isinstance(obj.get('tabs'), list) and len(obj['tabs'])>0, "not a dossier"
          body = json.dumps({
            "sql": "UPDATE entity_profiles SET longform=?1 WHERE entity_id=?2",
            "params": [doc, "chaitanya"]
          }).encode('utf-8')
          url = "https://api.cloudflare.com/client/v4/accounts/d5cbe19470dc38599873eabfe148e6d1/d1/database/6226aded-dd03-4e74-977f-9cd0b509e73d/query"
          req = urllib.request.Request(url, data=body,
            headers={"Authorization": "Bearer %s" % os.environ['CF_TOKEN'], "Content-Type": "application/json"},
            method="POST")
          try:
              out = urllib.request.urlopen(req).read().decode()
          except urllib.error.HTTPError as e:
              print("HTTP", e.code, e.read().decode()[:1200]); sys.exit(1)
          r = json.loads(out)
          print("success:", r.get("success"))
          meta = (r.get("result") or [{}])[0].get("meta", {})
          print("changes:", meta.get("changes"), "rows_written:", meta.get("rows_written"))
          if not r.get("success"):
              print(out[:1500]); sys.exit(1)
          print("DONE chaitanya dossier loaded")
          PY

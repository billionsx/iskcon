name: bs fix whitespace (нормализация пробелов в переводах/комментариях)
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fix
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, re, json, urllib.request, time
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def d1(sql):
              for _ in range(4):
                  try:
                      r=urllib.request.urlopen(urllib.request.Request(D1, data=json.dumps({"sql":sql}).encode(),
                        headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}), timeout=60)
                      return json.loads(r.read().decode())
                  except Exception as e: time.sleep(2); last=e
              raise last
          def Q(v): return "'"+str(v).replace("'","''")+"'"
          DICT={
            "множествисполняющих":"множеств исполняющих",
          }
          def fixws(t):
              if not t: return t
              for a,b in DICT.items(): t=t.replace(a,b)
              t=re.sub(r'([,;:])([0-9A-Za-zА-ЯЁа-яё«(])', r'\1 \2', t)
              t=re.sub(r'([.!?»])([A-ZА-ЯЁ«(])', r'\1 \2', t)
              t=re.sub(r'([A-Za-zА-ЯЁа-яё0-9»])—', r'\1 —', t)
              t=re.sub(r'—([A-Za-zА-ЯЁа-яё0-9«])', r'— \1', t)
              t=re.sub(r'[ \t]+',' ',t)
              return t.strip()
          rows=d1("SELECT verse_id, translation, purport FROM verse_texts WHERE edition_id='bs-ru'")["result"][0]["results"]
          changed=0; longtok=[]
          for r in rows:
              vid=r["verse_id"]; tr=r.get("translation") or ""; pu=r.get("purport") or ""
              ntr=fixws(tr); npu=fixws(pu)
              # пометить длинные токены в ПЕРЕВОДЕ (возможные склейки)
              for w in re.findall(r'[А-ЯЁа-яё]{19,}', ntr):
                  longtok.append(vid+":"+w)
              if ntr!=tr or npu!=pu:
                  d1(f"UPDATE verse_texts SET translation={Q(ntr)}, purport={Q(npu)} WHERE verse_id={Q(vid)} AND edition_id='bs-ru'")
                  changed+=1
          d1("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'bs-fixws DONE',"+str(changed)+","+Q('changed='+str(changed)+' long='+str(longtok)[:600])+")")
          print("changed",changed,"longtokens",longtok)
          PY

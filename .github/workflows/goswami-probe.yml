# GOSWAMI.RU · РАЗВЕДКА — БЕЗ скачивания звука.
#
# Сайт отдаёт лекции через JSON-API, адрес которого зашит в JS-бандл. Разведка
# находит API и выкачивает ВЕСЬ каталог в docs/diagnostics/goswami-probe.json —
# по нему строится карта заливки (ЗКН-Пл010: карта до того, как поедут гигабайты).
name: "Госвами · разведка каталога"
run-name: "goswami-probe · лимит: ${{ inputs.limit || 'весь каталог' }}"

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Лимит лекций (пусто = весь каталог)"
        default: ""
      script:
        description: "Скрипт разведки"
        default: "probe.py"
      out:
        description: "Куда положить отчёт"
        default: "docs/diagnostics/goswami-probe.json"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Разведка
        env:
          PROBE_LIMIT: ${{ inputs.limit }}
          SCRIPT: ${{ inputs.script || 'probe.py' }}
          PROBE_OUT: ${{ inputs.out || 'docs/diagnostics/goswami-probe.json' }}
        run: |
          set +e
          python tools/goswami/${SCRIPT:-probe.py} 2>&1 | tee /tmp/probe.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            echo "::error title=goswami-probe::$(tail -c 1500 /tmp/probe.log | tr '\n\r\t' '   ')"
          fi
          exit 0

      - name: Итог в лог
        env:
          OUTF: ${{ inputs.out || 'docs/diagnostics/goswami-probe.json' }}
        run: |
          python3 - <<'PY'
          import json, pathlib
          import os
          p = pathlib.Path(os.getenv("OUTF") or "docs/diagnostics/goswami-probe.json")
          if not p.exists():
              print("НЕТ ФАЙЛА"); raise SystemExit(0)
          d = json.loads(p.read_text(encoding="utf-8"))
          print("chosen:", d.get("chosen"))
          print("n_lectures:", d.get("n_lectures"), "id:", d.get("id_min"), "..", d.get("id_max"))
          print("scheme:", json.dumps(d.get("harvest_scheme", {}), ensure_ascii=False)[:900])
          print("--- поля карточки ---")
          for k, v in list((d.get("keys_item") or {}).items())[:60]:
              print(f"  {k} = {v}")
          print("--- поля детали ---")
          for k, v in list((d.get("keys_detail") or {}).items())[:60]:
              print(f"  {k} = {v}")
          print("--- кандидаты 200 ---")
          for grp in ("probe_mined", "probe_list", "probe_item", "probe_misc"):
              for r in (d.get(grp) or []):
                  if r.get("code") == 200:
                      print(f"  {r['url']} json={r.get('json')} len={r.get('len')}")
          print("--- пути из бандла ---")
          for s in (d.get("mined_paths") or [])[:120]:
              print("  ", s)
          PY

      - name: Инвентарь → в репо (песочница читает из main)
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -f docs/diagnostics/goswami-probe*.json || true
          git diff --cached --quiet && { echo "нечего коммитить"; exit 0; }
          git commit -m "Госвами: инвентарь каталога [skip ci]"
          for i in 1 2 3 4 5 6; do
            git pull --rebase -q origin main && git push -q origin HEAD:main && break
            sleep 5
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: goswami-probe
          path: docs/diagnostics/goswami-probe*.json
          retention-days: 14

name: darshan-site-probe

on:
  workflow_dispatch:
    inputs:
      pages:
        description: 'URL(ы) страниц даршана через запятую (пусто = sringar + gallery)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install puppeteer
        run: npm i puppeteer@23 --no-save --no-audit --no-fund
      - name: Scrape darshan pages
        env:
          PAGES: ${{ github.event.inputs.pages || '' }}
        run: node scripts/darshan-scrape-site.mjs
      - name: Publish result to side branch
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git checkout -B ci/darshan-site
          git add -f data/darshan/_site.json
          git commit -m "chore(darshan): site probe result [skip ci]" || echo "no changes"
          git push -f origin ci/darshan-site

name: darshan-probe-orient

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe Vrindavan EXIF + Mayapur album
        run: node scripts/darshan-probe-orient.mjs
      - name: Publish result to side branch
        if: always()
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git checkout -B ci/darshan-orient
          git add -f data/darshan/_orient.json
          git commit -m "chore(darshan): orientation/album probe [skip ci]" || echo "no changes"
          git push -f origin ci/darshan-orient

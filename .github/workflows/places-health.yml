name: Places health check (актуальность сайтов центров/ресторанов)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"   # еженедельно, пн 03:17 UTC

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe every place website
        run: |
          python3 - <<'PY'
          import json, os, sys, time, traceback, urllib.request, ssl, concurrent.futures as cf

          def ann(level, title, msg):
              msg = str(msg).replace("%", "%25").replace("\r", " ").replace("\n", " | ")[:880]
              print(f"::{level} title={title}::{msg}"); sys.stdout.flush()
          def _hook(t, v, tb):
              ann("error", "HEALTH-FAIL", "".join(traceback.format_exception(t, v, tb))[-850:]); sys.exit(1)
          sys.excepthook = _hook

          data = json.load(open("apps/web/public/data/iskcon-places.json", encoding="utf-8"))
          places = data["places"]
          ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
          UA = {"User-Agent": "Mozilla/5.0 (compatible; iskcon-one-love-health/1.0; +https://brajs.com)"}

          def probe(p):
              url = (p.get("website") or "").strip()
              if not url: return p["id"], None
              if not url.startswith("http"): url = "https://" + url
              for method in ("HEAD", "GET"):
                  try:
                      req = urllib.request.Request(url, headers=UA, method=method)
                      with urllib.request.urlopen(req, timeout=18, context=ctx) as r:
                          return p["id"], r.status
                  except urllib.error.HTTPError as e:
                      if method == "GET" or e.code not in (403, 405): return p["id"], e.code
                  except Exception:
                      if method == "GET": return p["id"], 0
              return p["id"], 0

          results = {}
          with cf.ThreadPoolExecutor(max_workers=16) as ex:
              for pid, code in ex.map(probe, places):
                  if code is not None: results[pid] = code

          ok = sum(1 for c in results.values() if 200 <= c < 400)
          dead = sum(1 for c in results.values() if c == 0 or c >= 500 or c == 404 or c == 410)
          warn = len(results) - ok - dead
          ann("notice", "HEALTH", f"with_site={len(results)} ok={ok} warn={warn} dead={dead} no_site={len(places)-len(results)}")
          # топ стран по мёртвым ссылкам
          from collections import Counter
          byc = Counter()
          pm = {p["id"]: p for p in places}
          for pid, c in results.items():
              if c == 0 or c in (404, 410) or c >= 500:
                  byc[(pm[pid].get("country") or "?")] += 1
          ann("notice", "DEAD-BY-COUNTRY", "; ".join(f"{k}:{v}" for k, v in byc.most_common(20)))

          out = {"checkedAt": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                 "summary": {"withSite": len(results), "ok": ok, "warn": warn, "dead": dead},
                 "codes": results}
          os.makedirs("apps/web/public/data", exist_ok=True)
          json.dump(out, open("apps/web/public/data/places-health.json", "w", encoding="utf-8"),
                    ensure_ascii=False, separators=(",", ":"))
          print("WROTE", os.path.getsize("apps/web/public/data/places-health.json"))
          PY
      - name: Commit & push
        run: |
          set -e
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add -A apps/web/public/data/places-health.json
          if git diff --cached --quiet; then echo "No changes."; else
            git commit -m "data: проверка доступности сайтов мест (places-health)"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi

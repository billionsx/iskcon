name: ia-status
on:
  workflow_dispatch:
    inputs:
      run_tag:
        description: "метка прогона"
        required: false
        default: "ia-status"
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Проверить объекты archive.org
        run: |
          python3 - <<'PY'
          import json, urllib.request
          IDS = [
            "iskcone-manah-siksa","iskcone-siksastaka","iskcone-bhakti-tattva-viveka",
            "iskcone-mukunda-mala-stotra","iskcone-sanmodana-bhashya","iskcone-bhaktyaloka",
            "iskcone-prema-pradipa","iskcone-harinama-cintamani","iskcone-caitanya-siksamrta",
            "iskcone-jagannatha-vallabha-nataka","iskcone-sri-namamrita","iskcone-ray-of-vishnu",
            "iskcone-vrindavane-bhajana","iskcone-uroki-lyubvi","iskcone-navadvipa-dhama-mahatmya",
            "iskcone-seventh-goswami","iskcone-the-beggar",
          ]
          done=ip=queue=0
          lines=[]
          for ident in IDS:
              url=f"https://archive.org/metadata/{ident}"
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      d=json.load(r)
              except Exception as e:
                  d={}
              files=d.get("files") or []
              names=[f.get("name","") for f in files]
              mp3=[n for n in names if n.lower().endswith(".mp3")]
              has_pl=any(n=="playlist.json" for n in names)
              has_cov=any(n=="cover.jpg" for n in names)
              if has_pl:
                  st="DONE"; done+=1
              elif mp3 or files:
                  st="UPLOADING"; ip+=1
              else:
                  st="QUEUE"; queue+=1
              msg=f"{st} | mp3={len(mp3)} | playlist={'y' if has_pl else 'n'} | cover={'y' if has_cov else 'n'}"
              print(f"{ident}: {msg}")
              print(f"::notice title={ident}::{msg}")
              lines.append(f"{ident}={st}(mp3:{len(mp3)})")
          summary=f"ГОТОВО={done} ЗАЛИВАЕТСЯ={ip} ОЧЕРЕДЬ={queue} | "+", ".join(lines)
          print(summary)
          print(f"::notice title=ИТОГ::{summary}")
          PY

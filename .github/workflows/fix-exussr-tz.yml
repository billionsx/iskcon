name: fix-exussr-tz

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone gaurabda engine
        run: git clone --depth 1 https://github.com/gopa810/gaurabda-calendar.git _gaurabda

      - name: Install deps
        run: pip install --quiet timezonefinder tzdata

      - name: Correct ex-USSR feed timezones
        run: python3 scripts/fix_exussr_tz.py _gaurabda apps/web/public/data/gcal

      - name: GBC verification gate (engine + shipped feeds)
        run: python3 scripts/verify_gbc.py _gaurabda apps/web/public/data/gcal

      - name: Commit corrected feeds
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add apps/web/public/data/gcal
          if git diff --cached --quiet; then
            echo "No feed changes."
            exit 0
          fi
          N=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit --no-verify -m "calendar: исправлены часовые пояса ex-USSR ($N фидов) — текущие смещения без устаревшего DST (Москва +3, Алматы +5, …); параны в верном местном времени"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "retry push $i"; sleep 5
          done

# РАЗВЕДКА канала киртанов (@iskconecom) — БЕЗ скачивания.
#
# ЗКН-Пл010: «структуры нет» почти всегда значит «ищу не там». Прежде чем лить
# сотни файлов на archive.org и раскладывать их по исполнителям, надо ЗНАТЬ,
# чем канал размечен: есть ли performer у аудио, что в title, что в подписи.
#
# Скрипт только читает метаданные. Ничего не качает, ничего не пишет.
name: "Киртаны · разведка канала"
run-name: "kirtans-probe · ${{ github.event_name }}"

concurrency:
  group: tg-archive-session      # ЗКН-Пл003: одна сессия Telegram — одна очередь
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Канал"
        default: "@iskconecom"
      limit:
        description: "Лимит сообщений (пусто = весь канал)"
        default: ""

permissions:
  contents: write      # реестр коммитится в репозиторий

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Зависимости
        run: pip install -r tools/tg-archive/requirements.txt

      - name: Инвентаризация
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_CHANNELS: ${{ inputs.channel || '@iskconecom' }}
          TG_LIMIT: ${{ inputs.limit }}
          PROBE_OUT: tools/tg-archive/kirtans_probe.json
        run: python tg_probe.py

      - name: Отчёт (логи недоступны — печатаем аннотациями)
        run: |
          python3 - <<'PY'
          import json, collections
          d = json.load(open("tools/tg-archive/kirtans_probe.json"))
          for ch in d["channels"]:
              if ch.get("error"):
                  print("::error::%s: %s" % (ch["channel"], ch["error"])); continue
              f = ch["files"]
              gb = (ch.get("total_bytes") or 0) / 1e9
              print("::notice::КАНАЛ «%s» — аудио: %d, объём: %.2f ГБ" % (ch.get("title"), len(f), gb))

              with_perf = [x for x in f if x.get("performer")]
              with_title = [x for x in f if x.get("title")]
              print("::notice::с полем performer: %d из %d   ·   с полем title: %d"
                    % (len(with_perf), len(f), len(with_title)))

              perf = collections.Counter((x.get("performer") or "— БЕЗ ИСПОЛНИТЕЛЯ —") for x in f)
              print("::notice::РАЗНЫХ ИСПОЛНИТЕЛЕЙ: %d" % len(perf))
              for name, n in perf.most_common(40):
                  print("::notice::  %4d   %s" % (n, name))

              print("::notice::--- примеры разметки (первые 12) ---")
              for x in f[:12]:
                  print("::notice::  perf=«%s» | title=«%s» | file=«%s» | cap=«%s»"
                        % (x.get("performer") or "", (x.get("title") or "")[:45],
                           (x.get("file_name") or "")[:40], (x.get("caption") or "")[:45]))

              nogrp = [x for x in f if not x.get("performer")]
              if nogrp:
                  print("::warning::без performer — %d шт., примеры имён файлов:" % len(nogrp))
                  for x in nogrp[:10]:
                      print("::warning::  file=«%s» | title=«%s» | cap=«%s»"
                            % ((x.get("file_name") or "")[:50], (x.get("title") or "")[:40],
                               (x.get("caption") or "")[:40]))
          PY

      # ── РАЗБОР: исполнитель для КАЖДОГО файла (три источника) ──
      - name: Разбор в реестр исполнителей
        working-directory: tools/tg-archive
        env:
          PROBE_IN: kirtans_probe.json
          ROSTER_OUT: kirtans_roster.json
        run: python kirtans_plan.py

      # Логи Actions мне недоступны (чужой хост) — реестр КОММИТИМ в репозиторий.
      - name: Реестр — в репозиторий
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add tools/tg-archive/kirtans_probe.json tools/tg-archive/kirtans_roster.json
          git diff --cached --quiet && { echo "реестр не изменился"; exit 0; }
          git commit -m "Киртаны: реестр исполнителей канала [skip ci]"
          for i in 1 2 3 4 5 6; do
            git pull --rebase -q origin main && git push -q origin HEAD:main && break
            sleep 5
          done

      - uses: actions/upload-artifact@v4
        with:
          name: kirtans-probe
          path: |
            tools/tg-archive/kirtans_probe.json
            tools/tg-archive/kirtans_roster.json

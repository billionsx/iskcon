# Озвучка «Шримад-Бхагаватам» (12 песней, стих за стихом с комментариями):
# Telegram → archive.org (iskcone-sb-1 … iskcone-sb-12) → D1 (таблица sb_audio).
#
# Резюмируемый: файл, уже лежащий в объекте archive.org, повторно не качается.
# Прогон сворачивается штатно за TIME_BUDGET_MIN до конца раннера и печатает,
# какие песни осталось докатать — перезапусти с этим SB_CANTOS.
#
# Секреты: TG_API_ID, TG_API_HASH, TG_SESSION_STRING, IA_ACCESS_KEY, IA_SECRET_KEY,
#          CLOUDFLARE_API_TOKEN.
name: "Озвучка ШБ (TG → archive.org → D1)"
run-name: "sb-audio · песни ${{ inputs.cantos || 'все' }}"

concurrency:
  group: tg-archive-session
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      cantos:
        description: "Песни через запятую (пусто = все 12)"
        default: ""
      budget:
        description: "Бюджет времени, мин (стоп раньше таймаута раннера)"
        default: "320"
      parallel:
        description: "Параллельных заливок на archive.org"
        default: "6"
      dl:
        description: "Параллельных скачиваний из Telegram"
        default: "12"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Зависимости"
        run: pip install -r tools/tg-archive/requirements.txt

      - name: "Место на диске"
        run: df -h / | tail -1

      - name: "Заливка песней"
        working-directory: tools/tg-archive
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SB_CANTOS: ${{ inputs.cantos }}
          TIME_BUDGET_MIN: ${{ inputs.budget || '320' }}
          IA_PARALLEL: ${{ inputs.parallel || '6' }}
          DL_PARALLEL: ${{ inputs.dl || '12' }}
        run: |
          set +e
          python sb_audio.py 2>&1 | tail -c 400000 | tee /tmp/sb.log
          rc=${PIPESTATUS[0]}
          [ $rc -ne 0 ] && echo "::error title=sb-audio::$(tail -c 1500 /tmp/sb.log | tr '\n\r\t' '   ')"
          exit $rc

name: bhajans load (payload JSON → prayers + prayer_verses)

# Загрузчик бхаджанов. Источник-агностик: читает закоммиченный нормализованный
# JSON (массив песен, схема — см. tools/bhajans/bhajan_loader.py) и кладёт в D1.
# По умолчанию dry-run: валидация + план, без записи. Запись — только при mode=write.

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "Путь к JSON-пакету песен"
        required: true
        default: "data/bhajans_payload.json"
      mode:
        description: "dry-run (проверить) или write (записать в D1)"
        required: true
        default: "dry-run"
        type: choice
        options: ["dry-run", "write"]

jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Self-test движка
        run: python3 tools/bhajans/selftest_loader.py

      - name: Загрузка
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ "${{ inputs.mode }}" = "write" ]; then
            python3 tools/bhajans/bhajan_loader.py "${{ inputs.payload }}" --write
          else
            python3 tools/bhajans/bhajan_loader.py "${{ inputs.payload }}" --dry-run
          fi

name: Deploy Web (Cloudflare)

on:
  workflow_dispatch:
    inputs:
      gen_works:
        description: 'Книги для пре-генерации PDF (через запятую). Напр. bg,cc,brs,sb'
        required: false
        default: 'bg,cc,brs'
      force_pdf:
        description: 'Пересобрать PDF принудительно (игнорировать кэш-подпись) — после правок текста'
        type: boolean
        required: false
        default: false
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install
      # ── ЗКН-Пф001: версия кэша PDF выводится из СБОРКИ, а не из руки ──
      # PDF отдаются immutable на год. Ключ кэша обязан меняться при каждом
      # изменении содержимого, иначе PDF остаются старыми навсегда (так и было:
      # PDF_CACHE_REV был ручной строкой «c3», её никто не бампал).
      - name: Bump PDF cache revision from commit SHA
        run: |
          REV=$(git rev-parse --short HEAD)
          cat > apps/web/src/pdfRev.ts <<EOF
          /** ЗКН-Пф001: значение подставлено автоматически при деплое (SHA коммита).
           *  Ручная правка бессмысленна — файл перезаписывается. */
          export const PDF_CACHE_REV = "$REV";
          EOF
          echo "PDF_CACHE_REV = $REV"

      # ── ЗКН-Ф021: ШТАМП СБОРКИ. Гейт ниже ищет ЭТОТ SHA в теле живого бандла ──
      - name: Штамп сборки (SHA коммита в бандл)
        run: |
          SHA=$(git rev-parse HEAD)
          sed -i "s|export const BUILD_SHA = \".*\";|export const BUILD_SHA = \"$SHA\";|" apps/web/src/buildStamp.ts
          echo "BUILD_SHA = $SHA"
          grep BUILD_SHA apps/web/src/buildStamp.ts | tail -1

      - name: Build site
        working-directory: apps/web
        run: bun run build
      # ── ЗАКОН: пре-генерация PDF всех книг на хостинг ──
      # PDF собираются здесь локальным Chromium (Playwright) — БЕЗ лимита
      # Cloudflare Browser Rendering — и едут статикой в dist/books/*.pdf. На сайте
      # скачивание отдаёт готовый файл (мгновенно, масштаб бесконечный). Шаг НЕ
      # блокирует деплой: при сбое сайт работает, скачивание падает на запасной
      # рендер-по-запросу + edge-кэш. Инкрементально: неизменные книги пропускаются.
      - name: Restore pre-generated PDFs (incremental cache)
        uses: actions/cache@v4
        with:
          path: apps/web/dist/books
          # СТАБИЛЬНЫЙ ключ: один кэш на неизменный набор книг и вёрстку, а не новая
          # запись на каждый ран (раньше ключ с run_id плодил по 0.23 ГБ за деплой,
          # 40+ записей упирались в лимит 10 ГБ → вытеснение → restore промахивался →
          # полная пересборка всех книг ~30 мин). Хэш инвалидирует кэш при правке
          # набора книг/вёрстки; правки текста книг ловит sig внутри genpdf и поле
          # force_pdf. restore-keys — фолбэк-сидинг с последнего кэша при смене хэша.
          key: pdf-books-v4-${{ hashFiles('apps/web/scripts/genpdf.mts', 'apps/web/src/books.ts', 'apps/web/src/pdfCover.ts') }}
          restore-keys: |
            pdf-books-
      - name: Pre-generate book PDFs (static, BBT typesetting)
        continue-on-error: true
        timeout-minutes: 55
        working-directory: apps/web
        env:
          GEN_API_ORIGIN: https://gaurangers.com
          # Пусто на push → genpdf берёт ВСЕ книги из BOOKS (закон: новая книга = запись
          # в BOOKS, без правки workflow). Инкрементально по sig — неизменные пропускаются,
          # поэтому штатный push пересобирает только реально изменившиеся книги.
          # Ручной запуск (workflow_dispatch) может сузить набор через поле gen_works.
          GEN_WORKS: ${{ github.event.inputs.gen_works || '' }}
          GEN_FORCE: ${{ github.event.inputs.force_pdf == 'true' && '1' || '' }}
        run: |
          set +e
          echo "== шрифты (деванагари для санскрита) =="
          sudo apt-get update -y >/dev/null 2>&1
          sudo apt-get install -y --no-install-recommends fonts-noto-core fonts-noto-devanagari fonts-noto-cjk fonts-noto-color-emoji >/dev/null 2>&1 \
            || sudo apt-get install -y fonts-noto >/dev/null 2>&1 || true
          echo "== книжный шрифт обложки (Gentium Book Plus: кириллица + IAST) =="
          mkdir -p ~/.fonts && cp fonts/*.ttf ~/.fonts/ 2>/dev/null && fc-cache -f >/dev/null 2>&1 || true
          echo "::warning::FONTS $(fc-list | grep -ci gentium) gentium faces installed"
          echo "== chromium для Playwright =="
          bunx playwright install --with-deps chromium || bunx playwright install chromium || true
          echo "== генерация (api -> $GEN_API_ORIGIN, works=$GEN_WORKS) =="
          bun run genpdf
          echo "== итог =="
          ls -la dist/books 2>/dev/null | sed -n '1,60p' || echo "нет dist/books"
          for f in dist/books/*.pdf; do [ -f "$f" ] && echo "::warning::PDF $(basename "$f") $(du -h "$f" | cut -f1)"; done
          [ -f dist/books/manifest.json ] && echo "::warning::MANIFEST $(tr -d '\n' < dist/books/manifest.json | cut -c1-500)" || echo "::warning::нет manifest.json"
      - name: Apply ADMIN_TOKEN secret (before deploy, so it persists into the deployed version)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set +e
          if [ -n "$ADMIN_TOKEN" ]; then
            printf '%s' "$ADMIN_TOKEN" | bunx wrangler secret put ADMIN_TOKEN
            RC=$?
            if [ "$RC" = "0" ]; then
              echo "ADMIN_TOKEN applied to iskcon-web."
            else
              echo "::warning::wrangler secret put ADMIN_TOKEN exit $RC — секрет уже сохранён на воркере прошлыми деплоями; не блокируем выкат фронта."
            fi
          else
            echo "No ADMIN_TOKEN repo secret — /api/admin/* will return 503 until you add it."
          fi
          exit 0

      - name: Apply GH_TOKEN secret (downloader → dispatch GitHub Actions)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set +e
          if [ -n "$GH_TOKEN" ]; then
            printf '%s' "$GH_TOKEN" | bunx wrangler secret put GH_TOKEN
            RC=$?
            if [ "$RC" = "0" ]; then
              echo "GH_TOKEN applied to iskcon-web."
            else
              echo "::warning::wrangler secret put GH_TOKEN exit $RC — секрет уже сохранён прошлыми деплоями; не блокируем выкат."
            fi
          else
            echo "No GH_TOKEN repo secret — /api/downloader/* will return 503 until you add it."
          fi
          exit 0

      - name: Deploy to Cloudflare + force latest version to 100%
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          bunx wrangler deploy 2>&1 | tee /tmp/web-deploy.log
          RC=${PIPESTATUS[0]}
          echo "wrangler deploy exit = $RC"
          if [ "$RC" != "0" ]; then
            echo "::error::wrangler deploy УПАЛ (exit $RC) — версия воркера НЕ обновлена. См. вывод выше."
            echo "----- wrangler tail -----"; tail -n 40 /tmp/web-deploy.log || true
            grep -iE 'error|exceed|larger|too large|asset|ENOENT|limit|failed|✘|✗' /tmp/web-deploy.log | tail -n 12 | while IFS= read -r l; do echo "::error::WD ${l}"; done
            exit "$RC"
          fi
          # iskcon-web работает в режиме версий (gradual deployments): wrangler deploy
          # заливает новую версию, но боевой трафик может оставаться на старой. Поэтому
          # принудительно переводим САМУЮ свежую версию на 100% через API.
          ACCT=d5cbe19470dc38599873eabfe148e6d1
          API=https://api.cloudflare.com/client/v4
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json")
          # ЗКН-Ф021 — ПРОМОУШЕН ОБЯЗАН БЫТЬ ПОДТВЕРЖДЁН, А НЕ ОТПРАВЛЕН.
          #
          # Здесь было: взять «последнюю версию», послать POST — и ЖИТЬ ДАЛЬШЕ,
          # не глядя на ответ (`set +e`, результат только в echo). Если промоушен
          # не проходил, `wrangler deploy` оставлял НОВУЮ версию залитой, а боевой
          # трафик — НА СТАРОЙ. Сайт молча отдавал вчерашний код, деплой рапортовал
          # успех. Именно так две подряд правки не доехали до людей.
          #
          # Теперь: промоутим и ПЕРЕЧИТЫВАЕМ живой deployment. Не совпало — ОШИБКА.
          LATEST=$(curl -s "$API/accounts/$ACCT/workers/scripts/iskcon-web/versions?per_page=1" "${auth[@]}" | jq -r '.result.items[0].id')
          echo "::notice::залита версия = $LATEST"
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::не удалось прочитать id залитой версии — промоушен невозможен"; exit 1
          fi
          # ⚠️ ЗДЕСЬ БЫЛА ПРИЧИНА. В теле стояла аннотация `workers/triggered_by`,
          #    которую Cloudflare НЕ ПРИНИМАЕТ: ответ 10210 «Invalid annotations».
          #    Промоушен ОТКЛОНЯЛСЯ каждый раз — а шаг ответ не читал (`set +e`,
          #    результат только в echo). Итог: `wrangler deploy` заливал новую
          #    версию, трафик оставался на СТАРОЙ, деплой рапортовал успех, и люди
          #    неделю смотрели вчерашний код. Аннотации не нужны — убраны.
          RESP=$(curl -s -X POST "$API/accounts/$ACCT/workers/scripts/iskcon-web/deployments?force=true" "${auth[@]}" \
            --data "{\"strategy\":\"percentage\",\"versions\":[{\"version_id\":\"$LATEST\",\"percentage\":100}]}")
          OK=$(printf '%s' "$RESP" | jq -r '.success')
          echo "::notice::промоушен ответил success=$OK"
          if [ "$OK" != "true" ]; then
            echo "::error::промоушен версии ОТКЛОНЁН: $(printf '%s' "$RESP" | jq -c '.errors')"; exit 1
          fi
          # перечитать: какая версия РЕАЛЬНО держит 100% трафика
          LIVE=$(curl -s "$API/accounts/$ACCT/workers/scripts/iskcon-web/deployments?per_page=1" "${auth[@]}" \
                 | jq -r '.result.deployments[0].versions[0].version_id')
          echo "::notice::боевая версия = $LIVE"
          if [ "$LIVE" != "$LATEST" ]; then
            echo "::error::трафик НЕ переведён: боевая версия $LIVE, а залита $LATEST. Прод остался бы на старом коде."; exit 1
          fi
          # Край Cloudflare кэширует HTML вопреки no-store (видели cf-cache-status: HIT).
          # Сносим кэш зоны — иначе люди часами получают старую оболочку.
          ZONE=$(curl -s "$API/zones?name=gaurangers.com" "${auth[@]}" | jq -r '.result[0].id')
          if [ -n "$ZONE" ] && [ "$ZONE" != "null" ]; then
            PR=$(curl -s -X POST "$API/zones/$ZONE/purge_cache" "${auth[@]}" --data '{"purge_everything":true}' | jq -r '.success')
            echo "::notice::кэш зоны снесён: success=$PR"
          fi

      - name: Verify (workers.dev instant + apex), record into D1
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          WD=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' /tmp/web-deploy.log | head -1)
          echo "workers.dev = $WD"
          if [ -n "$WD" ]; then
            wcode=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$WD/")
            wxr=$(curl -s -I --max-time 25 "$WD/" | grep -i 'x-robots-tag' | tr -d '\r')
            echo "workers.dev -> HTTP $wcode ; $wxr"
            bunx wrangler d1 execute iskcon-db --remote \
              --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'web workers.dev',${wcode:-0},'$(echo "$WD ; $wxr" | tr -d "\"'" | cut -c1-180)');" || true
          fi
          acode=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "https://gaurangers.com/")
          axr=$(curl -s -I --max-time 25 "https://gaurangers.com/" | grep -i 'x-robots-tag' | tr -d '\r')
          echo "apex -> HTTP $acode ; $axr"
          bunx wrangler d1 execute iskcon-db --remote \
            --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'web apex',${acode:-0},'$(echo "$axr" | tr -d "\"'" | cut -c1-150)');" || true

      - name: Подтвердить, что прод реально отдаёт ЭТУ сборку (иначе ОШИБКА)
        working-directory: apps/web
        run: |
          set -e
          # ЗКН-Ф021 — ГЕЙТ ПРОВЕРЯЕТ СОДЕРЖИМОЕ, А НЕ ИМЯ ФАЙЛА.
          #
          # Прошлая версия гейта сверяла ХЭШ: `/assets/index-<hash>.js` из свежей
          # dist/index.html против того, что отдаёт сайт. Гейт был ЗЕЛЁНЫЙ дважды
          # подряд — и оба раза на проде лежал СТАРЫЙ бандл. Две дыры:
          #
          #   1. ХЭШ СОВПАДАЕТ, если правка легла в лениво-подгружаемый чанк:
          #      входной чанк не изменился → «ожидаемое» равно «живому» → зелено,
          #      хотя не уехало НИЧЕГО.
          #   2. ХЭШ НЕ ГОВОРИТ О СОДЕРЖИМОМ. Совпал — и ладно.
          #
          # Теперь ищем В ТЕЛЕ живого файла ШТАМП ЭТОГО КОММИТА. Случайно совпасть
          # нечему. И проверяем ОБА входа: apex (через край) и workers.dev (мимо
          # края) — расхождение между ними и есть «кэш держит старое».
          SHA=$(git rev-parse HEAD)
          echo "::notice::ищем на проде штамп $SHA"

          probe() {   # $1 — база
            local B=$(curl -s --max-time 25 "$1/" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            [ -z "$B" ] && { echo "NOBUNDLE"; return; }
            curl -s --max-time 60 "$1$B" | grep -q "$SHA" && echo "OK $B" || echo "STALE $B"
          }

          for i in 1 2 3 4 5 6 7 8; do
            A=$(probe "https://gaurangers.com")
            W=$(probe "https://iskcon-web.ceo-5cb.workers.dev")
            echo "::notice::попытка $i · apex: $A · workers.dev: $W"
            case "$A $W" in
              OK*\ OK*) echo "::notice::прод отдаёт ЭТУ сборку ($SHA) и на домене, и на воркере"; exit 0;;
            esac
            sleep 12
          done
          echo "::error::Прод НЕ отдаёт эту сборку ($SHA). apex: $A · workers.dev: $W"
          echo "::error::Если workers.dev OK, а apex STALE — старую оболочку держит кэш края."
          echo "::error::Если оба STALE — трафик не переведён на новую версию воркера."
          exit 1

name: Deploy Web (Cloudflare)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install
      - name: Fetch BBT covers (public site, runner has open internet)
        working-directory: apps/web
        run: |
          mkdir -p public/covers
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36'
          REF='https://www.images.bbtmedia.com/node/31254'
          B='https://www.images.bbtmedia.com/sites/default/files'
          grab () {
            out="$1"; shift
            for u in "$@"; do
              if curl -sL --fail --max-time 60 -A "$UA" -e "$REF" "$u" -o "$out"; then
                sz=$(wc -c <"$out"); echo "ok $out <- $u ($sz bytes)"
                if [ "$sz" -gt 8000 ]; then return 0; fi
              fi
            done
            echo "FAIL $out"
          }
          grab public/covers/bg-en-1989.jpg \
            "$B/covers_front/GB-BGV-89.jpg" \
            "$B/styles/large/public/covers_front/GB-BGV-89.jpg?itok=bqjye2kB" \
            "$B/styles/medium/public/covers_front/GB-BGV-89.jpg?itok=bqjye2kB"
          grab public/covers/bg-uk-2015.jpg \
            "$B/covers_front/UK%20BG%202015%20front%20cover.jpg" \
            "$B/styles/large/public/covers_front/UK%20BG%202015%20front%20cover.jpg?itok=wng7Gkyk" \
            "$B/styles/medium/public/covers_front/UK%20BG%202015%20front%20cover.jpg?itok=wng7Gkyk"
          echo "covers dir:"; ls -la public/covers || true
          file public/covers/*.jpg || true
      - name: Build site
        working-directory: apps/web
        run: bun run build
      - name: Deploy to Cloudflare
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler deploy 2>&1 | tee /tmp/web-deploy.log

      - name: Verify (workers.dev instant + apex), record into D1
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          WD=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' /tmp/web-deploy.log | head -1)
          echo "workers.dev = $WD"
          if [ -n "$WD" ]; then
            wcode=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$WD/")
            wxr=$(curl -s -I --max-time 25 "$WD/" | grep -i 'x-robots-tag' | tr -d '\r')
            echo "workers.dev -> HTTP $wcode ; $wxr"
            bunx wrangler d1 execute iskcon-db --remote \
              --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'web workers.dev',${wcode:-0},'$(echo "$WD ; $wxr" | tr -d "\"'" | cut -c1-180)');" || true
          fi
          acode=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "https://gaurangers.com/")
          axr=$(curl -s -I --max-time 25 "https://gaurangers.com/" | grep -i 'x-robots-tag' | tr -d '\r')
          echo "apex -> HTTP $acode ; $axr"
          bunx wrangler d1 execute iskcon-db --remote \
            --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'web apex',${acode:-0},'$(echo "$axr" | tr -d "\"'" | cut -c1-150)');" || true

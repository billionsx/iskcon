name: Deploy Web (Cloudflare)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install
      - name: Build site
        working-directory: apps/web
        run: bun run build
      - name: Apply ADMIN_TOKEN secret (before deploy, so it persists into the deployed version)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          if [ -n "$ADMIN_TOKEN" ]; then
            printf '%s' "$ADMIN_TOKEN" | bunx wrangler secret put ADMIN_TOKEN
            echo "ADMIN_TOKEN applied to iskcon-web."
          else
            echo "No ADMIN_TOKEN repo secret — /api/admin/* will return 503 until you add it."
          fi

      - name: Deploy to Cloudflare + force latest version to 100%
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          bunx wrangler deploy 2>&1 | tee /tmp/web-deploy.log
          RC=${PIPESTATUS[0]}
          echo "wrangler deploy exit = $RC"
          if [ "$RC" != "0" ]; then
            echo "::error::wrangler deploy УПАЛ (exit $RC) — версия воркера НЕ обновлена. См. вывод выше."
            exit "$RC"
          fi
          # iskcon-web работает в режиме версий (gradual deployments): wrangler deploy
          # заливает новую версию, но боевой трафик может оставаться на старой. Поэтому
          # принудительно переводим САМУЮ свежую версию на 100% через API.
          ACCT=d5cbe19470dc38599873eabfe148e6d1
          API=https://api.cloudflare.com/client/v4
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json")
          LATEST=$(curl -s "$API/accounts/$ACCT/workers/scripts/iskcon-web/versions?per_page=1" "${auth[@]}" | jq -r '.result.items[0].id')
          echo "latest version = $LATEST"
          if [ -n "$LATEST" ] && [ "$LATEST" != "null" ]; then
            RESP=$(curl -s -X POST "$API/accounts/$ACCT/workers/scripts/iskcon-web/deployments?force=true" "${auth[@]}" \
              --data "{\"strategy\":\"percentage\",\"annotations\":{\"workers/triggered_by\":\"ci-promote\"},\"versions\":[{\"version_id\":\"$LATEST\",\"percentage\":100}]}")
            echo "promote-to-100%: $(printf '%s' "$RESP" | jq -c '{success,errors}')"
          fi

      - name: Verify (workers.dev instant + apex), record into D1
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          WD=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' /tmp/web-deploy.log | head -1)
          echo "workers.dev = $WD"
          if [ -n "$WD" ]; then
            wcode=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$WD/")
            wxr=$(curl -s -I --max-time 25 "$WD/" | grep -i 'x-robots-tag' | tr -d '\r')
            echo "workers.dev -> HTTP $wcode ; $wxr"
            bunx wrangler d1 execute iskcon-db --remote \
              --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'web workers.dev',${wcode:-0},'$(echo "$WD ; $wxr" | tr -d "\"'" | cut -c1-180)');" || true
          fi
          acode=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "https://gaurangers.com/")
          axr=$(curl -s -I --max-time 25 "https://gaurangers.com/" | grep -i 'x-robots-tag' | tr -d '\r')
          echo "apex -> HTTP $acode ; $axr"
          bunx wrangler d1 execute iskcon-db --remote \
            --command "INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'web apex',${acode:-0},'$(echo "$axr" | tr -d "\"'" | cut -c1-150)');" || true

      - name: Подтвердить, что прод реально отдаёт свежую сборку (иначе ОШИБКА)
        working-directory: apps/web
        run: |
          set -e
          EXPECTED=$(grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          echo "ожидаемый бандл (только что собран): $EXPECTED"
          if [ -z "$EXPECTED" ]; then echo "::error::не удалось определить собранный бандл из dist/index.html"; exit 1; fi
          LIVE=""
          for i in 1 2 3 4 5 6; do
            # путь-cache-buster → запрос доходит до воркера, минуя кэш «края»
            LIVE=$(curl -s --max-time 25 "https://gaurangers.com/__deploycheck-$RANDOM-$i" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            echo "попытка $i: прод отдаёт $LIVE"
            if [ "$LIVE" = "$EXPECTED" ]; then echo "OK: боевой сайт отдаёт свежую сборку $EXPECTED"; exit 0; fi
            sleep 10
          done
          echo "::error::Прод НЕ отдаёт свежую сборку ($EXPECTED); отдаёт: ${LIVE:-<пусто>}. Деплой не вступил в силу — новая версия не переключена на 100% или ассеты не залиты."
          exit 1

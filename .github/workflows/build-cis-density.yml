name: build-cis-density

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "GeoNames dataset"
        default: "cities15000"
        type: choice
        options: ["cities15000", "cities5000"]
      min_pop:
        description: "Minimum population"
        default: "0"

permissions:
  contents: write

env:
  CODES: "RU,UA,BY,KZ,UZ,KG,TJ,TM,AM,AZ,GE,MD,LT,LV,EE"

jobs:
  shard:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Clone gaurabda engine
        run: git clone --depth 1 https://github.com/gopa810/gaurabda-calendar.git _gaurabda
      - name: Install deps
        run: pip install --quiet tzdata
      - name: Download GeoNames ${{ github.event.inputs.dataset }}
        run: |
          DS="${{ github.event.inputs.dataset }}"
          curl -sSL -o geo.zip "https://download.geonames.org/export/dump/${DS}.zip"
          unzip -o geo.zip
          wc -l "${DS}.txt"
      - name: Generate shard ${{ matrix.shard }}
        run: |
          DS="${{ github.event.inputs.dataset }}"
          MP="${{ github.event.inputs.min_pop }}"
          python3 scripts/gen_geonames_feeds.py _gaurabda "${DS}.txt" /tmp/feeds "$CODES" "${MP:-0}" ${{ matrix.shard }} 8
          ls /tmp/feeds | wc -l
      - uses: actions/upload-artifact@v4
        with:
          name: cis-feeds-${{ matrix.shard }}
          path: /tmp/feeds
          retention-days: 1

  collect:
    needs: shard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Clone gaurabda engine
        run: git clone --depth 1 https://github.com/gopa810/gaurabda-calendar.git _gaurabda
      - name: Install deps
        run: pip install --quiet tzdata
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/allfeeds
      - name: Merge new feeds (do not overwrite existing)
        run: |
          mkdir -p apps/web/public/data/gcal
          cp -n /tmp/allfeeds/cis-feeds-*/*.json apps/web/public/data/gcal/ 2>/dev/null || true
          ls apps/web/public/data/gcal | wc -l
      - name: Rebuild nearest-coordinate index
        run: python3 scripts/build_gcal_index.py apps/web/public/data _gaurabda
      - name: GBC verification gate (engine + shipped feeds)
        run: python3 scripts/verify_gbc.py _gaurabda apps/web/public/data/gcal
      - name: Commit densified feeds + index
        run: |
          git config user.name "Billions X"
          git config user.email "ceo@billionsx.com"
          git add apps/web/public/data/gcal apps/web/public/data/gcal-index.json
          if git diff --cached --quiet; then
            echo "No new feeds."
            exit 0
          fi
          N=$(git diff --cached --name-only | grep -c 'gcal/' || true)
          git commit --no-verify -m "calendar: уплотнение СНГ из GeoNames (+$N городов, корректный текущий пояс) — ближайшая точка ближе = авторитетнее"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "retry push $i"; sleep 5
          done

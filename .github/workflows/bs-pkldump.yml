name: bs pkl dump (выгрузка 12 стихов в JSON для синхронизации ПКЛ)
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Dump
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, time
          CF=os.environ["CF"]; ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def d1(sql):
              r=urllib.request.urlopen(urllib.request.Request(D1, data=json.dumps({"sql":sql}).encode(),
                headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"}), timeout=60)
              return json.loads(r.read().decode())
          ids=['bs.5.1','bs.5.29','bs.5.30','bs.5.32','bs.5.35','bs.5.38','bs.5.39','bs.5.40','bs.5.43','bs.5.44','bs.5.48','bs.5.56']
          inlist=",".join("'"+i+"'" for i in ids)
          rows=d1(f"SELECT v.id, v.translit, x.translation FROM verses v JOIN verse_texts x ON x.verse_id=v.id AND x.edition_id='bs-ru' WHERE v.id IN ({inlist})")["result"][0]["results"]
          out={}
          for r in rows:
              n=r["id"].split(".",1)[1]  # 5.N
              out["Брахма-самхита "+n]={"translit":r["translit"],"t":r["translation"]}
          os.makedirs("docs/data", exist_ok=True)
          open("docs/data/bs_pkl.json","w",encoding="utf-8").write(json.dumps(out, ensure_ascii=False, indent=1))
          print("wrote", len(out))
          PY
      - name: Commit
        run: |
          git config user.email "ceo@billionsx.com"
          git config user.name "Billions X"
          git add docs/data/bs_pkl.json
          git commit -m "data: выгрузка 12 стихов Брахма-самхиты для синхронизации ПКЛ" || echo "nochange"
          git push origin HEAD:main

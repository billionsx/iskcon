name: bhajanamrita augment (пословный + медиа → БД)

on:
  workflow_dispatch:
    inputs:
      lang: { description: "язык", required: true, default: "ru" }

permissions:
  contents: write

jobs:
  augment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Self-test декодера
        run: python3 tools/bhajans/bhajanamrita_import.py --selftest
      - name: Augment
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 tools/bhajans/augment_richdata.py
      - name: Commit report
        run: |
          git config user.name "Billions X"; git config user.email "ceo@billionsx.com"
          git add tools/bhajans/recon/AUGMENT.json
          git commit -m "augment(bhajanamrita): пословный + медиа [skip ci]" || exit 0
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push origin main && break || sleep 3; done

name: iskcone parse (tilda_pages -> content_items)

on:
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Classify & structure crawled pages -> content_items
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, re, html, urllib.request
          CF=os.environ["CF"]
          ACCT="d5cbe19470dc38599873eabfe148e6d1"; DB="6226aded-dd03-4e74-977f-9cd0b509e73d"
          D1=f"https://api.cloudflare.com/client/v4/accounts/{ACCT}/d1/database/{DB}/query"
          def q(sql, params=None):
              body=json.dumps({"sql":sql,"params":params or []}).encode()
              rq=urllib.request.Request(D1, data=body, headers={"Authorization":f"Bearer {CF}","Content-Type":"application/json"})
              with urllib.request.urlopen(rq) as r: return json.loads(r.read().decode())

          AVAT={"narasimha","matsia","matsya","kurma","varaha","vamana","rama","parashurama","kalki","buddha","kapila","prithu","hayagriva","mohini","nrisimha","nara-narayana"}
          BHAG={"krishna","radharani","chaitanya","gauranga","nityananda","mahaprabhu"}
          BOILER=re.compile(r'(iskcon\.svg|iskcon_one|THE_INTERNATIONAL|billionsx|/tild[0-9a-f-]+/-/empty/$)', re.I)

          def lang_of(a):
              if a.startswith("/en"): return "en"
              if a.startswith("/vi"): return "vi"
              if a.startswith("/km"): return "km"
              return "ru"

          def classify(a):
              if a in ("/","/ru","/en","/vi","/km"): return ("home",None)
              if a.startswith("/dasa"): return ("article","dasa")
              if a in ("/evpatoria","/batumi","/mahabhava"): return ("center",None)
              base=a
              for p in ("/ru/","/en/","/vi/","/km/"):
                  if a.startswith(p): base=a[len(p):]; break
              segs=[s for s in base.split("/") if s]
              if base==a and not a.startswith("/ru/"):
                  return ("other",None)
              if not segs: return ("other",None)
              n0=segs[0]
              if n0=="books": return ("hub","books")
              if n0=="bhajans": return ("hub","prayers")
              if "stavavali" in base or "bhajan" in base or len(segs)>=2: return ("prayer",n0)
              if n0 in AVAT: return ("personality","avatar")
              if n0 in BHAG: return ("personality","bhagavan")
              return ("personality","associate")

          def clean_name(title):
              t=html.unescape(title or "").strip()
              # cut trailing site suffixes
              t=re.split(r'\.\s*(ISKCON|ИСККОН)\b', t)[0]
              t=t.split(".")[0].strip(" .—-")
              return t[:200]

          def hero(images_json):
              try: imgs=json.loads(images_json or "[]")
              except: imgs=[]
              cands=[u for u in imgs if not BOILER.search(u)]
              # prefer raster content images
              raster=[u for u in cands if re.search(r'\.(png|jpe?g|webp)$',u,re.I)]
              pool=raster or cands or imgs
              return pool[0] if pool else None

          rows=q("SELECT alias, title, descr, images_json, img_count FROM tilda_pages")["result"][0]["results"]
          print("pages:", len(rows))
          # ⚠️ ЗКН-Р002: снос убран. У 170 записей ВЫЧИЩЕННЫЕ слаги — прогон
          # вернул бы чужие пути `/ru/…` с исходного сайта.
          counts={}
          for r in rows:
              a=r["alias"]; t,st=classify(a); lang=lang_of(a)
              name = "" if t=="home" else clean_name(r.get("title"))
              sub  = html.unescape((r.get("descr") or "")).strip()[:600]
              h    = hero(r.get("images_json"))
              q("""INSERT OR REPLACE INTO content_items
                   (slug,lang,type,subtype,name,subtitle,hero_image,img_count,page_alias,updated_at)
                   VALUES (?,?,?,?,?,?,?,?,?,datetime('now'))""",
                [a,lang,t,st,name,sub,h,r.get("img_count") or 0,a])
              counts[t]=counts.get(t,0)+1
          q("INSERT INTO deploy_checks (checked_at,target,http_code,body) VALUES (datetime('now'),'iskcone parse',?,?)",
            [str(len(rows)), json.dumps(counts,ensure_ascii=False)])
          print("DONE", counts)
          PY

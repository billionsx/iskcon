.tc-title{left:calc(var(--tc-title-x) - var(--tc-x));font-size:var(--fs-tc-title);
 font-weight:700;letter-spacing:calc(var(--tr-tc-title)*1em);line-height:1;white-space:nowrap}
.slot{height:var(--tc-slot-h)}
.slot-l{left:calc(var(--tc-slot-l-x) - var(--tc-x));width:var(--tc-slot-l-w);

.slot-r{left:calc(var(--tc-slot-r-x) - var(--tc-x));width:var(--tc-slot-r-w);

.tc1 .slot{top:calc(var(--tc1-slot-y) - var(--tc1-y))}

.tc2{top:var(--tc2-y);height:var(--tc2-h);clip-path:path(var(--tc2-path))}

.tc1 .g-glyph{left:calc(var(--g-walk-x) - var(--tc-x));top:calc(var(--g-walk-y) - var(--tc1-y));

.tc2 .g-glyph{left:calc(var(--g-run-x) - var(--tc-x));top:calc(var(--g-run-y) - var(--tc2-y));

.tc3 .g-glyph{left:calc(var(--g-cycle-x) - var(--tc-x));top:calc(var(--g-cycle-y) - var(--tc3-y));

.g-glyph{color:var(--lime)}

.scrim{left:0;top:var(--scrim-y);width:var(--stage-w);height:var(--scrim-h);

 rgba(0,0,0,.28) 30%,rgba(0,0,0,.46) 42%,rgba(0,0,0,.69) 58%,rgba(0,0,0,.83) 74%,

 color:var(--tc-fill)}
.lb{top:calc(var(--tab-label-top) + var(--tab-label-dy));width:var(--tab-w);text-align:center;

<body>
<div class="stage">
  <div class="t sb-time">22:45</div>
  <i class="g g-sbheart sb-heart"></i>
  <div class="sb-sig"><b></b><b></b><b></b><b></b></div>
  <div class="t sb-lte">LTE</div>
  <i class="g g-batgrey bat"></i><i class="g g-batwhite bat-f"></i>

  <div class="t title">Workout</div>
  <div class="hbtn hbtn1"></div><i class="g g-compose"></i>
  <div class="hbtn hbtn2"></div><i class="g g-hrslash"></i>

  <div class="ban"><div class="ban-icon"></div><i class="g g-heart"></i>
    <div class="t ban-t" style="top:calc(var(--ban-t-top) + 0*var(--ban-text-step))">To track other workout types,</div><div class="t ban-t" style="top:calc(var(--ban-t-top) + 1*var(--ban-text-step))">connect Apple Watch, AirPods</div><div class="t ban-t" style="top:calc(var(--ban-t-top) + 2*var(--ban-text-step))">with heart rate detection or a</div><div class="t ban-t" style="top:calc(var(--ban-t-top) + 3*var(--ban-text-step))">device with a heart rate sensor.</div><div class="ban-x"></div><i class="g g-xmark"></i></div>

  <div class="tc tc1">
    <i class="g g-walk g-glyph"></i>
    <div class="tc-play"></div><i class="g g-play"></i>
    <div class="t tc-title">Outdoor Walk</div>
    <div class="slot slot-l"></div><div class="slot slot-r"></div>
    <i class="g g-note"></i><i class="g g-timer"></i>
  </div>
  <div class="tc tc2">
    <i class="g g-run g-glyph"></i>
    <div class="tc-play"></div><i class="g g-play"></i>
    <div class="t tc-title">Outdoor Run</div>
    <div class="slot slot-l"></div><div class="slot slot-r"></div>
    <i class="g g-note"></i><i class="g g-timer"></i>
  </div>
  <div class="tc tc3">
    <i class="g g-cycle g-glyph"></i>
    <div class="tc-play"></div><i class="g g-play"></i>
    <div class="t tc-title">Outdoor Cycle</div>
    <div class="slot slot-l"></div><div class="slot slot-r"></div>
    <i class="g g-note"></i><i class="g g-timer"></i>
  </div>
  <div class="scrim"></div>
  <div class="bar"></div><div class="pill"></div>
  <div class="badge"></div>
  <i class="g g-rings"></i><i class="g g-people"></i><i class="g g-badge"></i>
  <div class="t lb lb1">Summary</div>
  <div class="t lb lb2">Workout</div>
  <div class="t lb lb3">Sharing</div>
</div>

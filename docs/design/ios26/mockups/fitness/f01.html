*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0b0b0b;display:flex;justify-content:center;
 font-family:-apple-system,"SF Pro Display","SF Pro Text",system-ui,"Helvetica Neue",sans-serif;
 -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
.stage{position:relative;width:var(--stage-w);height:var(--stage-h);
 background:var(--canvas);overflow:hidden;color:var(--label)}
.stage *{position:absolute}
i svg,span svg{display:block;width:100%;height:100%}
.t{line-height:1;white-space:nowrap}
.round{border-radius:50%;display:flex;align-items:center;justify-content:center}
.round>i,.round>span{position:static}

/* статусбар */
.sb-time{left:var(--sb-time-x);font-size:var(--fs-sb);font-weight:590;letter-spacing:-.01em;
 top:calc(var(--sb-base) - var(--fs-sb)*.7 - var(--cap-off)*var(--fs-sb))}
.sb-lte{left:var(--sb-lte-x);font-size:var(--fs-lte);font-weight:590;
 top:calc(var(--sb-base) - var(--fs-lte)*.7 - var(--cap-off)*var(--fs-lte))}
.sb-sig{left:var(--sb-sig-x);top:var(--sb-cap-top);width:var(--sb-sig-w);height:var(--sb-sig-h);
 display:flex;align-items:flex-end;gap:calc(var(--sb-sig-w)/9)}
.sb-sig b{position:relative;flex:1;background:currentColor;border-radius:var(--hair)}
.sb-sig b:nth-child(1){height:38%} .sb-sig b:nth-child(2){height:58%}
.sb-sig b:nth-child(3){height:79%} .sb-sig b:nth-child(4){height:100%}
.sb-bat{left:var(--sb-bat-x);top:var(--sb-bat-y);width:var(--sb-bat-w);height:var(--sb-bat-h);
 border:var(--hair) solid rgba(255,255,255,.42);border-radius:var(--sb-bat-r)}
.sb-bat b{left:var(--hair);top:var(--hair);bottom:var(--hair);width:var(--sb-bat-fill);
 background:#fff;border-radius:calc(var(--sb-bat-r) - var(--hair))}
.sb-nub{left:calc(var(--sb-bat-x) + var(--sb-bat-w) + var(--hair));
 top:calc(var(--sb-bat-y) + (var(--sb-bat-h) - var(--sb-nub-h))/2);
 width:var(--sb-nub-w);height:var(--sb-nub-h);background:rgba(255,255,255,.42);
 border-radius:0 var(--sb-nub-w) var(--sb-nub-w) 0}

/* шапка */
.title{left:var(--title-x);font-size:var(--fs-title);font-weight:700;letter-spacing:-.026em;
 top:calc(var(--title-base) - var(--title-cap) - var(--cap-off)*var(--fs-title))}
.hbtn{top:var(--hbtn-y);width:var(--hbtn-d);height:var(--hbtn-d);background:var(--hbtn-fill)}
.hbtn>i{width:var(--hbtn-glyph);height:var(--hbtn-glyph)}
.hbtn1{left:var(--hbtn1-x)} .hbtn2{left:var(--hbtn2-x)}

/* баннер */
.ban{left:var(--ban-x);top:var(--ban-y);width:var(--ban-w);height:var(--ban-h);
 background:var(--ban-fill);border-radius:var(--ban-r);clip-path:path(var(--ban-path))}
.ban-icon{left:calc(var(--ban-icon-x) - var(--ban-x));top:calc(var(--ban-icon-y) - var(--ban-y));
 width:var(--ban-icon-d);height:var(--ban-icon-d);background:var(--lime);color:var(--ban-fill)}
.ban-icon>i{width:var(--ban-heart);height:var(--ban-heart)}
.ban-t{left:calc(var(--ban-text-x) - var(--ban-x));font-size:var(--fs-ban);letter-spacing:-.006em;
 line-height:1;white-space:nowrap}
.ban-x{left:calc(var(--ban-x-x) - var(--ban-x));top:calc(var(--ban-x-y) - var(--ban-y));
 width:var(--ban-x-d);height:var(--ban-x-d);background:var(--ban-x-fill);color:var(--ban-x-ink)}
.ban-x>i{width:var(--ban-x-glyph);height:var(--ban-x-glyph)}

/* тонированные карточки */
.tc{left:var(--tc-x);width:var(--tc-w);background:var(--tc-fill);border-radius:var(--tc-r)}
.tc-glyph{left:calc(var(--tc-glyph-x) - var(--tc-x));color:var(--lime)}
.tc-play{left:calc(var(--tc-play-x) - var(--tc-x));width:var(--tc-play-d);height:var(--tc-play-d);
 border-radius:50%;background:var(--lime);color:var(--tc-fill);
 display:flex;align-items:center;justify-content:center}
.tc-play svg{position:static;width:var(--tc-play-glyph);height:var(--tc-play-glyph)}
.tc-title{left:calc(var(--tc-title-x) - var(--tc-x));font-size:var(--fs-tc-title);
 font-weight:700;letter-spacing:-.02em}
.slot{height:var(--tc-slot-h);border-radius:var(--tc-slot-r);color:var(--slot-ink);
 display:flex;align-items:center;justify-content:center}
.slot>i{position:static;width:var(--tc-slot-glyph);height:var(--tc-slot-glyph)}
.slot-l{left:calc(var(--tc-slot-l-x) - var(--tc-x));width:var(--tc-slot-l-w);
 background:var(--tc-slot-l-fill);clip-path:path(var(--slot-l-path))}
.slot-r{left:calc(var(--tc-slot-r-x) - var(--tc-x));width:var(--tc-slot-r-w);
 background:var(--tc-slot-r-fill);clip-path:path(var(--slot-r-path))}
.tc1{top:var(--tc1-y);height:var(--tc1-h);clip-path:path(var(--tc1-path))}
.tc1 .tc-glyph{top:var(--tc1-glyph-dy);width:var(--tc1-glyph-w);height:var(--tc1-glyph-h)}
.tc1 .tc-play{top:var(--tc1-play-dy)}
.tc1 .tc-title{top:calc(var(--tc1-title-dbase) - var(--tc-title-cap) - var(--cap-off)*var(--fs-tc-title))}
.tc1 .slot{top:var(--tc1-slot-dy)}
.tc2{top:var(--tc2-y);height:var(--tc2-h);clip-path:path(var(--tc2-path))}
.tc2 .tc-glyph{top:var(--tc2-glyph-dy);width:var(--tc2-glyph-w);height:var(--tc2-glyph-h)}
.tc2 .tc-play{top:var(--tc2-play-dy)}
.tc2 .tc-title{top:calc(var(--tc2-title-dbase) - var(--tc-title-cap) - var(--cap-off)*var(--fs-tc-title))}
.tc2 .slot{top:var(--tc2-slot-dy)}
.tc3{top:var(--tc3-y);height:var(--tc3-h);clip-path:path(var(--tc3-path))}
.tc3 .tc-glyph{top:var(--tc3-glyph-dy);width:var(--tc3-glyph-w);height:var(--tc3-glyph-h)}
.tc3 .tc-play{top:var(--tc3-play-dy)}
.tc3 .tc-title{top:calc(var(--tc3-title-dbase) - var(--tc-title-cap) - var(--cap-off)*var(--fs-tc-title))}
.tc3 .slot{top:var(--tc3-slot-dy)}

/* затемнение содержимого под слоем */
.scrim{left:0;top:var(--scrim-y);width:var(--stage-w);height:var(--scrim-h);
 background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.10) 20%,
 rgba(0,0,0,.28) 30%,rgba(0,0,0,.46) 42%,rgba(0,0,0,.69) 58%,rgba(0,0,0,.83) 74%,
 rgba(0,0,0,.92) 90%,rgba(0,0,0,1) 100%)}

/* плавающий слой */
.bar{left:var(--bar-x);top:var(--bar-y);width:var(--bar-w);height:var(--bar-h);
 border-radius:var(--bar-r);background:var(--bar-tint);
 -webkit-backdrop-filter:blur(var(--bar-blur)) saturate(var(--bar-sat));
 backdrop-filter:blur(var(--bar-blur)) saturate(var(--bar-sat));
 box-shadow:inset 0 0 0 var(--hair) var(--bar-rim)}
.pill{left:calc(var(--pill-x) - var(--bar-x));top:calc(var(--pill-y) - var(--bar-y));
 width:var(--pill-w);height:var(--pill-h);border-radius:var(--pill-r);background:var(--pill-tint)}
.tab{top:calc(var(--tab-icon-top) - var(--bar-y));width:var(--tab-w);
 margin-left:calc(0px - var(--tab-w)/2);text-align:center}
.tab>i{position:relative;display:inline-block;width:var(--tab-icon-h);height:var(--tab-icon-h)}

 line-height:1;top:calc(var(--tab-label-base) - var(--tab-icon-top) - var(--tab-label-cap)
 - var(--cap-off)*var(--fs-tab))}

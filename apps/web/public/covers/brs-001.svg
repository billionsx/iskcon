<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" width="1000" height="1250" role="img" aria-label="Нектар преданности">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="86%">
      <stop offset="0%" stop-color="#3a3a40"/>
      <stop offset="45%" stop-color="#2a2a2f"/>
      <stop offset="100%" stop-color="#171719"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="44%" r="40%">
      <stop offset="0%" stop-color="#D2AA1B" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#D2AA1B" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#D2AA1B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C75A"/>
      <stop offset="100%" stop-color="#C49A14"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1250" fill="url(#bg)"/>
  <rect width="1000" height="1250" fill="url(#halo)"/>

  <!-- soft halo ring behind the blossom -->
  <g transform="translate(500 560)" fill="none" stroke="url(#gold)">
    <circle r="250" stroke-opacity="0.12" stroke-width="2"/>
    <circle r="300" stroke-opacity="0.06" stroke-width="2"/>
  </g>

  <!-- side-view lotus blossom: a central petal flanked by symmetric pairs -->
  <g transform="translate(500 560)" fill="url(#gold)" fill-opacity="0.07" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round">
    <!-- petal template points up from the base (origin) -->
    <g id="petal"><path d="M0,0 C30,-44 30,-168 0,-224 C-30,-168 -30,-44 0,0 Z"/></g>
    <!-- outer sepals (short, wide) -->
    <use href="#petal" transform="rotate(74) scale(0.62)" stroke-opacity="0.5"/>
    <use href="#petal" transform="rotate(-74) scale(0.62)" stroke-opacity="0.5"/>
    <use href="#petal" transform="rotate(54) scale(0.8)" stroke-opacity="0.7"/>
    <use href="#petal" transform="rotate(-54) scale(0.8)" stroke-opacity="0.7"/>
    <!-- mid petals -->
    <use href="#petal" transform="rotate(32) scale(0.93)" stroke-opacity="0.9"/>
    <use href="#petal" transform="rotate(-32) scale(0.93)" stroke-opacity="0.9"/>
    <use href="#petal" transform="rotate(15) scale(0.99)"/>
    <use href="#petal" transform="rotate(-15) scale(0.99)"/>
    <!-- center petal -->
    <use href="#petal"/>
  </g>

  <!-- nectar drop / bindu rising from the blossom -->
  <g transform="translate(500 300)" fill="url(#gold)" stroke="none">
    <path d="M0,-34 C16,-6 18,10 0,24 C-18,10 -16,-6 0,-34 Z" fill-opacity="0.92"/>
  </g>

  <!-- wordmark high above the card's own title -->
  <text x="500" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="36" letter-spacing="4.5" fill="#D2AA1B" fill-opacity="0.80">BHAKTI-RASĀMṚTA-SINDHU</text>
  <text x="500" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="23" letter-spacing="3" fill="#ffffff" fill-opacity="0.42" font-style="italic">The Nectar of Devotion</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" width="1000" height="1250" role="img" aria-label="Шримад-Бхагаватам">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="85%">
      <stop offset="0%" stop-color="#3a3a40"/>
      <stop offset="45%" stop-color="#2a2a2f"/>
      <stop offset="100%" stop-color="#171719"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="38%" r="38%">
      <stop offset="0%" stop-color="#D2AA1B" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#D2AA1B" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#D2AA1B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C75A"/>
      <stop offset="100%" stop-color="#C49A14"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1250" fill="url(#bg)"/>
  <rect width="1000" height="1250" fill="url(#halo)"/>

  <!-- mandala: concentric rings + petals around a center, upper third -->
  <g transform="translate(500 470)" fill="none" stroke="url(#gold)" stroke-opacity="0.85">
    <circle r="250" stroke-opacity="0.16" stroke-width="2"/>
    <circle r="205" stroke-opacity="0.28" stroke-width="2"/>
    <circle r="150" stroke-opacity="0.5" stroke-width="2.5"/>
    <circle r="112" stroke-opacity="0.85" stroke-width="3"/>
    <g stroke-opacity="0.55" stroke-width="2.2">
      <!-- 16 lotus petals -->
      <g id="petalset">
        <path d="M0,-150 C34,-206 34,-250 0,-300 C-34,-250 -34,-206 0,-150 Z"/>
      </g>
      <use href="#petalset" transform="rotate(22.5)"/>
      <use href="#petalset" transform="rotate(45)"/>
      <use href="#petalset" transform="rotate(67.5)"/>
      <use href="#petalset" transform="rotate(90)"/>
      <use href="#petalset" transform="rotate(112.5)"/>
      <use href="#petalset" transform="rotate(135)"/>
      <use href="#petalset" transform="rotate(157.5)"/>
      <use href="#petalset" transform="rotate(180)"/>
      <use href="#petalset" transform="rotate(202.5)"/>
      <use href="#petalset" transform="rotate(225)"/>
      <use href="#petalset" transform="rotate(247.5)"/>
      <use href="#petalset" transform="rotate(270)"/>
      <use href="#petalset" transform="rotate(292.5)"/>
      <use href="#petalset" transform="rotate(315)"/>
      <use href="#petalset" transform="rotate(337.5)"/>
    </g>
  </g>

  <!-- center: shatkona (interlocking triangles) — pure vector, renders everywhere -->
  <g transform="translate(500 470)" fill="none" stroke="url(#gold)" stroke-width="3.4" stroke-linejoin="round">
    <polygon points="0,-78 67.5,39 -67.5,39" stroke-opacity="0.95"/>
    <polygon points="0,78 67.5,-39 -67.5,-39" stroke-opacity="0.95"/>
    <circle r="13" fill="url(#gold)" stroke="none"/>
  </g>

  <!-- restrained wordmark high above the card's own title (card prints the RU title at the bottom) -->
  <text x="500" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="40" letter-spacing="6" fill="#D2AA1B" fill-opacity="0.78">ŚRĪMAD-BHĀGAVATAM</text>
  <text x="500" y="168" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="23" letter-spacing="3" fill="#ffffff" fill-opacity="0.42" font-style="italic">Bhāgavata Purāṇa</text>
</svg>

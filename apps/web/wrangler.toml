name = "iskcon-web"
main = "worker.ts"
compatibility_date = "2025-01-15"
# Воркер импортирует node:buffer (через @cloudflare/puppeteer для /pdf). Без флага
# nodejs_compat Cloudflare отклоняет загрузку версии: No such module "node:buffer"
# (code 10021) — именно поэтому wrangler deploy падал, а версия воркера не обновлялась.
compatibility_flags = ["nodejs_compat"]
account_id = "d5cbe19470dc38599873eabfe148e6d1"
workers_dev = true

# Отправка писем об ошибках через Cloudflare Email Routing (нативно, без сторонних
# сервисов). ВАЖНО: это ГЛОБАЛЬНЫЙ ключ — он обязан стоять ДО любой [секции], иначе
# TOML относит его к предыдущей таблице (раньше превращался в browser.send_email),
# и wrangler его игнорирует → в воркере env.SEB === undefined.
# destination_address подтверждён в Email Routing → Destination addresses;
# Email Routing включён на домене-отправителе gaurangers.com.
send_email = [
  { name = "SEB", destination_address = "support@billionsx.com" }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Воркер должен исполняться для ВСЕХ запросов (включая HTML). Без этого index.html
# отдаёт ассет-сервер напрямую, мимо воркера: no-store и OG-теги не применяются,
# и каждый деплой может приходить из кэша «края» — поэтому правки «не появлялись».
run_worker_first = true

[browser]
binding = "BROWSER"

# Крон → обработчик scheduled(). Время в UTC.
#   "*/30 * * * *"  — каждые 30 мин ЗАПУСКАТЬ забор Telegram-сторис (@iskcone) через
#                     tg-stories.yml. Надёжный планировщик Cloudflare вместо флаки-крона
#                     GitHub: свежая сторис попадает в приложение в пределах ~30 минут.
#   три суточных слота — перекладка IG-даршанов храмов (Ноида/Насик/GEV) в D1 (тяжёлый
#                     Browser Rendering; IST = UTC+5:30, покрывают утро–вечер IST).
[triggers]
crons = ["*/30 * * * *", "0 4 * * *", "0 9 * * *", "0 14 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "iskcon"
database_id = "6226aded-dd03-4e74-977f-9cd0b509e73d"

[[routes]]
pattern = "gaurangers.com"
custom_domain = true

[[routes]]
pattern = "www.gaurangers.com"
custom_domain = true

# CRM-загрузчик (/api/admin/*): секрет оператора, без него маршруты отдают 503.
#   wrangler secret put ADMIN_TOKEN

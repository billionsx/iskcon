name = "iskcon-web"
main = "worker.ts"
compatibility_date = "2025-01-15"
# Воркер импортирует node:buffer (через @cloudflare/puppeteer для /pdf). Без флага
# nodejs_compat Cloudflare отклоняет загрузку версии: No such module "node:buffer"
# (code 10021) — именно поэтому wrangler deploy падал, а версия воркера не обновлялась.
compatibility_flags = ["nodejs_compat"]
account_id = "d5cbe19470dc38599873eabfe148e6d1"
workers_dev = true

# Отправка писем об ошибках через Cloudflare Email Routing (нативно, без сторонних
# сервисов). ВАЖНО: это ГЛОБАЛЬНЫЙ ключ — он обязан стоять ДО любой [секции], иначе
# TOML относит его к предыдущей таблице (раньше превращался в browser.send_email),
# и wrangler его игнорирует → в воркере env.SEB === undefined.
# destination_address подтверждён в Email Routing → Destination addresses;
# Email Routing включён на домене-отправителе gaurangers.com.
send_email = [
  { name = "SEB", destination_address = "support@billionsx.com" }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Воркер должен исполняться для ВСЕХ запросов (включая HTML). Без этого index.html
# отдаёт ассет-сервер напрямую, мимо воркера: no-store и OG-теги не применяются,
# и каждый деплой может приходить из кэша «края» — поэтому правки «не появлялись».
run_worker_first = true

[browser]
binding = "BROWSER"

# Крон → обработчик scheduled(). ОДИН триггер: "*/30 * * * *" (каждые 30 мин, UTC).
#   • Каждый тик ЗАПУСКАЕТ забор Telegram-сторис (@iskcone) через tg-stories.yml —
#     надёжный планировщик Cloudflare вместо флаки-крона GitHub: свежая сторис попадает
#     в приложение в пределах ~30 минут.
#   • Тяжёлый IG-даршан храмов (Ноида/Насик/GEV, Browser Rendering) запускается из того
#     же обработчика только в три суточных слота ≈04/09/14 UTC (по времени тика).
# Один триггер вместо четырёх — укладываемся в лимит cron-триггеров воркера.
[triggers]
crons = ["*/30 * * * *"]

[[d1_databases]]
binding = "DB"
# Имя базы в аккаунте — ровно «iskcon-db». Здесь долго стояло «iskcon»: воркеру всё равно
# (биндинг идёт по database_id), но любой `wrangler d1 execute iskcon` мимо этого конфига
# получал not found. Держим имя равным реальному — иначе это мина.
database_name = "iskcon-db"
database_id = "6226aded-dd03-4e74-977f-9cd0b509e73d"

# ЗКН-Н087 — ХОСТЫ РЕЕСТРА. Канонический хост и все прежние домены обязаны быть
# привязаны к воркеру: канонический отдаёт приложение, прежние 301-ят на него
# (ссылки, QR-коды и метаданные Internet Archive ведут на них навсегда).
# Список обязан покрывать SITE_HOST + www и каждый ALIAS_HOST + www из
# apps/web/src/routes.ts — это проверяет infra-audit.py::check_n087.
#
# Канонический — brajs.com. gaurangers.com остаётся привязанным и 301-ит на него:
# по нему уже разошлись ссылки, QR-коды и метаданные Internet Archive.

[[routes]]
pattern = "brajs.com"
custom_domain = true

[[routes]]
pattern = "www.brajs.com"
custom_domain = true

[[routes]]
pattern = "gaurangers.com"
custom_domain = true

[[routes]]
pattern = "www.gaurangers.com"
custom_domain = true

# CRM-загрузчик (/api/admin/*): секрет оператора, без него маршруты отдают 503.
#   wrangler secret put ADMIN_TOKEN
